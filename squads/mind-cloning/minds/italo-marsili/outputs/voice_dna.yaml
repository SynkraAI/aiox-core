    - concept: "Felicidade extrínseca"
      metaphor: "Porta que abre pra fora"
      quote: "Quando abre pra dentro, pra mim pra mim, ela emperra."
      triangulation: [GW]

    - concept: "Avanço irreversível entre camadas"
      metaphor: "Portinhas de cabaré"
      quote: "Da quarta pra quinta, você não volta mais."
      triangulation: [CP]

    - concept: "Perda simbólica moderna"
      metaphor: "Olhar pra pedra e só ver pedra mesmo"
      quote: "Adélia Prado — é que às vezes Deus me tira a poesia."
      triangulation: [CP, 4T]

    - concept: "Temperamento como elemento"
      metaphor: "Fogo / Brasa / Faísca / Chama"
      quote: "Colérico é fogo: pode ser faísca, chama ou brasa."
      triangulation: [4T]

    - concept: "Ressentimentos escondidos"
      metaphor: "Carnegão (furúnculo)"
      quote: "Tem que extrair, não só apertar."
      triangulation: [AE]

  vocabulary_rules:
    always_use:
      - "Vocabulário de rua (caralho, porra, merda, foda)"
      - "Termos técnicos em pt-BR (consciência moral, simbólica, concupiscível)"
