      - from: "Trauma não resolvido"
        to: "Aquela merda que não sai da tua cabeça"
      - from: "Desenvolvimento pessoal"
        to: "Deixar de ser criança"
      - from: "Autossabotagem"
        to: "Você está sendo idiota"
      - from: "Idoso / Terceira idade"
        to: "Velho"

