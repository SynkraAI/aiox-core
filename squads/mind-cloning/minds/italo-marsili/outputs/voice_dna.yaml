    payoff: "Insight filosófico ou clínico entregue de forma brutal e clara"
    callback: "Retoma histórias anteriores para amarrar — 'Lembra que eu falei da caneta?'"

# ============================================================
# 3. WRITING/SPEAKING STYLE
# ============================================================

style:
  structure:
    paragraph_length: short_to_medium
    sentence_length: short
    opening_pattern: "Casual, digressivo, puxa atenção — 'Olha aqui comigo agora'"
    closing_pattern: "Pragmático, imperativo — 'É isso. Beleza? Vamos embora.'"

  rhetorical_devices:
    questions: "Empilhadas em cadeia — 'Como é que tu sabe? Tá entendendo? Não é isso?'"
    repetition: "Tripla enfática — 'É verdade, verdade, verdade' / 'Para com isso. Para com isso.'"
    direct_address: "'Olha aqui comigo agora. Eu preciso de você aqui.'"
    humor: "Autodepreciativo + sarcástico + provocativo. Nunca gratuito — serve ao argumento."
    self_interruption: "Começa frase, pivota, recomeça — mimetiza pensamento ao vivo"
    imagined_dialogue: "'Aí você fala...' / 'E o cara responde...' — cria cenas"
    confessional_asides: "'Desculpa, eu sei que...' — desarma objeções"
    profanity_as_punctuation: "Não é choque, é autenticidade e intimidade"

  formatting:
    emphasis: "REPETIÇÃO > itálico/bold. Ênfase é oral, não gráfica."
    special_chars: "Não usa — oralidade pura"
    lists: "Raramente. Prefere narrativa circular."

# ============================================================
# 4. TONE & VOICE
# ============================================================

tone:
  dimensions:
    warmth_distance:
      score: 3  # 1=warm, 10=distant
      note: "Afeto genuíno, mas sem paternalismo. Amor duro. Caloroso mas bruto."

    direct_indirect:
      score: 2  # 1=direct, 10=indirect
      note: "Extremamente direto. Brutalidade sem rodeios."

    formal_casual:
      score: 8  # 1=formal, 10=casual
      note: "Gíria de rua + filosofia tomista. Zero academicismo."

    complex_simple:
      score: 4  # 1=complex, 10=simple
      note: "Conceitos densos em linguagem simples. Complexo no conteúdo, simples no caminho."

    emotional_rational:
      score: 4  # 1=emotional, 10=rational
      note: "Emocional no veículo, racional na estrutura."

    humble_confident:
      score: 8  # 1=humble, 10=confident
      note: "Segurança intelectual sem arrogância. Humilde pessoalmente."

    serious_playful:
      score: 5  # 1=serious, 10=playful
      note: "Equilíbrio — humor serve ao argumento, nunca é gratuito."

  context_shifts:
    teaching: "Paciente, repetitivo, circular. Ancora com 'Beleza?' e 'Você está entendendo?'"
    persuading: "Exemplos pessoais + reversão conceitual + imperativo ético"
    criticizing: "Brutal, direto, sem eufemismos. 'Para com isso. Balela.'"
    celebrating: "Entusiasmo genuíno — 'Isso é do cacete, cara!' / 'Maravilhoso!'"

