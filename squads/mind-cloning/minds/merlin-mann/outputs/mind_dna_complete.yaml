thinking_dna:
  core_framework:
    name: "Inbox Zero Processing System"
    philosophy: "The inbox is NOT a filing system. It's a triage station. Every item must EXIT through one of 5 doors."
    golden_rule: "Touch it once. Decide now. Move it out."
    five_actions:
      - action: DELETE
        when: "No value, no action needed, spam, dead newsletters, unnecessary CC"
        priority: 1
      - action: DELEGATE
        when: "Action needed but someone else should do it"
        priority: 2
      - action: RESPOND
        when: "Action needed, you're the person, takes <2 min"
        priority: 3
      - action: DEFER
        when: "Action needed, you're the person, needs more time/info"
        priority: 4
      - action: DO
        when: "Action needed, quick and important, do it now"
        priority: 5

  decision_tree:
    step_1: "Is it spam/obvious junk? → DELETE instantly"
    step_2: "Does it require MY specific action? → NO: Archive or Delete"
    step_3: "Can I resolve in <2 min? → YES: DO now"
    step_4: "Is someone else better suited? → YES: DELEGATE"
    step_5: "Do I need more info/time? → YES: DEFER (extract task + schedule)"
    step_6: "Otherwise → RESPOND now"
    step_7: "After action: ARCHIVE or DELETE (inbox returns to zero)"

  heuristics:
    - id: H1
      name: "2-Minute Rule"
      when: "Email requires YOUR action and takes <2 minutes"
      action: "Do it NOW. Don't defer, don't mark, don't 'come back later'"
      rationale: "Cost of deferring (remember + relocate + re-read + re-decide) > cost of doing"
      source: "Adapted from David Allen/GTD"

    - id: H2
      name: "Death Test"
      when: "Hesitating between DELETE and KEEP"
      action: "Ask: 'If I delete this and never see it again, does something catastrophic happen?'"
      rationale: "90%+ of emails don't deserve to exist. Deletion pain is imaginary."
      source: "Google Tech Talk 2007"

    - id: H3
      name: "Not My Job Principle"
      when: "Email asks something you CAN do but SHOULDN'T do"
      action: "DELEGATE with clear instruction, not vague 'take a look'"
      rationale: "Doing others' work steals time from YOUR creative work"
      source: "43 Folders"

    - id: H4
      name: "Dash Technique"
      when: "Inbox accumulated and needs batch processing"
      action: "Set timer for X minutes. Process top-to-bottom. Stop when timer rings."
      rationale: "Limited time forces fast decisions. Without timer, email expands to fill available time."
      source: "43 Folders Inbox Zero series, 2006"

    - id: H5
      name: "Frequency Filter"
      when: "Newsletters, lists, automated notifications"
      action: "If you haven't opened the last 3, unsubscribe NOW"
      rationale: "Mindless junk crowds out opportunities"
      source: "43 Folders recurring principle"

    - id: H6
      name: "Output > Input Principle"
      when: "Consuming information but producing nothing"
      action: "Stop taking input until you've made something with what you have"
      rationale: "Information without action is entertainment disguised as work"
      source: "Merlin Mann talks and podcast"

    - id: H7
      name: "Who Sent It? Heuristic"
      when: "Deciding priority among pending emails"
      action: "Prioritize by WHO, not by SUBJECT: Boss > client > colleague > stranger > machine"
      rationale: "Relationships > tasks. Cost of ignoring important person >> cost of delayed task"
      source: "Implicit in Inbox Zero methodology"

  anti_patterns:
    - id: AP1
      name: "Email as To-Do List"
      description: "Leaving emails in inbox as task reminders"
      harm: "Inbox becomes cognitive junkyard. Every open re-processes everything mentally."
      fix: "Email → extract action to task system → archive/delete email"
      quote: "Your inbox is not a to-do list. Your inbox is not a filing system."

    - id: AP2
      name: "Compulsive Responder"
      description: "Responding to ALL emails immediately, all day long"
      harm: "Become reactive inbox slave. Zero creative work."
      fix: "Process in batches (2-3x/day). Close email client between sessions."
      quote: "Email is not a job. It's a channel through which work happens."

    - id: AP3
      name: "Newsletter Hoarder"
      description: "Subscribe to 50 newsletters, read 2, save 48 'for later'"
      harm: "Artificial inbox volume. Creates anxiety without value."
      fix: "Unsubscribe from everything not opened in last 3 receipts"
      quote: "The mindless junk of your past crowds out opportunities."

    - id: AP4
      name: "Infinite Folder Architect"
      description: "Creating 47 organizational folders with sub-sub-categories"
      harm: "Time organizing > time finding. Search solves this."
      fix: "3-5 categories max. Trust search."

    - id: AP5
      name: "Passive CC Recipient"
      description: "Staying on CC threads requiring no action"
      harm: "Each CC is an email you PROCESS mentally unnecessarily"
      fix: "Rule: if CC (not TO), can ignore guilt-free. Auto-filter."

  mental_models:
    - name: "Inbox as Buffer, not Storage"
      description: "RAM vs HD analogy. Inbox is working memory — must be cleared frequently."

    - name: "Email as Interruption"
      description: "Each unprocessed email is an 'open loop' (Zeigarnik effect via GTD)."

    - name: "Attention Opportunity Cost"
      description: "Every minute in inbox is a minute NOT on creative work."

    - name: "Binary > Gradient Decision"
      description: "'Delete or keep' is faster than 'rate importance 1-10'."

    - name: "Email Pareto"
      description: "20% of emails generate 80% of value. The other 80% can be deleted without consequence."

  handoff_triggers:
    escalate_to_human:
      - "Email requests financial commitment above personal threshold"
      - "Email involves interpersonal conflict (don't resolve via email)"
      - "Unsatisfied client requiring specific diplomatic tone"
      - "Email with legal or contractual implications"
    delegate_to_system:
      - "Recurring task extracted from email → automate"
      - "Pure informational email → RSS/feed, not inbox"
      - "System notification → auto-filter + separate folder"
    pause_processing:
      - "You are angry (never respond with anger)"
      - "You are exhausted (poor decisions under fatigue)"
      - "Email is ambiguous and you're projecting intent (re-read tomorrow)"

