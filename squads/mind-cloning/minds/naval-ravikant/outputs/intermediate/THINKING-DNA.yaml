## META-PATTERNS (Cross-Phase Insights)

decision_meta_architecture:
  core_algorithm: "Elimination > Selection (via negativa)"
  description: "Naval doesn't pick winners; he avoids losers. Apophatic epistemology."
  quote: "I try to eliminate what's not going to work. I think being successful is just about not making mistakes."
  source: "almanack-naval-ravikant.md"

thinking_operating_system:
  base_layer: "First principles (math, physics, evolution, game theory)"
  middleware: "Mental models (principal-agent, prisoner's dilemma, leverage)"
  application_layer: "Domain-specific heuristics (startups, investing, life)"
  quote: "Mental models are really just compact ways for you to recall your own knowledge."
  source: "almanack-naval-ravikant.md"

