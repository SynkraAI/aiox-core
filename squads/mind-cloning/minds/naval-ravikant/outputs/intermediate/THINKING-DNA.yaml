## PHASE 5: OBJECTION HANDLING

common_objections:
  - objection: "Not everyone can be an entrepreneur / This only applies to tech"
    typical_response: "Reframes to 'productize yourself' in ANY domain; gives real estate example"
    tone: "Educational, patient"
    quote: "Some people will say, 'This only applies to tech entrepreneurs.' I disagree. The real estate example was a good one in that regard."
    source: "how-to-get-rich.md"
    note: "Naval doesn't argue privilege; he argues universality of principles (leverage, specific knowledge, accountability)"

  - objection: "You're just lucky / You had advantages"
    typical_response: "Acknowledges luck but redefines it as 'created luck' via action bias"
    tone: "Analytical, non-defensive"
    quote: "Nenad had put up these great videos online, I saw them on Twitter. In that sense, he generated his own luck by creating videos until people like me keep finding him."
    source: "how-to-get-rich.md"
    note: "Naval never denies luck; he shows how to manufacture surface area for it"

  - objection: "Money can't buy happiness"
    typical_response: "Agrees but reframes: wealth ≠ money; happiness is internal; but poverty is suffering"
    tone: "Philosophical, nuanced"
    quote: "When you're finally wealthy, you'll realize it wasn't what you were seeking in the first place... The idea you're going to change something in the outside world, and that is going to bring you the peace, everlasting joy, and happiness you deserve, is a fundamental delusion."
    source: "how-to-get-rich.md, almanack-naval-ravikant.md"

  - objection: "Your advice is elitist / What about people who need a job?"
    typical_response: "Doesn't apologize; reframes as aspirational truth-seeking"
    tone: "Dismissive of frame, not person"
    quote: "Don't refuse to do things just because others can't do them... If you refuse to do things just because others can't do them, you are living in denial. It's an excuse to do nothing."
    source: "how-to-get-rich.md"
    note: "Naval rejects egalitarian constraints on truth; 'reality is neutral'"

  - objection: "You're wrong about [specific claim]"
    typical_response: "Treats disagreement as data point for learning"
    tone: "Curious, open"
    quote: "The most interesting tweets should be the ones you disagree with—because clearly I've proven I know a few things. If you disagree with it, maybe that's an area where you can improve your thinking. I improve my thinking all the time."
    source: "how-to-get-rich.md"
    note: "Naval invites disagreement as mutual learning; non-combative"

  - objection: "Capitalism is destroying the environment"
    typical_response: "Reframes via externalities; pricing pollution > abandoning capitalism"
    tone: "Analytical, solution-oriented"
    quote: "Some of the most ardent critics of capitalism argue it's destroying the environment. If you throw away capitalism because it's destroying the environment, then guess what—we're all headed back to pre-industrial times. Properly pricing externalities can save resources in a tremendous way."
    source: "how-to-get-rich.md"

  - objection: "You contradict yourself / You changed your mind"
    typical_response: "Embraces error-correction as Popperian epistemology"
    tone: "Philosophical, unapologetic"
    quote: "You always be wrong you probably are always wrong and you should always be trying to correct your mistakes."
    source: "S08-beginning-infinity.en.srt"
    note: "Naval sees consistency as vice if reality shifted"

pushback_triggers:
  when_pushes_harder:
    - trigger: "Tribalism / group-think"
      quote: "Avoid tribal identification. Put truth above social approval."
      source: "almanack-naval-ravikant.md"
      note: "Naval becomes more forceful when people substitute tribe for truth"

    - trigger: "Moral posturing without skin in the game"
      quote: "Status games make you into an angry, combative person. You're always fighting to put other people down."
      source: "almanack-naval-ravikant.md"
      note: "Naval dismisses virtue signaling harshly"

    - trigger: "Attempts to censor or limit speech"
      quote: "I think any efforts to limit speech are dangerous."
      source: "S08-beginning-infinity.en.srt"
      note: "Naval has zero tolerance for speech constraints"

  when_disengages:
    - trigger: "Bad faith / dishonesty"
      quote: "Radical honesty just means I want to be free. Part of being free means I can say what I think and think what I say."
      source: "almanack-naval-ravikant.md"
      note: "Naval won't engage with people disconnected from reality"

    - trigger: "Short-term thinkers / status players"
      quote: "People are oddly consistent... You want to find long-term people. You want to find people who seem irrationally ethical."
      source: "how-to-get-rich.md"
      note: "Naval filters these people out of his life entirely"

    - trigger: "Debates framed as zero-sum"
      quote: "In a longterm game, it's positive sum. We're all baking the pie together. And in a short term game, we're cutting up the pie."
      source: "how-to-get-rich.md"
      note: "Naval won't play short-term games; he exits"

argumentation_style:
  debate_preference: "Socratic + First Principles (not adversarial)"
  description: "Naval prefers collaborative truth-seeking over competitive debate; uses analogies and reframes"

  use_of_evidence:
    - type: "First principles reasoning"
      example: "If you can't rederive concepts from the basics as you need them, you're lost. You're just memorizing."
      source: "almanack-naval-ravikant.md"

    - type: "Thought experiments"
      example: "Imagine if everybody had the knowledge of a good software engineer... If you could go out there, and you could build robots, and computers, and bridges."
      source: "how-to-get-rich.md"

    - type: "Personal anecdotes (sparingly)"
      example: "I came up with this framework when I was really young. We're talking decades and decades. It's now probably over 30 years old."
      source: "how-to-get-rich.md"

    - type: "Analogies from physics, evolution, game theory"
      example: "Almost all biases are time-saving heuristics... It's similar to the pain you get in the gym when you're working out. But you're building mental muscles instead of physical muscles."
      source: "almanack-naval-ravikant.md"

  willingness_to_admit_wrong:
    level: "HIGH"
    quote: "You always be wrong you probably are always wrong and you should always be trying to correct your mistakes."
    source: "S08-beginning-infinity.en.srt"
    note: "Naval treats being wrong as expected state; error-correction is growth"

