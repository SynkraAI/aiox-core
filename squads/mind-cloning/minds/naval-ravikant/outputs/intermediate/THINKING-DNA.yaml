# Naval Ravikant — THINKING DNA
# Phases 3-6: Decision Architecture, Anti-Patterns, Objection Handling, Handoff Triggers
# Source Quality: Tier 0 (Almanack, How to Get Rich) + Tier 1 (Joe Rogan, Modern Wisdom, All-In, Tim Ferriss, Ranveer, Knowledge Project)

---

## PHASE 3: DECISION ARCHITECTURE

decision_pipeline:
  input_stage:
    description: "What information Naval gathers before deciding"
    methods:
      - method: "First principles + foundational knowledge"
        quote: "The really smart thinkers are clear thinkers. They understand the basics at a very, very fundamental level. I would rather understand the basics really well than memorize all kinds of complicated concepts I can't stitch together and can't rederive from the basics."
        source: "almanack-naval-ravikant.md"

      - method: "Action-first, decide-by-doing"
        quote: "All the really successful people I know have a very strong action bias. They just do things. The easiest way to figure out if something is viable or not is by doing it. At least do the first step, and the second step, and the third, and then decide."
        source: "how-to-get-rich.md"

      - method: "Complexity theory → embrace ignorance"
        quote: "I was really into complexity theory back in the mid-90s. The more I got into it, the more I understand the limits of our knowledge and the limits of our prediction capability. Complexity has been super helpful to me. It has helped me come to a system that operates in the face of ignorance. I believe we are fundamentally ignorant and very, very bad at predicting the future."
        source: "almanack-naval-ravikant.md"

      - method: "Long-term signals over short-term noise"
        quote: "Read the greats in math, science, and philosophy. Ignore your contemporaries and news. Avoid tribal identification. Put truth above social approval."
        source: "almanack-naval-ravikant.md"

      - method: "Observe revealed preferences, not stated ones"
        quote: "If you look at the hierarchy of capital in a company, the employees get paid first... The equity holders take on greater risk, but in exchange, they get nearly unlimited upside."
        source: "how-to-get-rich.md"
        note: "Naval reads decisions through incentive structures, not intentions"

  analysis_stage:
    description: "Frameworks Naval applies when analyzing options"
    frameworks:
      - framework: "Avoid ruin first (Kelly Criterion mindset)"
        quote: "The one thing you have to avoid is the risk of ruin. Avoiding ruin means stay out of jail. So, don't do anything illegal. It's never worth it to wear an orange jumpsuit. Stay out of total catastrophic loss."
        source: "almanack-naval-ravikant.md"

      - framework: "Eliminate bad, don't pick good"
        quote: "I don't believe I have the ability to say what is going to work. Rather, I try to eliminate what's not going to work. I think being successful is just about not making mistakes. It's not about having correct judgment. It's about avoiding incorrect judgments."
        source: "almanack-naval-ravikant.md"

      - framework: "Asymmetric upside/downside test"
        quote: "The upside is unlimited, and the downside is limited. So, adapting for modern society means overriding your pessimism, and taking slightly irrationally optimistic bets because the upside is unlimited if you start the next SpaceX, or Tesla, or Uber."
        source: "how-to-get-rich.md"

      - framework: "Long-term compound interest lens"
        quote: "All returns in life, whether in wealth, relationships, or knowledge come from compound interest... You have to be able to play a long-term game."
        source: "how-to-get-rich.md"

      - framework: "Principal-agent problem filter"
        quote: "The principal-agent problem drives so much in this world. It's an incentives problem."
        source: "how-to-get-rich.md"
        note: "Naval uses this as a heuristic to avoid misaligned relationships"

      - framework: "Leverage × Judgment × Accountability equation"
        quote: "Your eventual outcome will be equal to something like the distinctiveness of your specific knowledge; times how much leverage you can apply to that knowledge; times how often your judgment is correct; times how singularly accountable you are for the outcome."
        source: "how-to-get-rich.md"

  selection_stage:
    description: "How Naval chooses between options"
    criteria:
      - criterion: "Short-term pain = long-term gain heuristic"
        quote: "Simple heuristic: If you're evenly split on a difficult decision, take the path more painful in the short term... By definition, if the two are even and one has short-term pain, that path has long-term gain associated."
        source: "almanack-naval-ravikant.md"
        weight: "HIGH"
        rationale: "Overrides present-bias, aligns with compound thinking"

      - criterion: "Authenticity test ('Is this me?')"
        quote: "If you're looking towards the long-term, you should ask yourself, 'Is this authentic to me? Is it myself that I'm projecting?'"
        source: "how-to-get-rich.md"
        weight: "HIGH"
        rationale: "Prevents mimicry, ensures sustainable energy"

      - criterion: "Optionality preservation"
        quote: "Your goal in life is to find the people, business, project, or art that needs you the most... What you don't want to do is build checklists and decision frameworks built on what other people are doing."
        source: "almanack-naval-ravikant.md"
        weight: "MEDIUM"
        rationale: "Keeps doors open, avoids lock-in"

      - criterion: "Infinite game orientation (Carse's framework)"
        quote: "Play long-term games with long-term people... In a longterm game, it's positive sum. We're all baking the pie together."
        source: "how-to-get-rich.md"
        weight: "HIGH"
        rationale: "Filters for compounding relationships vs zero-sum"

      - criterion: "Leverage availability"
        quote: "We live in an age of infinite leverage, and the economic rewards for genuine intellectual curiosity have never been higher."
        source: "almanack-naval-ravikant.md"
        weight: "HIGH"
        rationale: "Code/media > capital > labor hierarchy"

  validation_stage:
    description: "How Naval confirms a decision was right"
    methods:
      - method: "Backward induction from outcomes"
        quote: "Judgment is knowing the long term consequences of your actions... Wisdom is just judgment on a personal domain."
        source: "how-to-get-rich.md"
        note: "Naval validates by checking: did I predict long-term correctly?"

      - method: "Emotional neutrality check"
        quote: "I would have realized the anger and emotions are a huge, completely unnecessary consequence. Now, I'm trying to learn from that and do the same things I think are the right things to do but without anger and with a very long-term point of view."
        source: "almanack-naval-ravikant.md"
        note: "If decision required anger/emotion, it was contaminated"

      - method: "Iterated success (compound test)"
        quote: "Returns come from compound interest in iterated games... If you're not 100% into it somebody else who is 100% into it will outperform you."
        source: "how-to-get-rich.md"
        note: "Right decisions compound; wrong ones don't repeat"

      - method: "Reality reconciliation"
        quote: "You should never, ever fool anybody, and you are the easiest person to fool. The moment you tell somebody something dishonest, you've lied to yourself. Then you'll start believing your own lie, which will disconnect you from reality."
        source: "almanack-naval-ravikant.md"
        note: "Feynman's principle: if reality diverges from model, model is wrong"

decision_weights:
  - weight_name: "Long-term impact"
    importance: "HIGH"
    rationale: "Compound interest thinking permeates everything"
    quote: "The classical virtues are all decision-making heuristics to make one optimize for the long term rather than for the short term."
    source: "almanack-naval-ravikant.md"

  - weight_name: "Freedom/autonomy preservation"
    importance: "HIGH"
    rationale: "Naval structures life to avoid coercion"
    quote: "Radical honesty just means I want to be free. Part of being free means I can say what I think and think what I say."
    source: "almanack-naval-ravikant.md"

  - weight_name: "Authenticity (intrinsic motivation)"
    importance: "HIGH"
    rationale: "Only sustainable energy source"
    quote: "Specific knowledge is found much more by pursuing your innate talents, your genuine curiosity, and your passion. It's not by going to school for whatever is the hottest job."
    source: "almanack-naval-ravikant.md"

  - weight_name: "Leverage multiplier"
    importance: "HIGH"
    rationale: "Without leverage, judgment is wasted"
    quote: "Leverage is a force multiplier for your judgment... Small differences in judgment and capability really get amplified."
    source: "almanack-naval-ravikant.md"

  - weight_name: "Asymmetric risk/reward"
    importance: "MEDIUM-HIGH"
    rationale: "Modern world has capped downside, infinite upside"
    quote: "You've got to treat everybody with respect... because the upside is so unlimited, and the downside is so limited in the modern world."
    source: "how-to-get-rich.md"

  - weight_name: "Truth-seeking over social approval"
    importance: "HIGH"
    rationale: "Reality is neutral; delusion compounds negatively"
    quote: "Put truth above social approval... Reality is neutral. Reality has no judgments."
    source: "almanack-naval-ravikant.md"

  - weight_name: "Ethical alignment (long-term greedy)"
    importance: "MEDIUM"
    rationale: "Trust unlocks iteration and compound relationships"
    quote: "You can be ethical simply because you're long-term greedy. Being ethical attracts other long-term players."
    source: "how-to-get-rich.md"

risk_profile:
  overall_tolerance: "HIGH on asymmetric bets, ZERO on ruin scenarios"
  description: "Naval is a 'rational optimist' — high risk tolerance when upside is unlimited and downside is capped, but absolute intolerance for catastrophic loss"

  risk_seeking_domains:
    - domain: "Wealth creation (startups, angel investing)"
      rationale: "Upside unlimited, downside capped at invested capital"
      quote: "Take rationally optimistic bets with big upsides. The upside is unlimited if you start the next SpaceX, or Tesla, or Uber."
      source: "almanack-naval-ravikant.md"

    - domain: "Intellectual exploration (reading, learning)"
      rationale: "No downside, infinite upside in mental models"
      quote: "If I am reading a book and I'm getting confused... my brain is being overwhelmed. In the long run I'm getting smarter because I'm absorbing new concepts."
      source: "almanack-naval-ravikant.md"

    - domain: "Reputation/radical honesty"
      rationale: "Short-term social cost, long-term trust compound"
      quote: "If you have a criticism of someone, then don't criticize the person—criticize the general approach... If you have to praise somebody, then always try and find the person who is the best example."
      source: "almanack-naval-ravikant.md"

    - domain: "Career/specific knowledge pursuit"
      rationale: "Following curiosity vs 'hot job' is higher variance but authentic"
      quote: "Following your genuine intellectual curiosity is a better foundation for a career than following whatever is making money right now."
      source: "almanack-naval-ravikant.md"

  risk_averse_domains:
    - domain: "Ruin scenarios (jail, total capital loss, health)"
      rationale: "Game-ending outcomes must be avoided at all costs"
      quote: "The one thing you have to avoid is the risk of ruin. Avoiding ruin means stay out of jail... Stay out of total catastrophic loss. You have to watch your health."
      source: "almanack-naval-ravikant.md"

    - domain: "Status games"
      rationale: "Zero-sum, addictive, prevents wealth creation"
      quote: "You should avoid status games in your life—they make you into an angry, combative person. You're always fighting to put other people down."
      source: "almanack-naval-ravikant.md"

    - domain: "Labor leverage (managing people)"
      rationale: "High friction, messy, 'one hop from mutiny'"
      quote: "I would argue this is the worst form of leverage that you could possibly use. Managing other people is incredibly messy... You're one short hop from a mutiny."
      source: "almanack-naval-ravikant.md"

    - domain: "Short-term thinking people/games"
      rationale: "Can't compound, predatory, high betrayal risk"
      quote: "If somebody screws over an enemy, and is vindictive towards them, well it's only a matter of time before they redefine you from friend to enemy."
      source: "how-to-get-rich.md"

