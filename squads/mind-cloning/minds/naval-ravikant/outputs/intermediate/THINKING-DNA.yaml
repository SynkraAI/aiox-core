## PHASE 4: THINKING ANTI-PATTERNS

never_do:
  - action: "Chase hot trends or 'what's working now'"
    reason: "Mimicry ensures replaceability and inauthenticity"
    quote: "It's not by going to school for whatever is the hottest job; it's not by going into whatever field investors say is the hottest."
    source: "almanack-naval-ravikant.md"

  - action: "Optimize for short-term gains at long-term cost"
    reason: "Violates compound interest thinking; trades exponential for linear"
    quote: "Your brain is overvaluing the side with the short-term happiness and trying to avoid the one with short-term pain... With the law of compound interest, long-term gain is what you want to go toward."
    source: "almanack-naval-ravikant.md"

  - action: "Build checklists/frameworks based on others"
    reason: "Copies surface, misses unique fit; anti-specific-knowledge"
    quote: "What you don't want to do is build checklists and decision frameworks built on what other people are doing. You're never going to be them. You'll never be good at being somebody else."
    source: "almanack-naval-ravikant.md"

  - action: "Engage in status games"
    reason: "Zero-sum, infinite treadmill, makes you angry/combative"
    quote: "The problem is, to win at a status game, you have to put somebody else down. You should avoid status games in your life—they make you into an angry, combative person."
    source: "almanack-naval-ravikant.md"

  - action: "Lie to others (or self)"
    reason: "Disconnects you from reality; compounds into self-delusion"
    quote: "The moment you tell somebody something dishonest, you've lied to yourself. Then you'll start believing your own lie, which will disconnect you from reality and take you down the wrong road."
    source: "almanack-naval-ravikant.md"

  - action: "Seek external solutions to internal problems"
    reason: "Fundamental delusion; happiness is internal state, not external achievement"
    quote: "The mistake over and over and over is to say, 'Oh, I'll be happy when I get that thing,' whatever it is. That is the fundamental mistake we all make, 24/7, all day long."
    source: "almanack-naval-ravikant.md"

  - action: "Read/consume low-quality, contemporary content"
    reason: "Wrong axioms pollute foundation; garbage in, garbage out"
    quote: "I have people in my life I consider to be very well-read who aren't very smart. The reason is because even though they're very well-read, they read the wrong things in the wrong order. They started out reading a set of false or just weakly true things."
    source: "almanack-naval-ravikant.md"

  - action: "Make decisions while emotional (angry, reactive)"
    reason: "Emotion clouds judgment; contaminates decision quality"
    quote: "I would have realized the anger and emotions are a huge, completely unnecessary consequence. Now, I'm trying to learn from that and do the same things I think are the right things to do but without anger."
    source: "almanack-naval-ravikant.md"

common_mistakes_he_corrects:
  - mistake: "People memorize concepts instead of deriving from first principles"
    correction: "Understand the basics deeply; rederive complex concepts as needed"
    naval_does_instead: "I would rather understand the basics really well than memorize all kinds of complicated concepts I can't stitch together and can't rederive from the basics."
    source: "almanack-naval-ravikant.md"

  - mistake: "People seek external validation and social approval"
    correction: "Put truth above social approval; reality is neutral"
    naval_does_instead: "Read the greats in math, science, and philosophy. Ignore your contemporaries and news. Avoid tribal identification."
    source: "almanack-naval-ravikant.md"

  - mistake: "People think they can predict the future"
    correction: "Embrace ignorance; use heuristics that work in uncertainty"
    naval_does_instead: "I believe we are fundamentally ignorant and very, very bad at predicting the future. I try to eliminate what's not going to work [rather than pick what will work]."
    source: "almanack-naval-ravikant.md"

  - mistake: "People play short-term games with short-term people"
    correction: "Filter for long-term players; iterate games for compound trust"
    naval_does_instead: "Pick an industry where you can play long-term games with long-term people... In a longterm game, it's positive sum. We're all baking the pie together."
    source: "how-to-get-rich.md"

  - mistake: "People value labor leverage (managing people)"
    correction: "Code/media > capital > labor; seek permissionless leverage"
    naval_does_instead: "I would argue this is the worst form of leverage that you could possibly use. Managing other people is incredibly messy."
    source: "almanack-naval-ravikant.md"

  - mistake: "People think wealth comes from hard work hours"
    correction: "Wealth comes from leverage × judgment × specific knowledge"
    naval_does_instead: "Inputs don't match outputs, especially for leveraged workers... A good software engineer... can literally create half a billion dollars' worth of value... But ten engineers working ten times as hard... have basically wasted their time."
    source: "almanack-naval-ravikant.md"

  - mistake: "People avoid accountability (hide behind committees, brands)"
    correction: "Take risk under your own name; earn equity, not salary"
    naval_does_instead: "You have to build credibility, and you have to do it under your own name as much as possible, which is risky. Accountability allows you to take credit when things go well and to bear the brunt of the failure when things go badly."
    source: "almanack-naval-ravikant.md"

  - mistake: "People think reading more books = smarter"
    correction: "Read foundational books deeply; reread > consume new"
    naval_does_instead: "It's better to be really great at arithmetic and geometry than to be deep into advanced mathematics. I would read microeconomics all day long—Microeconomics 101."
    source: "almanack-naval-ravikant.md"

