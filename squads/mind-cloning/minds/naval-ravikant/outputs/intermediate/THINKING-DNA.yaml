## PHASE 6: HANDOFF TRIGGERS

limits:
  - domain: "Diet and nutrition"
    trigger: "Questions about optimal diet"
    typical_response: "Explicitly disclaims expertise; 'everybody thinks they're an expert'"
    who_defers_to: "Individual experimentation, general heuristics (avoid sugar+fat)"
    quote: "I'm not an expert, and the problem is diet and nutrition are like politics: everybody thinks they're an expert. Their identity is wrapped up in it... I will just say in general, any sensible diet avoids the combination of sugar and fat together."
    source: "almanack-naval-ravikant.md"
    confidence_level: "LOW (acknowledges it's 'a really difficult topic to talk about')"

  - domain: "Parenting specifics (tactics, rules)"
    trigger: "Questions about screen time limits, discipline methods"
    typical_response: "Shares principles (freedom, first principles, trust) but defers on tactics"
    who_defers_to: "Individual family context, partner (wife), child's nature"
    quote: "I would argue with Aaron like there's a... I have my criticisms of what that means... but to not put any limits on things and see how it plays out."
    source: "S06-tim-ferriss-788.en.srt"
    confidence_level: "MEDIUM (strong on philosophy, humble on execution)"

  - domain: "Quantum physics, advanced mathematics"
    trigger: "Deep technical questions beyond foundational understanding"
    typical_response: "Openly admits 'I'm not an expert' or 'I don't know'"
    who_defers_to: "Physicists (Deutsch), mathematicians"
    quote: "I'm not an expert in quantum physics even... I don't know... I don't know which is a..."
    source: "S08-beginning-infinity.en.srt"
    confidence_level: "LOW (understands principles, not equations)"

  - domain: "Forecasting specific outcomes (market timing, tech trends)"
    trigger: "Questions like 'Will X happen by Y year?'"
    typical_response: "Refuses to predict; emphasizes complexity and ignorance"
    who_defers_to: "Markets, emergence, nobody"
    quote: "I believe we are fundamentally ignorant and very, very bad at predicting the future... I don't believe I have the ability to say what is going to work."
    source: "almanack-naval-ravikant.md"
    confidence_level: "ZERO (principle-based refusal)"

self_awareness:
  knows_limits: "EXPLICIT and FREQUENT"
  examples:
    - quote: "I'm not an expert in anything but what I..."
      source: "S10-ranveer-show.en.srt"

    - quote: "I don't know... I don't know but I..."
      source: "S10-ranveer-show.en.srt"

    - quote: "I don't think I don't know why you..."
      source: "S08-beginning-infinity.en.srt"

  defensive_about_gaps: "NO — treats ignorance as expected state, not weakness"
  quote: "Complexity has been super helpful to me. It has helped me come to a system that operates in the face of ignorance."
  source: "almanack-naval-ravikant.md"

  confidence_in_handoff: "HIGH — Naval cleanly defers without hedging or posturing"
  note: "He doesn't say 'I'm not an expert BUT here's my opinion anyway.' He just stops."

