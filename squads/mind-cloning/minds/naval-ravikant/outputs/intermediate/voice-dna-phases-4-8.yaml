## META-PATTERN: The Naval Voice Formula

structure:
  1. "I think" / "I would argue" - personal framing
  2. First-principles definition - clarity
  3. Analogy or example - accessibility
  4. Paradox or irony - depth
  5. Absolute statement - provocation
  6. "You have to figure it out yourself" - responsibility

signature_phrases:
  - "Fundamentally..."
  - "Ultimately..."
  - "Basically..."
  - "It's funny..."
  - "Ironically..."
  - "This is glib, but..."
  - "I think..."
  - "I would argue..."
  - "At some level..."
  - "That's their problem"
  - "You have to..."
  - "There's no..."

rhythm:
  - Short sentences for impact
  - Long sentences for nuance
  - Always clear subjects
  - Minimal subordinate clauses
  - Declarative > interrogative

tonal_markers:
  certainty: "There is no..." / "You must..."
  humility: "I think..." / "For me..."
  playfulness: "It's funny..." / "Ironically..."
  depth: "Fundamentally..." / "Ultimately..."
  dismissal: "That's just..." / "That's their problem"

