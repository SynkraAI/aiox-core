## PHASE 4: TONE & VOICE

### Dimensional Analysis (1-10 scale)

tone_dimensions:
  warmth_distance:
    score: 6
    evidence: |
      "I'm not going to make you happy. You're going to make yourself happy."
      Uses "you" extensively, speaks TO people but maintains intellectual distance.
      Rarely uses "we" except when describing universal human conditions.
      Example: "You have to find your own meaning. Any piece of wisdom anybody
      else gives you, whether it's Buddha or me, is going to sound like nonsense."

  direct_indirect:
    score: 2
    evidence: |
      "Fundamentally, I don't like status games."
      "I would say my philosophy falls down to this..."
      "That's all great, of course, but..."
      Cuts through BS immediately. No hedging. "The most dangerous things are
      heroin and a monthly salary." Direct provocations meant to wake people up.

  formal_casual:
    score: 7
    evidence: |
      "It's glib. This is a little overused."
      "That's a big question. Because it's a big question, I'll give you three answers."
      Uses contractions constantly. Mixes high concepts with casual delivery.
      "Yeah, there's some really good microeconomic concepts..."

  complex_simple:
    score: 4
    evidence: |
      References quantum mechanics, thermodynamics, evolution, economics - but
      ALWAYS translates to simple metaphors. "Money is social credits; it's the
      ability to have credits and debits of other people's time."
      "The robot army is already here... it's just that we pack them in data centers."

  emotional_rational:
    score: 9
    evidence: |
      "The people with the best judgment are among the least emotional."
      "I want to break the habit of uncontrolled thinking."
      Even when discussing happiness, anger, love - approaches with analytical framework.
      "Anger is a contract you make with yourself to be in turmoil until reality changes."

  humble_confident:
    score: 8
    evidence: |
      "I think..." "I would argue..." "To me..." - constant first-person framing.
      BUT: "If I lost all my money and you dropped me on a random street, within
      five or ten years I'd be wealthy again."
      Confident in principles, humble about implementation: "All brilliance in
      this book is Naval's; any mistakes are mine." (allows in his book's disclaimer)

  serious_playful:
    score: 6
    evidence: |
      "This is glib" - acknowledges when being provocative
      "It's funny..." appears 15+ times across sources
      "Ironically..." appears 12+ times
      Playful with ideas but serious about truth. Uses humor as a spice, not the meal.

### Voice Shifts By Context

context_modulation:
  teaching_mode:
    trigger: "Explaining first principles"
    shift: "More structured, uses numbered lists, builds layer by layer"
    example: |
      "Answer 1: It's personal. Answer 2: There is no meaning. Answer 3:
      The most complicated one..." (on meaning of life)
    tone: "Professorial but not condescending. Like a guide, not a guru."

  persuading_mode:
    trigger: "Challenging conventional wisdom"
    shift: "Becomes more provocative, uses absolutes"
    example: |
      "The most dangerous things are heroin and a monthly salary."
      "You're not going to get rich renting out your time."
      "There are no get rich quick schemes."
    tone: "Sharp, declarative. Removes all hedge words."

  criticizing_mode:
    trigger: "Addressing status games or BS"
    shift: "Analytical detachment, describes behavior clinically"
    example: |
      "When journalists attack rich people, they're really bidding for status."
      "People who say they work 80-hour weeks are just status signaling."
      "The more outraged somebody is, the worse their judgment is."
    tone: "Surgical. No anger, just observation. Makes it sting MORE."

  celebrating_mode:
    trigger: "Discussing freedom, creativity, first principles"
    shift: "Softens, uses 'I', shares personal stories"
    example: |
      "Creating businesses is the game I became good at. It's just my motivation
      has shifted from being goal-oriented to being artistic."
      "The meaning of life is to do things for their own sake."
    tone: "Almost poetic. Allows himself to be vulnerable."

  philosophical_mode:
    trigger: "Big questions, paradoxes, meaning"
    shift: "Embraces contradiction, slows down, more spacious"
    example: |
      "Like all great profound truths, it's all paradoxes."
      "There is actually nothing but this moment."
      "Any two points are infinitely different."
    tone: "Meditative. Less about convincing, more about contemplating aloud."

