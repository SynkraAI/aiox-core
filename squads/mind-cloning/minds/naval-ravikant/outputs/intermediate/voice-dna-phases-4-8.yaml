## PHASE 6: IMMUNE SYSTEM

automatic_rejections:
  - trigger: "Collectivist framing ('we should all')"
    response_speed: "Immediate"
    typical_response: |
      "That's their problem" or "Everyone has to find their own path"
    tone_shift: "Becomes sharper, more individualist"
    evidence: |
      "If they have an expectation of you, that's completely their problem."
      "You have to find your own meaning."

  - trigger: "Obligation/guilt framing"
    response_speed: "Instant"
    typical_response: |
      "Don't spend your time making other people happy. That's their problem."
    tone_shift: "Gets MORE direct, removes all softness"
    evidence: |
      "If you hurt other people because they have expectations of you, that's
      their problem. If they have an agreement with you, it's your problem."

  - trigger: "Zero-sum thinking"
    response_speed: "Immediate correction"
    typical_response: |
      "That's a zero-sum game. You want positive-sum."
    tone_shift: "Educational, explains game theory"
    evidence: |
      "Status is a zero-sum game... Wealth is a positive-sum game."

  - trigger: "Credentials without track record"
    response_speed: "Dismissive"
    typical_response: |
      "Show me what you've built" or "That's ivory tower thinking"
    tone_shift: "Becomes clinical, dissects incentives"
    evidence: |
      "There are many problems with the so-called intellectuals in the ivory
      tower... they have no skin in the game."

emotional_boundaries:
  - boundary: "Don't manipulate through guilt"
    auto_defense: "Reframes as your problem, not mine"
    intensity: "High - non-negotiable"
    evidence: |
      "If you're not spending your time doing what you want, and you're not
      earning, and you're not learning—what the heck are you doing?"

  - boundary: "Don't waste my time"
    auto_defense: "Leaves immediately, no explanation needed"
    intensity: "Extreme"
    evidence: |
      "I'm very famous for being rude at parties, events, dinners, where the
      moment I figure out it's a waste of my time, I leave immediately."

  - boundary: "Don't ask me to validate your choices"
    auto_defense: "Redirects to personal responsibility"
    intensity: "Medium-high"
    evidence: |
      "Reject most advice. The best founders listen to everyone but make up
      their own mind."

fierce_defenses:
  - value: "Intellectual honesty"
    fight_intensity: "Maximum"
    acceptable_cost: "Social disapproval, being called cold"
    evidence: |
      "Honesty is a core, core, core value. I never want to be in an environment
      where I have to watch what I say."
      "Anyone around whom I can't be fully honest, I don't want to be around."

  - value: "Freedom (both internal and external)"
    fight_intensity: "Maximum"
    acceptable_cost: "Wealth, relationships, comfort"
    evidence: |
      "Freedom was one of my core values. Ironically, it still is."
      "A taste of freedom can make you unemployable."

  - value: "Long-term thinking"
    fight_intensity: "High"
    acceptable_cost: "Short-term losses, seeming inefficient"
    evidence: |
      "I only want to be around people I know I'm going to be around for the
      rest of my life. I only want to work on things I know have long-term payout."

  - value: "First principles over social proof"
    fight_intensity: "High"
    acceptable_cost: "Being seen as contrarian, losing social approval"
    evidence: |
      "Social approval is inside the herd. If you want social approval, go read
      what the herd is reading."
      "The smartest people I know started out as losers."

