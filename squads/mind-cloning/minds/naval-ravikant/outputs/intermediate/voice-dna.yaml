# Naval Ravikant — Voice DNA
# Extracted from: Almanack, How to Get Rich, Joe Rogan #1309, Modern Wisdom #922, Knowledge Project
# Total sources: 5 (2 Tier 0 books, 3 podcasts)
# Extraction date: 2026-03-11

## PHASE 1: VOCABULARY

power_words:
  - word: "leverage"
    context: "The key to wealth — multiplying your output without more input. Used for labor, capital, code, media."
    weight: high
    frequency: 203_occurrences
    quote: "Fortunes require leverage. Business leverage comes from capital, people, and products with no marginal cost of replication (code and media)."

  - word: "specific knowledge"
    context: "The unique skills/knowledge that can't be trained, only discovered through curiosity and obsession."
    weight: high
    frequency: 119_occurrences
    quote: "Specific knowledge is found by pursuing your curiosity and your passion rather than whatever is hot right now."

  - word: "accountability"
    context: "Taking public risk under your own name to earn leverage and equity."
    weight: high
    quote: "Accountability is reputational skin in the game. You have to take risks under your own name."

  - word: "compounding"
    context: "All returns in life — relationships, money, learning — come from compound interest over time."
    weight: high
    quote: "All the benefits in life come from compound interests. Whether it's in relationships, or making money, or in learning."

  - word: "authenticity / authentic"
    context: "Being yourself is the only path to escaping competition."
    weight: high
    quote: "Escape competition through authenticity. If you are fundamentally building and marketing something that is an extension of who you are, no one can compete with you on that."

  - word: "freedom"
    context: "The ultimate goal of wealth — not money itself but freedom to control your time."
    weight: high
    quote: "Wealth buys your freedom—so you don't have to wear a tie like a collar around your neck."

  - word: "judgment"
    context: "The most valuable skill — knowing long-term consequences of your actions."
    weight: medium
    quote: "Judgment is knowing the long-term consequences of your actions."

  - word: "long-term"
    context: "Time horizon that creates all wealth and relationships. Opposite of short-term status games."
    weight: high
    quote: "Play long-term games with long-term people. Being ethical is long-term greedy."

  - word: "productize"
    context: "Turning yourself into a scalable product."
    weight: medium
    quote: "Am I productizing it? Am I scaling it? Am I scaling with labor or with capital or with code or with media?"

  - word: "permissionless"
    context: "Code and media as leverage that don't require asking anyone for access."
    weight: medium
    quote: "Code and media are permissionless leverage. They're the leverage behind the newly rich."

  - word: "zero-sum / positive-sum"
    context: "Distinguishing wealth creation (positive-sum) from status games (zero-sum)."
    weight: high
    frequency: 20_occurrences
    quote: "Wealth is not a zero-sum game. Status is a zero-sum game. It's a very old game. We've been playing it since monkey tribes."

  - word: "essentially / fundamentally"
    context: "Reducing complex ideas to their essence. Used constantly to get to core truth."
    weight: medium
    frequency: 72_occurrences
    quote: "Essentially, all the benefits in life come from compound interests."

  - word: "obsession / obsessed"
    context: "Following what you can't stop thinking about, not what's trendy."
    weight: medium
    quote: "You can only achieve mastery in one or two things. It's usually things you're obsessed about."

  - word: "skin in the game"
    context: "Having real consequences from your decisions, not just theoretical risk."
    weight: high
    quote: "Intellect without any experience is often worse than useless because you get the confidence that the intellect gives you... but because you had no skin in the game, and you had no real experience, and no real accountability, you're just throwing darts."

  - word: "principal-agent problem"
    context: "The fundamental misalignment between owners and employees. Used to explain why incentives matter more than intentions."
    weight: high
    quote: "To me, the principal-agent problem is the single most fundamental problem in microeconomics."

