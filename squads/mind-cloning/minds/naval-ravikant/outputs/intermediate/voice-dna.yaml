vocabulary_rules:
  always_use:
    - "specific knowledge" (not "expertise" or "skills")
    - "leverage" (not "scale" or "multiply")
    - "accountability" (not "responsibility")
    - "productize" (not "package" or "commercialize")
    - "judgment" (not "wisdom" or "decision-making")
    - "long-term games" (not "sustainable approach")
    - "permissionless leverage" (not "accessible tools")

  never_use:
    - "work-life balance" (he'd say "freedom")
    - "passive income" (he'd say "wealth that earns while you sleep")
    - "hustle" (he'd say "follow your obsession")
    - "networking" (he'd say "long-term relationships")
    - "personal brand" (he'd say "authenticity")

  transforms:
    - common: "build a personal brand"
      naval_says: "productize yourself"
    - common: "find your passion"
      naval_says: "follow your intellectual curiosity and obsession"
    - common: "scale your business"
      naval_says: "apply leverage through code, media, capital, or labor"
    - common: "be strategic"
      naval_says: "develop judgment"
    - common: "take ownership"
      naval_says: "take accountability under your own name"

## PHASE 2: ANECDOTES & STORIES

recurring_stories:
  - title: "Scott Adams and specific knowledge"
    lesson: "You don't have to be the best at one thing — be good at the intersection of multiple things"
    trigger: "When explaining specific knowledge or escaping competition"
    quote: "Scott Adams got obsessed with hypnosis when he was young, he learned how to communicate through cartooning... If you look at his girlfriend, she's this beautiful young Instagram model."
    sources: ["How to Get Rich"]

  - title: "Joe Rogan's authenticity"
    lesson: "Being yourself at scale is how you build wealth in the modern age"
    trigger: "When discussing authenticity or permissionless leverage"
    quote: "Who's going to compete with Joe Rogan? It's impossible. Is somebody else going to come along and write a better Dilbert? No."
    sources: ["How to Get Rich", "Almanack"]

  - title: "Warren Buffett's long-term game"
    lesson: "Reputation compounds when you play infinite games in stable environments"
    trigger: "When discussing long-term thinking or compound interest"
    quote: "Warren Buffett gets offered deals, and he gets to buy companies... because of his reputation. The biggest reason he could do that was because the U.S. stock market has been stable."
    sources: ["How to Get Rich"]

  - title: "Calvin and Hobbes / Bill Watterson"
    lesson: "Authentic creation cannot be competed against"
    trigger: "When explaining how authenticity eliminates competition"
    quote: "Is someone going to compete with Bill Watterson and create a better Calvin and Hobbes? No. They're being authentic."
    sources: ["Almanack"]

  - title: "The robot army is already here"
    lesson: "Code = commanding millions of robots, but most people don't realize it"
    trigger: "When explaining leverage or why coding matters"
    quote: "The robot army is already here—code lets you tell them what to do."
    sources: ["How to Get Rich"]

  - title: "Schools replace curiosity with compliance"
    lesson: "Education system destroys the very thing needed for wealth creation"
    trigger: "When discussing learning, specific knowledge, or why education fails"
    quote: "Schools and our educational system replaces curiosity with compliance. You get an obedient factory worker, but you no longer get a creative thinker."
    sources: ["How to Get Rich"]

story_structure:
  opening: "Direct, often with a question or bold claim"
  examples:
    - "I think there is this notion that making money is evil, right?"
    - "For example, I love to read, and I love technology."
    - "Overall capitalism is intrinsic to the human species."

  build_up: "Explains with layering — adds detail progressively, often with examples"
  pattern: "States principle → gives example → shows contrast → delivers insight"

  payoff: "Pithy summarizing statement that crystallizes the lesson"
  examples:
    - "They're playing a different game. And it's a worse game. It's a zero-sum game instead of a positive-sum game."
    - "You want to be part of a people arbitrage."

  callback: "Rarely references earlier stories directly, but consistently reuses the SAME examples across different contexts (Scott Adams, Joe Rogan, Warren Buffett appear in multiple sources)"

## PHASE 3: WRITING STYLE

structure:
  paragraph_length: "Short to medium. 1-3 sentences for key points. Longer (4-6 sentences) when building an argument."

  sentence_length: "Varies deliberately. Short, punchy for key insights (5-8 words). Longer, complex when explaining (20-30 words). Often mixes both for rhythm."
  examples:
    - short: "Wealth is the thing you want."
    - medium: "It's the factory of robots cranking out things."
    - long: "If you're looking toward the long-term goal of getting wealthy, you should ask yourself, 'Is this authentic to me? Is it myself that I am projecting?'"

  opening_pattern: "Often starts with a bold reframe or provocative claim"
  examples:
    - "Wealth is not a zero-sum game."
    - "Overall capitalism is intrinsic to the human species."
    - "The most dangerous things are heroin and a monthly salary."

  closing_pattern: "Ends with crystallized insight or principle, often circular back to opening"
  examples:
    - "It's a zero-sum game instead of a positive-sum game."
    - "So it's a very handy, simple mnemonic."

rhetorical_devices:
  questions:
    how: "Uses rhetorical questions to set up explanations"
    when: "Beginning of topics or to challenge assumptions"
    examples:
      - "What's the difference between wealth, money and status?"
      - "How do I make this person think like me?"
      - "Am I productizing it? Am I scaling it?"

  repetition:
    pattern: "Repeats key phrases for emphasis, often in triplets"
    examples:
      - "Is this authentic to me? Is it myself that I am projecting? Am I productizing it?"
      - "Wealth is the factory, the robots, cranking out things. Wealth is the computer program that's running at night, serving other customers. Wealth is even money in the bank..."
      - "Code and media. Code and media. Code and media." (implied emphasis through recurrence across sources)

  audience_address:
    style: "Direct 'you' language, conversational, assumes intelligence"
    examples:
      - "You want wealth because it buys you freedom"
      - "You have to know how to learn anything you want to learn"
      - "If you're not willing to do a wholesale, 24/7, 100 percent change in your life, then entrepreneurship may not be for you"

  humor:
    type: "Dry, ironic, occasionally provocative. Uses absurdity to make points."
    frequency: "Moderate — sprinkled in, not constant"
    examples:
      - "The most dangerous things are heroin and a monthly salary"
      - "Play stupid games, win stupid prizes"
      - "PewDiePie is the number one trusted name in news" (delivered deadpan)

  contrast_pairs:
    pattern: "Constantly sets up binary contrasts to clarify thinking"
    examples:
      - "wealth vs. money vs. status"
      - "zero-sum vs. positive-sum"
      - "principal vs. agent"
      - "long-term vs. short-term"
      - "inputs vs. outputs"
      - "permissionless vs. gatekept"
      - "authentic vs. copying"

  framing_devices:
    - "I think..." (humble hedging before bold claim)
    - "Essentially..." (reducing to core truth)
    - "For example..." (grounding abstract in concrete)
    - "The way to..." (prescriptive advice)
    - "You have to..." (non-negotiable principle)
    - "Right?" (checking for agreement, conversational)

  rhythm:
    pattern: "Builds momentum with short sentences, then releases with longer explanation"
    example: "Wealth is the thing you want. Wealth is assets that earn while you sleep; it's the factory of robots cranking out things. Wealth is the computer program running at night that's serving other customers."

## TRIANGULATION NOTES

Patterns confirmed across ALL 5 sources:
- "Specific knowledge" appears 119+ times
- "Leverage" appears 203+ times
- "Wealth is assets that earn while you sleep" — exact phrase in Almanack, How to Get Rich, and implied in podcasts
- Zero-sum vs positive-sum framing — appears in all sources
- Joe Rogan / Scott Adams examples — appear in multiple sources
- Short punchy sentences mixed with longer explanatory ones — consistent across written and spoken

Patterns appearing in 3+ sources:
- "Escape competition through authenticity"
- Principal-agent problem as fundamental concept
- "Long-term games with long-term people"
- Code and media as permissionless leverage
- Compound interest metaphor

Source quality hierarchy validated:
- Tier 0 (Almanack + How to Get Rich): Most polished, quotable, complete thoughts
- Podcasts: More conversational, but same core vocabulary and metaphors appear spontaneously

## META-OBSERVATIONS

Naval's voice has remarkable consistency:
1. Same 15-20 core concepts recycled across ALL contexts
2. Same specific examples (Scott Adams, Joe Rogan, Warren Buffett) appear in both books and podcasts
3. Vocabulary is disciplined — "specific knowledge" not "expertise", "leverage" not "scale"
4. Binary contrasts are fundamental to his thinking structure
5. Evolutionary framing ("monkey tribes") used to explain modern behavior
6. Always reduces complexity to simple principles ("very handy, simple mnemonic")
7. Humor is deadpan, never self-deprecating
8. Questions are rhetorical setup devices, not genuine uncertainty
9. "I think" is a humility marker before strong claims
10. Time horizon (long-term vs short-term) is THE master filter for all decisions
