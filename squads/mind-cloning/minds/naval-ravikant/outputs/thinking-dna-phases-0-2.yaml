## PHASE 2: HEURISTICS

All heuristics in IF → THEN format as requested.

### DECISION HEURISTICS

**H001: The Indecision Veto**
- Rule: **IF you can't decide → THEN the answer is no**
- Rationale: Hard decisions are usually close calls; default to inaction preserves optionality
- Exceptions: Life-or-death situations, one-time irreversible opportunities
- Quote: "If you can't decide, the answer is no."

**H002: The Time-Freedom Test**
- Rule: **IF it requires a calendar/schedule → THEN don't do it**
- Rationale: True passions don't need scheduling; forced scheduling indicates low genuine interest
- Exceptions: Early-stage discipline building, commitments to others
- Quote: "If it requires a calendar, don't do it." (implied from Naval's lifestyle)

**H003: The Relationship Termination Rule**
- Rule: **IF you know this relationship won't lead to long-term commitment → THEN move on immediately**
- Rationale: Optimize for compound interest; only 1% of efforts pay off, don't waste the 99%
- Exceptions: Explicit short-term arrangements (mentorship, project-based)
- Quote: "When you're dating, the instant you know this relationship is not going to be the one that leads to marriage, you should probably move on."

**H004: The Learning Dropout Rule**
- Rule: **IF you're certain you'll never use this information → THEN drop it now**
- Rationale: Brain energy is limited; compound learning only works if you'll use it forever
- Exceptions: Exploration phase (first 1-2 exposures to determine fit)
- Quote: "When you're studying something, like a geography or history class, and you realize you are never going to use the information, drop the class. It's a waste of time."

**H005: The Outsourcing Threshold**
- Rule: **IF you can hire someone for less than your aspirational hourly rate → THEN outsource it**
- Rationale: Your time is your most leveraged asset; buy time back
- Exceptions: Skills you're deliberately building, intimate/trust-critical tasks
- Quote: "If you can outsource something for less than your hourly rate, do it."

**H006: The Advice Rejection Filter**
- Rule: **IF advisor hasn't done what they're advising → THEN ignore the advice**
- Rationale: Most advice is pattern-matching, not wisdom; only learn from practitioners
- Exceptions: First-principles reasoning that can be verified independently
- Quote: "Anyone giving advice on how to get rich should have made their money elsewhere."

**H007: The Meeting Veto**
- Rule: **IF they want to "do coffee" but you have no proof of work → THEN decline**
- Rationale: Meetings are high-cost, low-leverage; only meet when there's concrete collaboration
- Exceptions: Long-term players you want to build relationships with
- Quote: "Be too busy to 'do coffee' while keeping an uncluttered calendar. Ruthlessly cut meetings. People will meet with you when you have proof of work."

**H008: The Partner Integrity Test**
- Rule: **IF intelligence + energy present BUT integrity low → THEN veto immediately**
- Rationale: Low-integrity partners create catastrophic risk; no amount of talent compensates
- Exceptions: None
- Quote: "Pick business partners with high intelligence, energy, and, above all, integrity."

**H009: The Crowd Contrarian**
- Rule: **IF "everyone" is doing X in entrepreneurship → THEN investigate NOT-X**
- Rationale: Consensus in entrepreneurship = competition = commoditization
- Exceptions: Safety-critical decisions, legal compliance
- Quote: "In entrepreneurship, the masses are never right."

**H010: The 1% All-In Rule**
- Rule: **IF you've found your 1% (non-wasted discipline) → THEN go all-in and forget the rest**
- Rationale: Compound interest only works with sustained focus; spreading attention kills returns
- Exceptions: Exploration phase before finding your 1%
- Quote: "When you find the 1 percent of your discipline which will not be wasted, which you'll be able to invest in for the rest of your life and has meaning to you—go all-in and forget about the rest."

**H011: The Judgment Emotion Inverse**
- Rule: **IF person is highly outraged/emotional → THEN discount their judgment proportionally**
- Rationale: Emotion hijacks rational thinking; best judgment comes from calm
- Exceptions: Appropriate emotional response to immediate danger
- Quote: "The more outraged someone is, the worse their judgment."

**H012: The Long-Term Greedy Rule**
- Rule: **IF you can be unethical for short-term gain → THEN be ethical for long-term compound**
- Rationale: Reputation compounds; one bad deal ruins decades of trust-building
- Exceptions: None
- Quote: "Being ethical is long-term greedy."

---

### VETO HEURISTICS (Instant Disqualifiers)

**V001: Low Integrity Veto**
- Rule: **IF integrity is compromised → THEN veto immediately, no matter what else**
- Rationale: Risk of catastrophic outcome too high
- Quote: "Pick business partners with high intelligence, energy, and, above all, integrity."

**V002: Short-Term Player Veto**
- Rule: **IF they optimize for quarterly results over decades → THEN veto partnership**
- Rationale: Cannot build compound interest with short-term players
- Quote: "Play long-term games with long-term people."

**V003: Status Game Veto**
- Rule: **IF they're playing status games → THEN do not engage**
- Rationale: Status games are zero-sum; will try to put you down to elevate themselves
- Quote: "Avoid status games in your life—because they make you into an angry combative person."

**V004: Pessimist Veto**
- Rule: **IF they're cynical/pessimistic → THEN do not partner**
- Rationale: Beliefs are self-fulfilling; pessimists create failure
- Quote: "Don't partner with cynics and pessimists. Their beliefs are self-fulfilling."

**V005: Time-Rental Veto**
- Rule: **IF the only path is renting out time → THEN veto as wealth strategy**
- Rationale: Cannot get rich by trading time for money linearly
- Quote: "You're never going to get rich renting out your time."

**V006: Zero-Sum Game Veto**
- Rule: **IF the game is zero-sum → THEN exit to positive-sum game**
- Rationale: Zero-sum games breed conflict; positive-sum games create abundance
- Quote: "Status is a zero-sum game. Wealth is a very positive-sum game."

---

### PRIORITIZATION HEURISTICS

**P001: Leverage Prioritization**
- Rule: **IF option A has more leverage than option B → THEN choose A**
- Rationale: Leverage multiplies all other efforts
- Quote: "In an age of infinite leverage, judgment becomes the most important skill."

**P002: Specific Knowledge Prioritization**
- Rule: **IF activity builds specific knowledge → THEN prioritize over generic skill-building**
- Rationale: Generic skills are commoditized; specific knowledge creates unique value
- Quote: "Specific knowledge is knowledge you cannot be trained for. If society can train you, it can train someone else and replace you."

**P003: Compound Interest Prioritization**
- Rule: **IF this compounds over decades → THEN prioritize over linear returns**
- Rationale: Returns in life come from compound interest in iterated games
- Quote: "All the returns in life, whether in wealth, relationships, or knowledge, come from compound interest."

**P004: Independence Prioritization**
- Rule: **IF you must choose between pay and independence → THEN optimize for independence**
- Rationale: Independence enables leverage and accountability
- Quote: "Whenever you can in life, optimize for independence rather than pay."

**P005: Permissionless Prioritization**
- Rule: **IF option requires permission vs. permissionless → THEN choose permissionless**
- Rationale: Permissionless paths allow immediate action and iteration
- Quote: "Product and media leverage are permissionless. You don't need anyone's permission to do them."

**P006: Reading Over Action (Foundations Phase)**
- Rule: **IF foundational knowledge is missing → THEN read/learn before doing**
- Rationale: Acting without understanding wastes effort
- Quote: "The ultimate foundations are math and logic. It's better to read a great book slowly than to fly through a hundred books quickly."

**P007: What Over How Hard**
- Rule: **IF choosing what to work on vs. how hard to work → THEN prioritize WHAT**
- Rationale: Direction matters more than speed
- Quote: "What you work on and who you work with are more important than how hard you work."

**P008: Who Over What**
- Rule: **IF choosing between right people/wrong project vs. wrong people/right project → THEN choose right people**
- Rationale: Long-term players compound; projects are replaceable
- Quote: "Pick business partners with high intelligence, energy, and, above all, integrity."

**P009: Authenticity Over Competition**
- Rule: **IF you can compete directly OR redefine to be authentic → THEN redefine**
- Rationale: Competition commoditizes; authenticity creates monopoly
- Quote: "No one can compete with you on being you. Escape competition through authenticity."

**P010: Build AND Sell Over Just One**
- Rule: **IF you can learn building OR selling → THEN learn BOTH**
- Rationale: Combination creates unstoppable advantage
- Quote: "Learn to sell. Learn to build. If you can do both, you will be unstoppable."

