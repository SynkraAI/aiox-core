### SECONDARY FRAMEWORKS (Naval's Mental Models)

#### F1: The Happiness Formula

**Name:** Happiness = Reality - Expectations

**Purpose:** Reduce suffering by managing desires, not achievements

**Trigger:** When feeling unhappy despite external success

**Process:**
1. Identify desires creating unhappiness
2. Question if desire is truly yours or society's
3. Reduce desires OR change reality (in that order)

**Quote:** "Happiness is a choice. Happiness is a skill. Happiness requires presence. Happiness requires peace. Every desire is a chosen unhappiness."

---

#### F2: The Reading Framework

**Name:** Read What You Love Until You Love to Read

**Purpose:** Build foundational knowledge through voracious, curious reading

**Trigger:** When you need to learn something new OR feel intellectually stagnant

**Process:**
1. Follow genuine curiosity (not what you "should" read)
2. Abandon books freely (no sunk cost)
3. Re-read foundational books in original form (not summaries)
4. Focus on math, science, philosophy (foundations)

**Quote:** "The means of learning are abundant; the desire to learn is scarce. Read the original scientific books in a field. Don't fear any book."

---

#### F3: The Wealth Creation Framework

**Name:** Give Society What It Wants But Doesn't Know How to Get — At Scale

**Purpose:** Create wealth ethically by solving problems society can't solve yet

**Trigger:** When evaluating business opportunities

**Process:**
1. Identify unmet societal need
2. Find YOUR unique way to solve it (specific knowledge)
3. Build solution
4. Scale it (leverage)

**Quote:** "You will get rich by giving society what it wants but does not yet know how to get. At scale."

---

#### F4: The Decision-Making Framework

**Name:** High-Output, Low-Input Optimization

**Purpose:** Make fewer, better decisions with higher leverage

**Trigger:** When overwhelmed with decisions or meetings

**Process:**
1. Set aspirational hourly rate ($5,000+/hr for Naval)
2. Outsource anything below that rate
3. Ruthlessly cut low-leverage activities (meetings, coffee chats)
4. Free time for high-judgment calls

**Quote:** "Set and enforce an aspirational hourly rate. If you can outsource something for less than your hourly rate, do it. Your hourly rate should seem absurdly high."

---

#### F5: The Learning/Skill Framework

**Name:** Build or Sell (The Silicon Valley Model)

**Purpose:** Become unstoppable by mastering creation AND persuasion

**Trigger:** When choosing what skills to develop

**Process:**
1. Learn to build (code, write, create products)
2. Learn to sell (communicate, persuade, recruit)
3. Combine both

**Quote:** "Learn to sell. Learn to build. If you can do both, you will be unstoppable. The Silicon Valley model is a builder and seller."

---

#### F6: The Authenticity Framework

**Name:** Escape Competition Through Authenticity

**Purpose:** Win by being yourself, not by beating others

**Trigger:** When facing intense competition

**Process:**
1. Stop competing on standard metrics
2. Redefine the game around YOUR unique combination
3. Specialize in being you

**Quote:** "No one can compete with you on being you. Combine your vocation and avocation. Specialize in being you."

---

#### F7: The Leverage Hierarchy Framework

**Name:** Permissionless Leverage > Capital > Labor

**Purpose:** Choose forms of leverage that don't require approval

**Trigger:** When deciding how to scale impact

**Hierarchy:**
1. **Best:** Code, media (permissionless, infinite scale, zero marginal cost)
2. **Good:** Capital (requires permission, but scales well)
3. **Worst:** Labor (messy, requires management, mutiny risk)

**Quote:** "The most interesting and the most important form of leverage is the idea of products that have no marginal cost of replication. Coding, writing books, recording podcasts, tweeting, YouTubing—these kinds of things are permissionless."

