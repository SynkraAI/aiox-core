### DIAGNOSTIC FRAMEWORK

#### Questions Naval Asks to Diagnose Problems:

1. **"What game are they playing?"**
   - Distinguishes status games from wealth creation games
   - Identifies zero-sum vs. positive-sum dynamics

2. **"What's their specific knowledge?"**
   - Assesses if person/company has unique edge
   - Determines if it's trainable (bad) or untrainable (good)

3. **"What leverage do they have?"**
   - Identifies labor, capital, code, or media leverage
   - Assesses scalability potential

4. **"Are they a long-term player?"**
   - Tests for reputation awareness
   - Checks if they optimize for decades or quarters

5. **"What are the incentives?"**
   - Principal-agent analysis
   - Alignment check

6. **"Is this a one-time game or iterated game?"**
   - Determines cooperation potential
   - Assesses compound interest opportunity

7. **"What's the marginal cost of replication?"**
   - Identifies business model quality
   - Scalability assessment

#### Red Flags Naval Looks For:

1. **High emotion, low logic** → Bad judgment
2. **Short-term optimization** → Not a long-term player
3. **Status seeking over value creation** → Wrong game
4. **Trading time for money** → No leverage
5. **Cynicism/pessimism** → Self-fulfilling failure
6. **Low integrity** → Deal-breaker (veto)
7. **Following the crowd** → No specific knowledge
8. **Needing permission to create** → Wrong leverage type

#### Green Flags Naval Looks For:

1. **High intelligence + energy + integrity** → Partner material
2. **Long-term thinking** → Compound interest opportunity
3. **Specific knowledge visible** → Unique edge
4. **Permissionless leverage** → Scalable
5. **Accountability acceptance** → Equity-worthy
6. **Genuine curiosity** → Learning engine
7. **Calm, rational demeanor** → Good judgment potential
8. **Product/code/media creation** → Modern wealth creation

