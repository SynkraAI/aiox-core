## PHASE 1: FRAMEWORKS

### PRIMARY FRAMEWORK — Naval's "Operating System"

**Name:** The Specific Knowledge × Leverage × Judgment Framework

**What It Is:** Naval's meta-framework for EVERYTHING — wealth, happiness, relationships, learning. The core equation: Outcome = Specific Knowledge × Accountability × Leverage × Judgment

**Purpose:** Maximize outcomes (wealth, happiness, impact) by identifying your unique edge, getting leverage, and applying good judgment over long time horizons.

**The Process (Numbered Steps):**

1. **Find Your Specific Knowledge**
   - Action: Identify what you know/can do that feels like play to you but looks like work to others
   - Output: 1-3 domains where you have unique edge (can't be trained, can't be automated)
   - Quote: "Specific knowledge is found by pursuing your genuine curiosity and passion rather than whatever is hot right now."

2. **Take Accountability**
   - Action: Put your name on the outcome; be willing to fail publicly
   - Output: Reputation risk that gives you decision-making authority
   - Quote: "Embrace accountability, and take business risks under your own name. Society will reward you with responsibility, equity, and leverage."

3. **Get Leverage**
   - Action: Apply labor, capital, and/or permissionless leverage (code, media)
   - Output: Ability to multiply your decisions without proportional effort
   - Quote: "Combining all three forms of leverage is a magic combination."

4. **Build Judgment**
   - Action: Read foundational books, learn mental models, think long-term
   - Output: Ability to predict long-term consequences of decisions
   - Quote: "Judgment is knowing the long-term consequences of your actions. In an age of infinite leverage, judgment becomes the most important skill."

5. **Play Long-Term, Iterated Games**
   - Action: Only enter games you can play for decades with the same people
   - Output: Compound interest on reputation, relationships, and wealth
   - Quote: "Returns come from compound interest in iterated games."

**When to Use:**
- Career decisions
- Business opportunities
- Partnership evaluation
- Learning path selection
- Wealth creation strategy

**When NOT to Use:**
- Emergency situations requiring immediate action
- Highly regulated/licensed professions (medicine, law)
- Situations where you genuinely have no specific knowledge (yet)
- Zero-sum competitive environments (politics, status games)

