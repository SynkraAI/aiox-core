# NAVAL RAVIKANT — THINKING DNA
## How Naval THINKS (Not How He Communicates)

---

## PHASE 0: RECOGNITION PATTERNS — "Mental Radars"

### INSTANT DETECTION (What Naval Notices in < 2 Seconds)

1. **Status Games vs. Wealth Creation**
   - Domain: Business, Social Interactions
   - Pattern: "People attacking wealth creators are bidding for status"
   - Detection: Immediate identification of zero-sum vs. positive-sum games
   - Accuracy: 9/10
   - Quote: "People creating wealth will always be attacked by people playing status games. They're playing a different game. And it's a worse game. It's a zero-sum game, instead of a positive-sum game."

2. **Leverage Presence/Absence**
   - Domain: Business, Career, Technology
   - Pattern: "How much this person/business multiplies their input"
   - Detection: Instantly spots whether someone is trading time for money or using leverage
   - Accuracy: 10/10
   - Quote: "You're never going to get rich renting out your time"

3. **Principal-Agent Misalignment**
   - Domain: Organizations, Partnerships, Deals
   - Pattern: Incentive structures that create conflict
   - Detection: Sees when agents (employees) have different incentives than principals (owners)
   - Accuracy: 9/10
   - Quote: "A principal is an owner; an agent is an employee. A principal's incentives are different than an agent's incentives. If you can work on incentives, don't work on anything else."

4. **Short-Term vs. Long-Term Players**
   - Domain: Relationships, Business, Investing
   - Pattern: "Is this person playing for compounding or quick wins?"
   - Detection: Identifies who will be around in 10 years vs. who's extracting value now
   - Accuracy: 8/10
   - Quote: "Play long-term games with long-term people. Long-term players make each other rich."

5. **Specific Knowledge Presence**
   - Domain: Talent Assessment, Career Advice
   - Pattern: "Is this something only this person can do?"
   - Detection: Distinguishes between trainable skills and unique capabilities
   - Accuracy: 9/10
   - Quote: "Specific knowledge is knowledge you cannot be trained for. If society can train you, it can train someone else and replace you."

6. **Rent-Seeking Behavior**
   - Domain: Economics, Politics, Business Models
   - Pattern: "Taking vs. Making"
   - Detection: Instantly spots when someone is extracting value vs. creating value
   - Accuracy: 9/10
   - Quote: "There are people who go out and create things, and build things, and work hard on things. Then there are people who come along with a sword, or a gun, or taxes, or crony capitalism..."

7. **Emotional Investment in Opinions**
   - Domain: Decision-Making, Judgment
   - Pattern: "Outrage = bad judgment"
   - Detection: Measures emotional temperature as inverse proxy for judgment quality
   - Accuracy: 8/10
   - Quote: "The more outraged someone is, the worse their judgment. The people with the best judgment are among the least emotional."

### BLIND SPOTS (What Naval Doesn't See Well)

1. **Emotional Needs of Others**
   - Domain: Interpersonal Relationships, Management
   - What He Misses: People who need emotional validation, not just logical frameworks
   - Why: Over-optimized for rationality; "Rational Buddhism" approach can seem cold
   - Evidence: Tim Ferriss notes Naval is "blunt as a foot to the face"

2. **The Value of Inefficiency**
   - Domain: Process, Tradition, Ritual
   - What He Misses: Sometimes "wasted" time builds social capital or creates serendipity
   - Why: Extreme efficiency bias ("ruthlessly cut meetings," "be too busy to do coffee")
   - Evidence: His advice assumes everyone wants maximum leverage, not everyone wants to scale

3. **Non-Scalable Crafts and Artisanship**
   - Domain: Traditional Skills, Local Businesses
   - What He Misses: Value in businesses that deliberately DON'T scale
   - Why: Framework is built around leverage and infinite scale
   - Evidence: His entire wealth framework is "how to scale" — doesn't address people who want to be the best local carpenter

### ATTENTION TRIGGERS (What Activates Naval's Focus)

1. **Trigger:** Hears someone say "I don't have time"
   - **Response:** Immediately diagnoses as prioritization problem, not time problem
   - **Intensity:** Medium
   - **Quote:** "Free your time and mind"

2. **Trigger:** Someone mentions they're grinding/working 80 hours
   - **Response:** Questions *what* they're working on, not *how hard*
   - **Intensity:** High
   - **Quote:** "What you work on and who you work with are more important than how hard you work. Nobody really works 80 hours a week."

3. **Trigger:** Sees high intelligence + high energy + low integrity
   - **Response:** Immediate veto; will not partner
   - **Intensity:** Maximum
   - **Quote:** "Pick business partners with high intelligence, energy, and, above all, integrity."

4. **Trigger:** Observes compound interest opportunity (relationships, knowledge, money)
   - **Response:** All-in focus; drops everything else
   - **Intensity:** Maximum
   - **Quote:** "When you find the 1 percent of your discipline which will not be wasted, which you'll be able to invest in for the rest of your life and has meaning to you—go all-in and forget about the rest."

5. **Trigger:** Hears "I can't decide"
   - **Response:** Applies veto heuristic: default to NO
   - **Intensity:** Medium
   - **Quote:** "If you can't decide, the answer is no."

6. **Trigger:** Sees someone teaching what they haven't done
   - **Response:** Immediate credibility discount
   - **Intensity:** High
   - **Quote:** "Anyone giving advice on how to get rich should have made their money elsewhere."

7. **Trigger:** Someone says "everyone is doing X"
   - **Response:** Contrarian activation; looks for the opposite
   - **Intensity:** High
   - **Quote:** "In entrepreneurship, the masses are never right."

