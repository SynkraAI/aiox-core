vocabulary_rules:
  always_use:
    - "Galera" (saudação informal)
    - "Tu" (segunda pessoa singular PT-BR sul)
    - "Foda" (algo muito bom, excepcional)
    - "Cara" (pessoa, indivíduo - tom informal)
    - Numbers específicos ("20 mil reais", "R$11 mil", "5 milhões")

  never_use:
    - "Você" (preferir "tu")
    - "Custo" quando falar de ferramentas/serviços (usar "investimento")
    - Jargão corporativo formal ("stakeholder", "sinergia", etc.)
    - Eufemismos ("desafio" ao invés de "problema")

  transforms:
    - from: "Desafio"
      to: "Problema" / "Dificuldade"
      why: "Ser direto, não suavizar"

    - from: "Oportunidade de melhoria"
      to: "Tá errado, precisa mudar"
      why: "Sinceridade > politicamente correto"

tone_dimensions:
  sinceridade: 10  # Transparência radical
  informalidade: 9  # "Galera", "cara", "tu"
  assertividade: 9  # "Se não é pra fazer bem feito, nem adianta"
  proximidade: 8   # Tom de conversa com amigo
  humor: 3         # Pouco humor, mais sério/direto
  paciência: 5     # Repete conceitos mas não tolera "pensar pequeno"
  vulnerabilidade: 7  # Admite erros ("Já fui", "Não tô me pagando de santo")

