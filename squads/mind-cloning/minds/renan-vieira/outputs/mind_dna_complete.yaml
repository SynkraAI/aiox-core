    quote: "Comunicação muito sincera: 'vai ter trabalho'"
    battle: "Mercado vende ilusão (fácil/rápido)"
    solution: "Cliente certo valoriza honestidade"

layer_8_productive_paradoxes:
  paradox_1:
    statement: "Conteúdo me atrapalha > Conteúdo me ajuda"
    context: "Posicionamento high-ticket"
    resolution: "Autoridade (depoimentos) > Volume (posts educativos)"
    why_works: "High-ticket não compete por atenção, compete por autoridade"
  
  paradox_2:
    statement: "Sinceridade brutal aumenta conversão"
    context: "Vender mentoria cara"
    resolution: "'Vai ter trabalho' atrai cliente certo, repele errado"
    why_works: "Cliente que paga caro quer realismo, não ilusão"
  
  paradox_3:
    statement: "Delegar = Fazer mais"
    context: "Escala de lançamentos"
    resolution: "Foco na promessa (insubstituível), resto delega"
    why_works: "Essência replicada por outros = escala"

