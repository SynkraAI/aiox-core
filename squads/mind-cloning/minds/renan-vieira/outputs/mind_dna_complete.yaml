heuristics:
  RV-H01:
    name: "Autoridade > Conteúdo"
    rule: "SE autoridade percebida → Manter. SENÃO → Competir por atenção."
  
  RV-H02:
    name: "Delegar tudo exceto essência"
    rule: "SE pode pagar alguém → Delegue. SENÃO → Faça só insubstituível."
  
  RV-H03:
    name: "% resultado > Custo fixo"
    rule: "SE pode ser % → Preferir. SENÃO → Só fixo se validado."
  
  RV-H04:
    name: "Números concretos"
    rule: "SE mostrar resultado → Número específico. SENÃO → Não vago."
  
  RV-H05:
    name: "Sinceridade > Ilusão"
    rule: "SE cliente pergunta → Verdade ('trabalho'). SENÃO → Cliente errado."
  
  RV-H06:
    name: "Longo prazo desde início"
    rule: "SE primeiro lançamento → Estrutura pra escalar. SENÃO → Refazer depois."

