      - "Promessa vaga"
    
    green_flags:
      - "Depoimentos com números concretos"
      - "Bio clara + CTA direto"
      - "Delega página/gestor"
      - "Pensa longo prazo"

layer_5_mental_models:
  primary_framework:
    name: "Posicionamento HIGH-TICKET vs LOW-TICKET"
    thesis: "Autoridade percebida > Volume de conteúdo"
    components:
      - "Instagram como vitrine de autoridade"
      - "Depoimentos > Credentials"
      - "Números concretos > 'Muitos resultados'"
  
  secondary_frameworks:
    - name: "Framework de Lançamento"
      steps:
        1: "Promessa (base de tudo)"
        2: "Copy (rápido com promessa clara)"
        3: "Página (delegar pro 'cara certo')"
        4: "Gestor (10% faturamento)"
    
    - name: "Investimento vs Custo"
      rule: "% resultado = sem risco, Fixo = só se validado"
  
  diagnostic_framework:
    questions:
      - "Instagram mostra que você é bom?"
      - "Está fazendo tudo sozinho?"
      - "Está pensando pequeno ou grande?"
      - "Cliente sabe que vai ter trabalho?"

