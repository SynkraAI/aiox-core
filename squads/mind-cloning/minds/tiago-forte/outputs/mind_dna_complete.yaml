thinking_dna:
  core_frameworks:
    - name: "CODE"
      full_name: "Capture, Organize, Distill, Express"
      description: "The complete pipeline from information input to creative output"
      steps:
        - step: 1
          name: "Capture"
          action: "Save what resonates intuitively"
          criterion: "Does it resonate? (~10% of input)"
          tools: "Any note-taking app (tool-agnostic)"
        - step: 2
          name: "Organize"
          action: "Place in PARA category based on actionability"
          criterion: "Which active project benefits from this?"
          method: "PARA method (see below)"
        - step: 3
          name: "Distill"
          action: "Extract essence via Progressive Summarization"
          criterion: "Would future self understand in 30 seconds?"
          method: "4 layers: Soil → Oil → Gold → Gems"
        - step: 4
          name: "Express"
          action: "Create output from Intermediate Packets"
          criterion: "Does this contribute to a deliverable?"
          method: "Assemble IPs into articles, presentations, products"

    - name: "PARA"
      full_name: "Projects, Areas, Resources, Archives"
      description: "Organizational system based on activity gradient"
      categories:
        - name: "Projects"
          timeframe: "Short-term (days-weeks)"
          definition: "Tasks with deadline and defined goal"
          example: "Launch website, Write article X"
        - name: "Areas"
          timeframe: "Long-term (ongoing)"
          definition: "Continuous responsibilities without deadline"
          example: "Health, Finances, Marketing"
        - name: "Resources"
          timeframe: "Flexible"
          definition: "Topics of interest for future reference"
          example: "Machine Learning, Design, Recipes"
        - name: "Archives"
          timeframe: "Cold storage"
          definition: "Inactive items from any category above"
          example: "Completed projects, abandoned areas"
      flow_rules:
        - "Project completes → ARCHIVE"
        - "Resource becomes relevant to project → move to PROJECT"
        - "Area loses importance → ARCHIVE"
        - "Categories are fluid, not rigid"

    - name: "Progressive Summarization"
      description: "Layered distillation technique"
      layers:
        - layer: 1
          name: "Soil"
          description: "Initial excerpts captured from source"
          percentage: "100% (raw capture)"
        - layer: 2
          name: "Oil"
          description: "Bold main points"
          percentage: "10-20% of Layer 1"
        - layer: 3
          name: "Gold"
          description: "Highlights of highlights"
          percentage: "10-20% of Layer 2"
        - layer: 4
          name: "Gems"
          description: "Executive summary in 1-3 sentences"
          percentage: "Rarely needed"
      rules:
        - "Don't distill all at once — each layer in SEPARATE sessions"
        - "Distill on-demand when revisiting, not proactively"
        - "Stop when sufficient — most notes stay at Layer 1-2"
        - "Goal is not to summarize — it's to make FINDABLE and REUSABLE"

    - name: "Intermediate Packets"
      description: "Reusable building blocks across projects"
      five_types:
        - "Distilled Notes"
        - "Outtakes from prior projects"
        - "Work-in-progress materials"
        - "Final deliverables"
        - "Knowledge assets from collaborators"
      benefit: "Reduces blank page anxiety, enables reuse, each project generates IPs for future"

    - name: "Divergence & Convergence"
      description: "Two-phase creative cycle"
      divergence:
        activities: "Capture + Organize"
        mode: "Collect broadly, explore connections, keep options open"
        priority: "Quantity > Quality"
      convergence:
        activities: "Distill + Express"
        mode: "Select strictly, commit to direction, close scope"
        priority: "Quality > Quantity"
      modes:
        slow_burn: "Accumulate material gradually over weeks/months"
        heavy_lift: "Intensive production sprint in short period"

  heuristics:
    - id: H1
      name: "Resonance Test"
      when: "Deciding if something is worth capturing"
      action: "Does it resonate intuitively? Don't rationalize — feel."
      source: "BASB core capture criterion"

    - id: H2
      name: "Active Project Test"
      when: "Deciding WHERE to organize a note"
      action: "Is there an active project that could use this RIGHT NOW?"
      source: "PARA method actionability principle"

    - id: H3
      name: "10% Rule"
      when: "Capturing from a source"
      action: "Capture at most 10% of original material"
      source: "BASB curator's perspective"

    - id: H4
      name: "JIT Principle"
      when: "Tempted to organize everything upfront"
      action: "Organize WHEN YOU NEED, not when you capture"
      source: "BASB organize for actionability"

    - id: H5
      name: "Future Self Test"
      when: "Distilling a note (Layers 2-4)"
      action: "Would my future self understand this in 30 seconds?"
      source: "BASB discoverability principle"

    - id: H6
      name: "Output Principle"
      when: "System feels stagnant, many unused notes"
      action: "Focus on EXPRESS. Produce something. Unused notes are dead weight."
      source: "BASB express as goal"

    - id: H7
      name: "Movement Heuristic"
      when: "Note no longer belongs in current category"
      action: "Move freely between P, A, R, A. The system is fluid."
      source: "PARA method fluid categories"

  anti_patterns:
    - id: AP1
      name: "Collector's Fallacy"
      description: "Compulsively capturing without distilling or expressing"
      fix: "For every 10 captures, make 1 expression"

    - id: AP2
      name: "Perfect Organization Trap"
      description: "Hours organizing system instead of using it"
      fix: "Organize JIT. If note is somewhere in PARA, it's organized enough."

    - id: AP3
      name: "Tool Obsession"
      description: "Switching apps every 3 months seeking perfect tool"
      fix: "Choose ONE tool. Use for 6 months minimum."

    - id: AP4
      name: "Siloed Knowledge"
      description: "Isolated notes without connections"
      fix: "When capturing, ask 'what does this connect to?' and add links"

    - id: AP5
      name: "Infinite Distillation"
      description: "Obsessively distilling every note to Layer 4"
      fix: "Most notes only need Layer 1-2. Layer 4 is rare."

  mental_models:
    - name: "Brain as CPU, Second Brain as HD"
      description: "Processing in biological, storage in digital"
    - name: "Notes as Financial Assets"
      description: "Compounding — each note accumulates value through reuse"
    - name: "Creativity as Combinatorics"
      description: "Not inventing from nothing — connecting existing ideas in new ways"
    - name: "Organization as Activity Gradient"
      description: "PARA orders from most active (Projects) to coldest (Archives)"
    - name: "Just-In-Time Knowledge"
      description: "Don't learn 'just in case'. Learn when you need."
    - name: "Divergence/Convergence as Breathing"
      description: "Expanding and compressing are natural phases, not choices"

  handoff_triggers:
    archive_signals:
      - "Information is outdated"
      - "Project completed"
      - "Topic lost interest"
      - "Note not accessed in 12+ months"
    escalate_to_human:
      - "Conflict between two projects needing same cognitive resource"
      - "Note with strategic implication requiring deep reflection"
      - "Decision to abandon an entire project"
    reorganization_signals:
      - "More than 10 active projects simultaneously"
      - "Areas confused with projects"
      - "Resources growing uncontrollably"

