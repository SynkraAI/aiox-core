  - Formato: PDF + planilha de precificação
  - Tamanho: 47 páginas + 1 planilha Excel

  ### Próximo Passo
  - Produto seguinte: Desafio "Confeitaria 7K em 30 Dias" — R$97
  - Ponte: Email no D7 pós-compra com oferta do desafio

  ### Funil Mínimo
  - Ancoragem high: Mentoria "Confeitaria 5K/mês" R$2.500 (aparece na obrigado page)
  - Entrada: Perfil Instagram → ManyChat → "Receba a planilha gratuita"
  - Oferta imediata: Ebook R$14 (mesmo para quem pediu só a planilha)

  ### Copy Principal (Sentimento: Esperança)
  - Hook: "Confeiteiras que faturam R$3k/mês sem loja usam este modelo"
  - Punch: "Enquanto você cobra R$15 pelo bolo, ela cobra R$80 — pela mesma receita"
  - Premissa: "A diferença não é o bolo. É como ela precifica. E dá pra aprender em 1 tarde."

  ### Primeira Campanha
  - Gatilho: DEMONSTRAÇÃO (mostar a planilha funcionando ao vivo)
  - Dia 1 — Reels 19h: precificar um bolo ao vivo, mostrar margem em tempo real
  - Dia 3 — Stories: prints de confeiteiras que já usam (prova social)
  - Dia 5 — Email: urgência "Preço vai subir segunda-feira"
  - Dia 7 — Post domingo 21h: escassez + encerramento
  - Meta semana 1: 50 unidades × R$14 = R$700 → Contribuição 1K/dia: R$100/dia

