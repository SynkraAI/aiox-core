# ═══════════════════════════════════════════════════════════════════════════════
# METADATA
# ═══════════════════════════════════════════════════════════════════════════════

metadata:
  version: "1.0.0"
  framework: "AIOS Squad Creator"
  created: "2026-02-21"
  primary_use_case: "Construção do Funil Perpétuo Instagram → ManyChat → WhatsApp → Email → Venda"
  source_mind: "natanael-oliveira"
  key_difference: |
    Único workflow que integra ManyChat + WhatsApp + Email numa sequência única.
    Aplica Funil Americano em TODOS os pontos de contato (não apenas na venda).
    Cobre tanto tráfego pago quanto conversão orgânica do perfil.
