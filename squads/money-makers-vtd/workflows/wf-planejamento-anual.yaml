    - "cronograma-54-campanhas.yaml — 54 campanhas com gatilhos e empilhamento"
    - "temas-copy-mensal.yaml — Temas Andromeda por sentimento"
    - "roadmap-27-produtos.yaml — 27 produtos priorizados"
    - "produtos-escalaveis.md — Produtos com potencial de escala"

  dashboard:
