# OUTPUT EXAMPLE
# ═══════════════════════════════════════════════════════════════════════════════

output_example: |
  ## Money Machine Completa — Nicho: Produtividade para Autônomos

  > "Só vende quem oferece." — Natanael Oliveira

  ---

  ### Pesquisa de Mercado (Resumo)
  **Top insights:**
  1. "Autônomos não têm problema de competência — têm problema de organização de agenda"
  2. Tendência: IA para automação de tarefas repetitivas crescendo 340% nas buscas
  3. Linguagem do público: "perco cliente porque esqueço de responder", "odeio cobrar"

  **Ciclo de produto:**
  Planilha de controle (low) → Curso organização (mid) → Mentoria 1:1 (high)

  ---

  ### Mix de Produtos + Plano 1K/Dia

  **Plano 1K/dia personalizado:**
  10x Planilha Autônomo Organizado R$27 = R$270
  5x Curso Agenda Lucrativa R$197 = R$985
  1x Mentoria 90 dias R$2.500/semana = R$357/dia (média)
  **Total: ~R$1.612/dia** ✓

  **Benchmark de referência Natanael:** "10x R$27 + 5x R$97 + 2x R$297 = ~R$1.350/dia"

  ---

  ### Funil Americano (entrada via Instagram)
  1. Reels com gatilho "Erro" → comentam "AGENDA" → ManyChat
  2. ManyChat msg 1: entrega e-book grátis "7 Erros que Fazem Autônomo Perder Dinheiro"
  3. ManyChat msg 2 (5min depois): apresenta Mentoria 90 dias R$2.500 PRIMEIRO (Efeito Chanel)
  4. ManyChat msg 3 (1h depois): Curso Agenda Lucrativa R$197 como alternativa
  5. ManyChat msg 4 (1h depois): Planilha R$27 como porta de entrada

  ---

  ### Semana 1 — Campanha Exemplo
  - Gatilho: NOVIDADE
  - Hook: "Descobri como autônomos top faturam R$1k/dia sem trabalhar mais horas"
  - Punch: "Não é sobre trabalhar mais — é sobre vender enquanto você trabalha"
  - Premissa: "Quem tem cronograma tem caixa. Autônomo sem cronograma tem seco."
  - Empilhamento:
    - Manhã 8h: Email com Planilha Autônomo Organizado R$27
    - Tarde 14h: Email com Mentoria 90 dias R$2.500
    - Noite 20h: Email cross-sell App IA Agenda Inteligente R$97

  ---

  ### Budget de Tráfego Mensal
  - Meta: 500 leads/mês
  - CPL estimado: R$8
  - Budget total: R$4.000/mês
  - Split: R$3.200 (80% perfil) + R$800 (20% conversão direta)
  - CPC perfil: R$0,28 | CPC conversão: R$2,50
  - ROAS mínimo: 3x (R$4k investido → R$12k receita)

  ---

  > "Quem tem cronograma tem caixa." — Natanael Oliveira
  > "Empilhamento de ofertas." — Natanael Oliveira

