### CASE: Doce de Coco (Negócio Local → Crescimento)
[SOURCE: p.85-90]

**Antes:** R$200k/mês
**Depois:** R$1.2M/mês em 5 meses

**O Que Mudou:**
1. Definiu 4 metas (CAC primeiro)
2. Estruturou 15 indicadores
3. Aplicou método 9 públicos em vendas local + online
4. Implementou Escada de Produtos (6 tipos)
5. Separou Hunter (vendas rápidas) + Farmer (recorrência)

**Resultado:** 6x crescimento em 5 meses

**Lição:** Método funciona TANTO em digital quanto local. O que muda é o canal, não a lógica.

