## HEURISTICS: Regras de Decisão
### O Que Usar Quando

### Quando Iniciar Negócio
1. **Define 4 Metas (ordem obrigatória):** CAC → TM → Clientes → Recorrência
2. **Calcula:** CAC target (80% do TM máximo que quer)
3. **Estrutura equipe:** Financeiro, Marketing, COM1, COM2
4. **Cria reunião diária:** 9h40, 15 minutos, indicadores apenas

### Quando Negócio Não Cresce
1. **Identifica qual dos 6 Desafios:** Geração de Caixa? Processo? Estrutura? Modelo?
2. **Monta 15 Indicadores** (se já não tem)
3. **Testa 3 variáveis por 7 dias** (se CPL alto: copy, landing, tráfego)
4. **Mede resultado, escala vencedor**

### Quando Cliente Diz NÃO
1. **Entrevista:** "O que você não gostou?" (identifica qual dos 5 motivos)
2. **Reversa específica:** Preço? Urgência? Prova? Timing?
3. **Follow-up 28 dias:** 1x/semana (resgata 15-20%)
4. **Após 4 contatos sem resposta:** Para (preserva reputação)

### Quando Vendedor Vende Pouco
1. **Verifica TX2:** Taxa de fechamento
2. **Se TX2 baixa:** Script problem (ensina novo)
3. **Se TX2 alta mas volume baixo:** Qualificação problem (Marketing)
4. **Se ambas OK:** Pode ser perfil (hunter vs farmer)

### Quando Ticket Médio Cai
1. **Checa Escada de Produtos:** Oferecendo 6 tipos?
2. **Diagnostica Público 7-8:** Overdelivery? Upsell oferecido?
3. **Verifica: CLiente saiu faltando oferta?**
4. **Replica Escada faltante**

### Quando Precisa Escalar Rápido
1. **ROAS > 5:1?** → Duplica budget (campanha está quente)
2. **Tem lista > 5k?** → Tira 10% oferece oferta especial (fácil 2k leads)
3. **COM1 vende bem?** → Contrata clones (mesma seleção, mesmo treinamento)
4. **Afunila no topo:** Aumenta Leads antes de Recorrência

### Quando Precisa Reduzir Custos
1. **Identifica qual indicador está pior:** CPL? CAC? ROAS?
2. **Se CPL alto:** Testa headlines, landing pages, públicos (3 testes, 3 dias cada)
3. **Se CAC alto mas ROAS OK:** Problema é Ticket (Escada de Produtos)
4. **Nunca corta cega (sem indicador = erro cego)**

