## FRAMEWORK: 30+ Regras SE/ENTÃO
### A Lógica de Decisão

**Regra 001: Os 4 Metas (Sequência Inflexível)**
```
SE iniciando negócio
ENTÃO sequência obrigatória:
  1. Reduzir CAC
  2. Aumentar TM
  3. Aumentar clientes
  4. Aumentar recorrência
SE desrespeitar ordem
ENTÃO empresa quebra em <2 anos
```
[SOURCE: p.8-12]

**Regra 002: CAC vs Ticket (Relação 20:80)**
```
SE Ticket Médio = R$1.000
ENTÃO CAC máximo = R$200 (20% do TM)
SE CAC > 20% do TM
ENTÃO economia não funciona, pivota modelo
```
[SOURCE: p.42]

**Regra 003: ROAS Mínimo (2:1)**
```
SE ROAS < 2:1
ENTÃO não há lucro mesmo com volume
SE ROAS 2-5:1
ENTÃO lucro mas não escala
SE ROAS > 5:1
ENTÃO escala agressiva possível
```
[SOURCE: p.45]

**Regra 004: Venda em 2 Etapas (Nunca 1)**
```
SE tentando vender em 1 etapa
ENTÃO taxa de conversão cai 60%
SE dividindo em 2 etapas (demo + oferta)
ENTÃO conversão sobe 40% + preço sobe 30%
```
[SOURCE: p.20-22]

**Regra 005: Lista = Poder**
```
SE tem lista de 10.000 pessoas interessadas
ENTÃO pode fazer praticamente qualquer coisa
SE tenta vender sem lista
ENTÃO precisa de 10x mais investimento
```
[SOURCE: p.12-15]

**Regra 006: Valor vs Preço (Inversão)**
```
SE aumenta percepção de valor
ENTÃO cliente aceita preço mais alto
SE reduz preço
ENTÃO cliente reduz percepção de valor
SE reduz CAC
ENTÃO valor percepto SOBE (menos "caro" parecer barato)
```
[SOURCE: p.28-30]

**Regra 007: Oferta ≠ Produto**
```
OFERTA = Produto + Bônus + Preço + Entrega
Copy = Apresentação da OFERTA
SE produto é bom mas oferta fraca
ENTÃO venda fracassa
```
[SOURCE: p.25-28]

**Regra 008: Oferta Irresistível (Domino's Model)**
```
SE promessa é clara e entrega é garantida
ENTÃO cliente não consegue dizer não
Exemplo: "30 min ou grátis"
- Promessa: Rápido
- Garantia: Sem risco (se não vir, sem pagar)
- Resultado: Cresceu 40x
```
[SOURCE: p.27]

**Regra 009: Funil 3 Etapas (Topo-Meio-Fundo)**
```
SE faltando etapa topo (atração)
ENTÃO não tem leads, sem leads sem vendas
SE faltando etapa meio (qualificação)
ENTÃO fecha errado, cliente insatisfeito
SE faltando etapa fundo (oferta)
ENTÃO leads dormem, não convertem
```
[SOURCE: p.55-62]

**Regra 010: Indicadores Definem Departamento**
```
SE CPL alto
ENTÃO problema é Marketing
SE TX2 baixa
ENTÃO problema é Comercial
SE ROAS baixa
ENTÃO problema é mix de ambos
```
[SOURCE: p.40-48]

**Regra 011: Qualificação Mínima 70%**
```
SE qualificação < 70%
ENTÃO Comercial perde tempo com lixo
SE qualificação 70-85%
ENTÃO eficiência normal
SE qualificação > 90%
ENTÃO vendedor vira closer de nível elite
```
[SOURCE: p.48]

**Regra 012: LTV:CAC Ratio (3:1 ou Sai)**
