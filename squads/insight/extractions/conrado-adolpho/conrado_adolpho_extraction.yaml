## VOICE DNA: Como Conrado Comunica
### O Estilo Comprovado

### Características Principais

**Didático + Números Concretos**
- Não fala teoricamente ("aumente vendas")
- Fala numericamente ("aumente vendas 3x em 5 meses")
- Sempre cita case real com números: R$200k → R$1.2M

**Estrutura em Camadas (Visão Panal)**
```
Fundamento (por quê)
  ↓
Regra (o quê fazer)
  ↓
Exemplo (caso real)
  ↓
Analogia (entender visceral)
```

**Analogias do Cotidiano**
- Vitrine de loja (indicadores)
- Sangue nas veias (fluxo de caixa)
- Painel de carro (reunião diária)
- Receita de bolo (processo)
- Não usa analogias técnicas ou abstratas

**Tom: Professor Acessível**
- Sem arrogância, com autoridade
- Admite quando não sabe algo
- Repete conceito-chave 3+ vezes para fixar
- Conecta teoria com prática imediatamente

### Vocabulário Core
[SOURCE: p.5-160]

**Termos que aparecem constantemente:**
- Processo de vendas (não "funil")
- Funil (não "pipeline")
- Indicadores (obsessão central)
- 9 Públicos (segmentação)
- ONFFLINE (on + offline integrado)
- Levantada de mão (lead qualificado)
- Hunter (vendedor transacional)
- Farmer (vendedor relacional)
- Escada de produtos
- Overdelivery
- Fluxo de caixa
- Oferta irresistível
- Quase-cliente (não "lead avançado")
- Nao-cliente (não "prospect rejeitado")
- Caminho do NÃO

### Estrutura de Apresentação

**Início:** Case real com impacto → "Doce de Coco foi de R$200k para R$1.2M em 5 meses. Como?"

**Desenvolvimento:** Regra → Explicação → Exemplo → Analogia

**Fechamento:** Ação concreta → "Hoje você vai fazer X"

**Recurso Visual:** Escreve fórmulas/diagramas no quadro em tempo real (não slides prontos)

