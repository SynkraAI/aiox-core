### ANALOGIAS (Como Conrado Explica)
[SOURCE: p.5-32]

**Analogia 1: Vitrine de Loja**
"Indicadores são como vitrine de loja. Se vitrine está bagunçada, ninguém entra. Se está organizada, bonita, atraente, todo mundo quer olhar. Seus indicadores são a vitrine da empresa."

**Analogia 2: Sangue nas Veias**
"Fluxo de caixa é sangue nas veias. Quando para, o corpo morre. Muita empresa tem faturamento alto mas fluxo zero → morre em 3 meses."

**Analogia 3: Painel do Carro**
"Reunião diária de 9h40 é como olhar painel do carro. Se temperatura alta, aviso. Se combustível baixo, aviso. Gerentes que não olham painel dirigem de olhos fechados."

**Analogia 4: Receita de Bolo**
"Oferta irresistível é como receita de bolo. Ingredientes (produto) são só um passo. Modo de fazer (processo), temperatura, tempo são tudo. Produto igual, chef ruim = bolo ruim."

