## THINKING DNA: Como Conrado Decide
### A Arquitetura Mental

### Framework Primário: Pensamento por Indicadores
[SOURCE: p.35-90]

**Premissa Fundamental:** "Toda decisão estratégica nasce de um indicador, não de achismo."

**Pipeline de Decisão:**

```
PROBLEMA OBSERVADO
        ↓
IDENTIFICAR INDICADOR (qual métrica reflete isso?)
        ↓
DEFINIR META (número alvo)
        ↓
CRIAR PLANO DE AÇÃO (o quê testar)
        ↓
EXECUTAR TESTE (por período X)
        ↓
MEDIR RESULTADO (indicador melhorou?)
        ↓
ITERAR OU ESCALAR (ajusta ou aprova)
```

**Exemplo em Prática:**
- Problema: "Vendas cairam"
- Indicador: TX2 (Taxa Conversão Lead → Cliente)
- Meta: 20% → 25%
- Plano: Testar 3 scripts novos, novo email lead-magnet
- Teste: 7 dias
- Resultado: Script #2 levou TX2 para 26%
- Ação: Replica script #2 para 100%, escala budget

### Heurísticas de Decisão (Mental Shortcuts)

**H001: CAC < 20% do Ticket Médio**
- Regra de bolso: Se CAC > 20%, modelo quebrado
- Aplicação: Antes de qualquer campanha, calcula: CPL ÷ TX2 < 20% TM?

**H002: ROAS > 2:1 mínimo**
- Se ROAS < 2, lucro é zero
- Se ROAS 2-5, lucro existe mas restrito
- Se ROAS > 5, escala agressiva

**H003: Qualificação > 70%**
- Se < 70%, Marketing falha
- Se 70-85%, normal
- Se > 90%, vendedor vira elite closer

**H004: LTV:CAC > 3:1**
- Se < 2:1, não sustentável
- Se 2-3:1, apertado mas funciona
- Se > 3:1, escalável com margem

**H005: 4 Metas em Sequência (Nunca Desrespeita)**
1. CAC baixo
2. TM alto
3. Muitos clientes
4. Recorrência

Desrespeitar = morte empresa

**H006: Mensagem ≠ Público = Fracasso**
- Mesmo público precisa mensagens diferentes conforme consciência
- Se trata igual, perde 80%

**H007: 2 Etapas de Venda (Nunca 1)**
- Demo + Oferta sempre separadas
- 1 etapa = conversão cai 60%

**H008: Hunter + Farmer Separados**
- Não é omnichannel, é especialização
- Hunter: velocidade
- Farmer: profundidade
- Misturar = piora ambos

### Pontos de Decisão Críticos

**Ponto 1: Diagnostico de Paralisação (6 Desafios)**
```
SE empresa para em R$100k → Problema: Geração de Caixa (falta de indicadores)
SE para em R$100-500k → Problema: Processo (indicadores existem, mas execução ruim)
SE para em R$500k-1M → Problema: Estrutura (não delegou)
SE para em R$1M → Problema: Modelo (precisa pivotar)
```

**Ponto 2: Quando Resgatar Não-Cliente vs Quando Abrir Mão**
```
SE Não-Cliente = preço
ENTÃO tenta reverter (mostra ROI, cria urgência)

SE Não-Cliente = timing
ENTÃO agenda follow-up automático (28 dias)

SE Não-Cliente = desconfiança
ENTÃO envida prova social (cases, resultados)

SE Não-Cliente = concorrência (vantagem comprovada)
ENTÃO aceita perda (Good-fit) e segue

SE padrão: > 90% "vou pensar" após 28 dias sem contato
ENTÃO stop follow-up, preserva reputação
```

**Ponto 3: Passagem de Bastão COM1→COM2 (Timing)**
```
SE Cliente 1ª Compra ainda testando produto
  ENTÃO mantém COM1 (hunting, fechamento)

SE Cliente confirmou satisfação (NPS > 7)
  ENTÃO passa para COM2 (farmer, retenção)

SE tenta passar antes
  ENTÃO cliente desaparece (sente abandono)
```

### Mecanismo de Inversão (Munger)

Conrado não pensa só "como crescer" mas "como não quebrar":

```
"O que mataria minha empresa?"
- Fluxo de caixa parar → Monitora caixa antes de DRE
- Vendedor deixar → Estrutura para não depender de 1
- Cliente insatisfeito → Overdelivery protocolo
- Indicadores escondidos → Reunião diária 9h40 obrigatória
- Mensagem errada → Estratégia por 9 públicos
```

### Lógica de Alocação de Recursos

**Regra:** "Dinheiro vai para o que gera retorno rápido (30 dias)."

```
SE Marketing CPL = R$200, ROAS = 5:1
ENTÃO duplica budget

SE Marketing CPL = R$200, ROAS = 1.5:1
ENTÃO corta 50% e testa variação

SE Comercial TX2 aumentou de 10% para 15%
ENTÃO duplica equipe

SE Comercial TX2 caiu
ENTÃO pausa novas contratações, diagnostica
```

### Velocidade de Decisão

**Indicador fornece verdade em 7 dias.** Não espera semana 8.

```
Dia 1: Problemidentificado
Dia 2-3: Indicador + Meta definidos
Dia 4-7: Teste rodando
Dia 8: Resultado analisado, decisão tomada (escala ou pivota)
```

