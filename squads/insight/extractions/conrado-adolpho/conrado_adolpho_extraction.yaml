## PLAYBOOK: Método 9 Públicos
### A Receita Passo-a-Passo

**Framework Central:** Evolução não-publicada dos 8Ps. Sistema que segmenta público em 9 estágios de consciência e aplica estratégia única para cada um. [SOURCE: p.5-10, Fundamentos]

### Passo 0: Definir as 4 Metas na Ordem Certa
[SOURCE: p.8-12]

Não é opcional. A ordem importa porque cada meta reinstrui o departamento anterior:

1. **Diminuir custos comerciais** → Reduz CAC da organização inteira
2. **Aumentar ticket médio** → Melhora receita mesmo com menos clientes
3. **Aumentar quantidade de clientes** → Escala agora que economia funciona
4. **Aumentar recorrência** → Converte cliente em cash machine

**Regra Veto:** "NUNCA inicie com objetivo #3 (muitos clientes barato). Mata empresa." [SOURCE: p.11]

### Passo 1: Montar 15 Indicadores + Metas
[SOURCE: p.35-60]

**Estrutura por Departamento:**

#### Financeiro (3 indicadores)
1. **Investimento** — Quanto gastamos em marketing/vendas
2. **Receita** — Quanto entra
3. **ROAS** — Receita ÷ Investimento (mínimo > 2 para lucro) [SOURCE: p.45]

#### Marketing (5 indicadores)
4. **Nº Leads** — Volume gerado
5. **Qualificação** — % que passam no filtro (meta mínima 70%) [SOURCE: p.48]
6. **CPL** — Custo Por Lead (Investimento ÷ Nº Leads)
7. **TX1** — Taxa de Conversão (Página → Lead)
8. **Levantada de Mão** — Quantidade de pessoas prontas para conversa

#### Comercial (5 indicadores)
9. **Ticket Médio** — Valor médio de cada venda
10. **CAC** — Custo de Aquisição de Cliente (CPL ÷ TX2). **Regra: CAC < 20% do Ticket Médio** [SOURCE: p.42]
11. **Nº Vendas** — Quantidade de clientes fechados
12. **TX2** — Taxa de Conversão (Lead → Cliente)
13. **LPV** — Leads Por Venda (inverso da TX2)
14. **LTV** — Lifetime Value (quanto cliente gera em recorrência)

#### Relação Crítica
15. **LTV:CAC Ratio** — Deve ser ≥ 3:1 (cada real investido retorna 3) [SOURCE: p.52]

**Cadeia de Decisão:** Indicador → Identificar problema → Definir meta → Plano de ação → Teste → Medir resultado → Prêmio/recurso [SOURCE: p.40]

### Passo 2: Estruturar 4 Departamentos
[SOURCE: p.15-25]

**O que mata empresa:** Falta de clareza de quem faz o quê.

```
Financeiro (CFO)
    ↓
Marketing (Gera leads / posiciona)
    ↓
Comercial 1 — HUNTER (Vende de uma vez / transacional)
    ↓
Comercial 2 — FARMER (Cultiva recorrência / relacional)
```

**Responsabilidades Claras:**

| Departamento | Responsável | Output |
|---|---|---|
| **Financeiro** | Gestor | Investimento alocado, ROAS monitorado |
| **Marketing** | CMO/Growth | Leads + Qualificação acima de 70% |
| **Comercial 1** | VP Sales | Primeira venda / Ticket médio |
| **Comercial 2** | CS/Farmer | Recorrência / Upsell / Retenção |

**4 Pilares da Geração de Caixa:** [SOURCE: p.18-20]

1. **Financeiro** — Onde o dinheiro vem/vai
2. **Marketing** — Gera demanda, qualifica
3. **Comercial 1** — Transforma demanda em venda
4. **Comercial 2** — Transforma cliente 1x em recorrente

### Passo 3: Aplicar Estratégia Específica para Cada um dos 9 Públicos
[SOURCE: p.70-160]

**Os 9 Públicos (estágios de consciência):**

#### Público 1: DESCONHECIDO
Não sabe que você existe. Objetivo: **Criar consciência**.

- **Estratégia:** Conteúdo top-of-funnel, presença massiva, branding
- **Canais:** Redes sociais, podcast, conteúdo viral
- **Mensagem:** "Existe solução para seu problema"
- **Métrica:** Reach, Impressões

#### Público 2: SEGUIDOR
Vê seu conteúdo regularmente. Objetivo: **Aprofundar relacionamento**.

- **Estratégia:** Newsletter, conteúdo periódico, pattern interrupt
- **Canais:** Email, WhatsApp, retargeting
- **Mensagem:** "Siga meus insights"
- **Métrica:** Engagement rate, cliques

#### Público 3: INDICADO
Alguém confiável pediu para avaliar você. Objetivo: **Converter em lead**.

- **Estratégia:** Landing page + seguimento
- **Canais:** Email direto, call to action claro
- **Mensagem:** "Vamos conhecer?"
- **Métrica:** Conversão página

#### Público 4: CONTATO/LEAD
Deixou contato. Objetivo: **Qualificar**.

- **Estratégia:** Sequência de emails, webinar, call qualificação
- **Canais:** Email nurture, WhatsApp
- **Mensagem:** "Qual seu tamanho? Qual seu problema?"
- **Métrica:** Qualificação > 70%

#### Público 5: QUASE-CLIENTE
Está convencido que tem problema. Objetivo: **Convencer que VOCÊ tem solução**.

- **Estratégia:** Demonstração, case study, objeção-handling
- **Framework:** [Blair Warren's 4 Core Triggers] + [16 Pontos de Valor] + [12 Blocos Persuasivos] [SOURCE: p.105-115]
  - 4 Gatilhos: Curiosidade, Esperança, Relevância, Dúvida (do concorrente)
  - 16 Pontos de Valor: Prazo, Preço, Qualidade, Exclusividade, Escassez, Risco, Prova, Urgência... [SOURCE: p.108]
  - 12 Blocos Persuasivos: Atenção → Problema → Agitação → Solução → Oferta → Prova → Objeção → Urgência → Bônus → Limite → CTA → Pós-venda [SOURCE: p.110-115]

- **Canais:** 1-on-1 call, demo ao vivo
- **Mensagem:** "Vou te mostrar como funciona"
- **Métrica:** Nº de descobertas de objeções reais

#### Público 6: NÃO-CLIENTE
Disse NÃO. Objetivo: **Resgatar ou eliminar**.

- **Estratégia:** Entender motivo (Preço? Timing? Desconfiança?)
- **Framework:** "Caminho do NÃO" — 5 motivos comuns, reversão para cada um [SOURCE: p.125-130]
  1. Preço alto → Mostrar ROI
  2. Timing → Agêndar follow-up automático
  3. Comparação com concorrente → Diferenciador único
  4. Desconfiança da pessoa → Prova social (cases)
  5. "Vou pensar" → Criar urgência ou agenda nova call

- **Recuperação:** 28 dias de follow-up automático [SOURCE: p.128]
- **Channels:** Email sequência, SMS, call pessoal
- **Métrica:** Taxa de resgate (5-15% comum)

#### Público 7: CLIENTE 1ª COMPRA
Comprou uma vez. Objetivo: **Primeira experiência perfeita + Upsell**.

- **Estratégia:** Overdelivery (dar mais do que prometido) [SOURCE: p.135-140]
  - 30% de bônus automático
  - Onboarding via vídeo
  - Check-in semanal (semanas 1-4)

- **Escada de Produtos:** 6 tipos de upsell [SOURCE: p.138-145]
  1. **Add-on** — Extra do mesmo produto (R$100-500)
  2. **Upgrade** — Versão premium (50% acima)
  3. **Bundle** — 2-3 produtos juntos (30% desconto)
  4. **Continuidade** — Acesso mensal (retém receita)
  5. **Novo Produto** — Complementar (após 30 dias)
  6. **Mentor/Suporte** — Alta-ticket (coaching anual)

- **Passagem de Bastão:** COM1 → COM2 acontece APÓS primeira entrega confirmada [SOURCE: p.142]
- **Métrica:** Ticket médio final, NPS

#### Público 8: CLIENTE RECORRENTE
Comprou 2+ vezes ou assina. Objetivo: **Virar cliente lifetime**.

- **Estratégia:** 3 Modelos de Receita [SOURCE: p.148-155]
  1. **Transacional** — Cliente ocasional (low-touch)
  2. **Continuidade** — Assinatura mensal (med-touch)
  3. **Partnership** — Strategic account (high-touch + white-glove)

- **Régua de Relacionamento:** [SOURCE: p.150-152]
  - Semana 1-4: Onboarding intenso
  - Mês 2-3: Educação (como extrair máximo valor)
  - Mês 4-6: Expansão (upsell, novos produtos)
  - Mês 7+: Retenção (check-in trimestral, renovação)

- **Good-Fit vs Bad-Fit:** Identificar clientes não-alinhados e oferecer alternativa [SOURCE: p.153]
  - Bad-Fit: "Seu caso é melhor com concorrente X. Vou indicar"
  - Libera espaço para Good-Fit, reduz churn

- **Métrica:** LTV, Churn rate < 5%, NPS > 50

#### Público 9: EX-CLIENTE
Saiu. Objetivo: **Entender motivo, recuperar ou usar como case negativo**.

- **Estratégia:** Entrevista de saída, oferta especial de retorno [SOURCE: p.160-165]
- **Métrica:** Taxa de reativação (10-20% comum)

### Passo 4: Construir Funis (Vendas + Relacionamento)
[SOURCE: p.55-65]

**Funil de Vendas (3 Etapas) — Para Públicos 1-6:**
1. **Topo (ATRAÇÃO)** — Promessa, curiosidade, relevância
   - Entrada: Desconhecido → Seguidor
   - Método: Conteúdo, ads, indicação
   - Métrica: Nº Leads

2. **Meio (ENGAJAMENTO)** — Mecanismo, prova social, case
   - Entrada: Seguidor → Quase-Cliente
   - Método: Demo, call, conteúdo profundo
   - Métrica: Taxa de qualificação

3. **Fundo (FECHAMENTO)** — Oferta irresistível, urgência, CTA
   - Entrada: Quase-Cliente → Cliente
   - Métrica: Ticket médio, CAC

**Funil de Relacionamento (4 Etapas) — Para Públicos 7-9:**
1. **Onboarding** — Primeira experiência (Público 7)
2. **Engajamento** — Educação, suporte (Público 7-8)
3. **Expansão** — Upsell, novos produtos (Público 8)
4. **Retenção** — Manutenção, renovação (Público 8-9)

**Diferença Critical:** [SOURCE: p.60-62]
- **COM1 (Hunter)** = Transacional. Fecha venda, sai.
- **COM2 (Farmer)** = Relacional. Cultiva para vida toda.

"Se você deixar tudo para COM1 fechar, perde recorrência. Se deixar tudo para COM2, perde velocidade de venda." [SOURCE: p.61]

### Passo 5: Medir, Testar, Melhorar (Ciclo Contínuo)
[SOURCE: p.75-90]

**Reuniões Diárias (9h40) — 15min máximo:**
- **Financeiro** reporta: Investimento, Receita, ROAS
- **Marketing** reporta: Leads, CPL, TX1, Qualificação
- **COM1** reporta: Vendas, Ticket, TX2, CAC
- **COM2** reporta: Retenção, LTV, Upsells

**Indicador → Meta → Plano → Teste → Resultado → Prêmio**

Exemplo:
- **Indicador:** CPL = R$200, Meta = R$100
- **Plano:** Testar 3 headlines novos, 2 landing pages, 1 canal novo
- **Teste:** Rodar por 7 dias
- **Resultado:** Header #2 reduziu CPL para R$120
- **Prêmio:** +5% budget para Marketing testa próximo

