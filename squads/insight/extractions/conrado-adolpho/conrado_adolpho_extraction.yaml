## SWIPE FILE: Casos Reais + Analogias + Frases
### O Que Funciona, Comprovado

### CASE: Webliv (Empresa Própria de Conrado)
[SOURCE: p.2-5]

**Contexto:** Plataforma de webinars + vendas ao vivo

**Resultados:**
- 5.000 leads/dia
- R$56.000 em faturamento EM 1 DIA durante evento
- Estrutura com 10+ vendedores simultâneos aplicando método 9 públicos

**Por que funcionou:**
- Segmentava público por nível de consciência
- Hunter + Farmer separados
- Indicadores monitorados em tempo real
- Cada público recebia mensagem diferente

**Aplicação:** Se você tem e-commerce, vendas online, ou precisa escalar rápido, o modelo Webliv prova que o método funciona em volume gigante

