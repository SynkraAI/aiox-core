### CASE: Domino's Pizza — "30min ou Grátis"
[SOURCE: p.27]

**A Oferta Irresistível:**
- **Promessa:** Entrega em 30 minutos
- **Garantia:** Se não chegar, grátis
- **Resultado:** Crescimento de 40x em 2 décadas

**Por que funciona:**
- Cliente não tem risco (se falhar, não paga)
- Empresa se força a otimizar (reduz CAC internamente)
- Confiança sobe (garante a promessa)

**Aplicação:** Sua oferta tem garantia clara? Se não, copiar Domino's.

