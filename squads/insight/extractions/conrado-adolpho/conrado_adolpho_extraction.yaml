### FRASES SIGNATURE (Verified)
[SOURCE: Repetidas p.5-160]

1. **"Lista é Poder"**
   - Aparece 12+ vezes durante aula
   - Contexto: "Se você não tem lista de pessoas interessadas, está pedindo esmola ao Facebook/Google"

2. **"Se você não tem vendas, você não tem empresa"**
   - Núcleo da filosofia
   - Significa: Sem receita, sem negócio. Pura matemática.

3. **"O que mata empresa é fluxo de caixa, não DRE"**
   - Diferencia lucro contábil (DRE) de caixa real (o que pode gastar)
   - Muita empresa é "lucrativa" mas quebra por falta de caixa

4. **"Empenho não é igual a desempenho"**
   - Vendedor que trabalha 12h/dia mas sem método vende pouco
   - Método > dedicação

5. **"Valor é emocional, preço é racional"**
   - Se cliente SENTE valor alto, aceita preço alto
   - Se reduz preço, percepção de valor cai (inversão)

6. **"NUNCA venda em 1 etapa"**
   - Regra veto absoluta
   - Demo + Oferta sempre em 2 conversas diferentes

7. **"Cliente precisa conhecer ANTES de comprar"**
   - Leva 5-7 touchpoints antes de confiança
   - Não é venda rápida, é estratégia 9 públicos

8. **"Se entrar cocô, sai cocô do outro lado"**
   - Sobre qualidade de leads: se Marketing qualifica mal, Comercial enfrenta lixo
   - Garbage in, garbage out

