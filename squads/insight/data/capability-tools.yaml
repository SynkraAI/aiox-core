cost_tiers:
  tier_0_free:
    monthly_cost: "$0"
    capacity: "~50 leads/mês"
    tools:
      - lighthouse_cli
      - google_pagespeed_api
      - google_places_api
      - brave_search_api
      - exa_mcp
      - playwright_mcp
      - instaloader
      - shot_scraper
      - md_to_pdf
      - seoq

  tier_1_low:
    monthly_cost: "~$50 único"
    capacity: "50-200 leads/mês"
    additions:
      - dataforseo
      - outscraper
      - apify_mcp

  tier_2_scale:
    monthly_cost: "~$50/mês"
    capacity: "200+ leads/mês"
    additions:
      - serper_api
      - whatsapp_cloud
      - hubspot_mcp
