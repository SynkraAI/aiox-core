name: insight
version: "1.0.0"
slashPrefix: insight
title: "Insight — Research, Diagnosis & Reporting"
description: >-
  Squad de market intelligence para negócios locais brasileiros.
  Pesquisa presença digital, mapeia oportunidades de mercado e transforma
  dados em relatórios narrativos que vendem. Acionado desde a pré-venda.
author: "OPB System"
icon: "🔍"
type: domain
domain: market-intelligence
entry_agent: insight-chief

# ICP (Ideal Customer Profile)
target:
  segment: "Negócios locais brasileiros"
  size: "5-30 funcionários"
  ticket: "> R$ 500"

# Autonomy model
autonomy:
  level_1_supervised:
    threshold: "Tudo passa pelo operador"
    auto_approve: false
  level_2_semi_autonomous:
    threshold: "Auto-aprova se confidence > 85%"
    escalate_to_human: "confidence < 85% OU anomalia detectada"
  level_3_autonomous:
    threshold: "Auto-aprova tudo, operador audita amostra"
    human_review: "10% aleatório + 100% de novos nichos"

# Dependencies
dependencies:
  required:
    - name: "Exa MCP"
      purpose: "Busca semântica"
      status: configured
    - name: "Brave Search API"
      purpose: "Busca SERP"
      tier: "2,000/mês grátis"
  optional:
    - name: "Google Places API"
      purpose: "Dados Maps"
      tier: "10,000/mês grátis"
    - name: "Google Ads API"
      purpose: "Keywords, volume, CPC"
      tier: "2,880 ops/dia"
    - name: "Lighthouse CLI"
      purpose: "Performance de sites"
      tier: "Grátis, ilimitado"
    - name: "SerpAPI"
      purpose: "SERP features"
      tier: "250/mês grátis"

# Tier System
tier_system:
  orchestrator:
    description: "Coordena workflow, roteia requests, aplica QA checkpoints"
    agent: insight-chief
  tier_0_diagnosis:
    description: "SEMPRE rodam primeiro — coletam dados e estabelecem baseline"
    agents:
      - digital-profiler   # Dossiê digital (presença online, score, gaps)
      - market-scout       # Mapa competitivo (keywords, concorrentes, oportunidades)
  tier_1_execution:
    description: "Executores primários — transformam dados em entregáveis"
    agents:
      - data-storyteller   # Reports narrativos (impacto, mensal, semanal)
  tier_2_strategy:
    description: "Estratégia e frameworks de negócio"
    agents:
      - conrado-adolpho    # 8Ps, diagnóstico por indicadores, funil de vendas

# Agents
agents:
  - insight-chief
  - digital-profiler
  - market-scout
  - data-storyteller
  - conrado-adolpho

# Tasks
tasks:
  - run-profiler
  - run-scout
  - run-storyteller
  - qa-checkpoint
  - prepare-handoff

# Workflows
workflows:
  - wf-new-lead
  - wf-recurring-reports

# Templates
templates:
  - dossie-tmpl
  - opportunity-map-tmpl
  - impact-report-tmpl
  - monthly-report-tmpl
  - handoff-production-tmpl
  - handoff-automation-tmpl
  - handoff-operations-tmpl

# Checklists
checklists:
  - qa-checkpoint-checklist

# Handoffs to other squads
handoffs:
  - to: "Squad 2 (Produção)"
    what: "Dossiê + mapa → briefing para copy, Maps, SiteOps"
  - to: "Squad 3 (Automação)"
    what: "Mapa de oportunidades → setup de CRM e tracking"
  - to: "Squad 4 (Operação)"
    what: "Score de maturidade → priorização de onboarding"

# Pattern Library
pattern_library:
  prefix: IN
  naming_convention:
    format: "{PREFIX}-{CATEGORY}-{NUMBER}"
    example: "IN-TP-001"
  categories:
    - id: TP
      name: "Task Patterns"
    - id: EP
      name: "Executor Patterns"
    - id: PP
      name: "Process Patterns"
    - id: RP
      name: "Report Patterns"
  patterns: []

# Workflow config
workflow_config:
  checkpoint_policy: always_active
  fail_fast: true
  allow_manual_override: false

# Data references
data:
  - niche-config
  - brazilian-context
  - scoring-rubric
  - tool-strategies
  - capability-tools  # Tool-to-capability mapping (generated by wf-discover-tools)

# Tags
tags:
  - market-intelligence
  - digital-profiling
  - competitor-analysis
  - data-storytelling
  - pre-sales
  - diagnostics
  - reporting
  - brazilian-market
  - local-business
