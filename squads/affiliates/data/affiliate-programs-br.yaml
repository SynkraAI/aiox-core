    payout_minimum_brl: 100
    payment_frequency: quinzenal
    dashboard_quality: good
    deep_link: true
    sub_affiliate: true
    sub_affiliate_commission_pct: 5
    payment_international: false
    strengths:
      - forte em suplementos e produtos físicos
      - sub-afiliados (2 níveis)
      - checkout com upsell nativo
    weaknesses:
      - interface menos moderna
      - volume menor que Hotmart
    top_categories:
      - suplementos
      - saude_beleza
      - cursos_online
      - emagrecimento

  eduzz:
    name: Eduzz
    url: https://www.eduzz.com
    type: marketplace
    marketplace: true
    commission_range:
      min_pct: 20
      max_pct: 75
      typical_pct: 38
      notes: "Plataforma completa com ERP para produtores."
    cookie_duration_days: 30
    payout_method:
      - transferencia_bancaria
