# Plataformas de Afiliados — Mercado Brasileiro
# Atualizado: 2026-02 | Fonte: pesquisa de mercado + dados públicos das plataformas
# Uso: referência para agentes affiliate-br e affiliate-strategist

metadata:
  version: "1.0"
  last_updated: "2026-02"
  currency: BRL
  notes: "Comissões variam por produto/produtor. Verifique sempre na plataforma."

programs:

  hotmart:
    name: Hotmart
    url: https://www.hotmart.com
    type: marketplace
    marketplace: true
    commission_range:
      min_pct: 20
      max_pct: 80
      typical_pct: 40
      notes: "Produtos digitais (cursos, ebooks). Produtor define a comissão."
    cookie_duration_days: 30
    payout_method:
      - transferencia_bancaria
      - paypal
      - wire_transfer
    payout_minimum_brl: 100
    payment_frequency: quinzenal
    dashboard_quality: excellent
    deep_link: true
    sub_affiliate: false
    payment_international: true
    strengths:
      - maior marketplace de infoprodutos do Brasil
      - painel de afiliados robusto com relatórios detalhados
      - suporte a cupons de desconto para afiliados
      - HotLeads para captura antes da compra
    weaknesses:
      - taxa de 9,9% sobre vendas (descontado do produtor)
      - disputa de afiliados acirrada nos produtos populares
    top_categories:
      - cursos_online
      - marketing_digital
      - saude_emagrecimento
      - financas_pessoais
      - idiomas

  kiwify:
    name: Kiwify
    url: https://www.kiwify.com.br
    type: marketplace
    marketplace: true
    commission_range:
      min_pct: 20
      max_pct: 80
      typical_pct: 45
      notes: "Crescendo rapidamente. Muitos produtores migram da Hotmart para taxas menores."
    cookie_duration_days: 30
    payout_method:
      - pix
      - transferencia_bancaria
    payout_minimum_brl: 80
    payment_frequency: quinzenal
    dashboard_quality: good
    deep_link: true
    sub_affiliate: false
    payment_international: false
    strengths:
      - taxa menor que Hotmart (4,99% + R$1 por venda)
      - Pix instantâneo para recebimento
      - interface moderna e intuitiva
      - suporte mais rápido que concorrentes
    weaknesses:
      - catálogo menor que Hotmart
      - sem suporte a pagamento internacional para afiliados
    top_categories:
      - cursos_online
      - saude
      - relacionamento
      - financas

  monetizze:
    name: Monetizze
