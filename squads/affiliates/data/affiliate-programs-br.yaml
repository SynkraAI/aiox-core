      - paypal
    payout_minimum_brl: 100
    payment_frequency: quinzenal
    dashboard_quality: good
    deep_link: true
    sub_affiliate: false
    payment_international: true
    strengths:
      - infraestrutura robusta para produtores
      - integração com múltiplos gateways
      - bom rastreamento de conversões
    weaknesses:
      - migração de produtores para Hotmart/Kiwify
