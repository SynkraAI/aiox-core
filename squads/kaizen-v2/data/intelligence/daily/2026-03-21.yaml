# --- Bulletproof Test toki-bot Session (2026-03-21T23:00:00.000Z) ---
date: "2026-03-21"
capture_time: "2026-03-21T23:00:00.000Z"
session_id: bulletproof-toki-bot
session_count: 1
providers_active:
  - claude-opus-4-6
activity_summary: "Bulletproof-test toki-bot: 333 scenarios, 206 new tests, 0 → 206 passing"
highlights:
  - "Multimodal event handling bug: audio/photo/forward detect events but save as ideas instead of creating calendar events"
  - "Recurring events ignore dayOfWeek and have month overflow bugs (31 jan → 3 mar via setMonth)"
  - "In-memory Maps (pendingEvents/pendingBatchEvents) lost on restart/deploy — no persistence fallback"
learnings:
  - "Multimodal handlers (audio/photo/forward/link) detect event type but save as ideas — functional inconsistency where same content gets different treatment depending on input channel"
  - "pendingEvents and pendingBatchEvents are in-memory Maps with no persistence. Any restart/deploy/crash loses all pending confirmations. Users clicking stale buttons get cryptic 'expirado' message."
  - "JavaScript setMonth causes overflow for month-end dates: new Date('2026-01-31').setMonth(1) produces March 3, not Feb 28. Recurring monthly events on day 31 generate wrong dates for 5 months per year."
  - "dayOfWeek from LLM classifier is received but completely ignored in recurring event generation. 'Toda sexta a partir de segunda' creates events on Mondays."
  - "Link handler needed URL protocol normalization — URLs without https:// prefix fail silently or get treated as relative paths"
  - "VPS with limited memory: tsc and drizzle-kit OOM without NODE_OPTIONS=--max-old-space-size. Solution: build locally and deploy compiled JS."
  - "PM2 cluster mode conflicts with HTTP server for Google OAuth callback — multiple instances try to bind same port. Fork mode required."
  - "PostgreSQL connection URL needs URL-encoding for special characters in password (e.g., @ becomes %40). Raw special chars cause parse errors."
  - "Google OAuth requires 'Web Application' client type for redirect URIs. Desktop client type silently ignores redirect_uri parameter."
  - "Google doesn't allow IP addresses in OAuth redirect URIs — needs localhost + SSH tunnel for VPS callback flow"
  - "Config tests (dotenv) need mock before import — ESM hoists imports, so vi.mock must be called before the module under test loads"
  - "grammY Context mocks need specific shape: message.from, message.chat, api.getFile, reply, etc. Partial mocks cause cryptic 'cannot read property of undefined' errors"
  - "Date.now() as Map key causes collision when two events processed in same millisecond — UUID or atomic counter required for pending event keys"
decisions:
  - "All 73 P0 and 133 P1 scenarios covered — 99 P2 and 20 P3 deferred to future sprints"
  - "Vitest chosen as test framework with ESM-native config for TypeScript project"
  - "Behavioral/cross-feature tests added as separate suite (14 tests) to catch interaction bugs"
stories_touched: []
agents_involved:
  - analyst
  - qa
  - dev
  - memory-keeper
