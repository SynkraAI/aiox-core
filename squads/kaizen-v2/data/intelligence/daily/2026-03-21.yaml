# --- Bulletproof Test v2.1 Session (2026-03-21T17:30:00.000Z) ---
date: "2026-03-21"
capture_time: "2026-03-21T17:30:00.000Z"
session_id: bulletproof-v2.1
session_count: 1
providers_active:
  - claude-opus-4-6
activity_summary: "Bulletproof-test v2.1: 604 scenarios, 30 new tests, 1196 → 1226 passing. Full 7-phase pipeline with SBTM."
highlights:
  - "SBTM Phase 2 discovered 12 risks that Phase 1 missed — chosenCalendarId never clears, addToolUse doesn't trim, short substring delete matches unintended events"
  - "Production incident scenarios (from calendar-session-report.md) all verified as covered"
  - "Context injector singleton cache shared across chatIds — documented risk for multi-chat setups"
learnings:
  - "chosenCalendarId Map in tool-executor.ts is module-level and never clears — once a calendar is chosen, it persists until PM2 restart. /clear doesn't reset it."
  - "addToolUse in conversation.ts doesn't trim the history array — only addMessage trims. Heavy tool use can push history beyond MAX_MESSAGES (40)."
  - "Short exact substring queries (2 chars like 'ab') in delete_event can match unintended events — 'ab' matches 'Isabelle', 'abstract', 'cab'. Not fuzzy but still risky for destructive operations."
  - "removeTrackedEvent marks events as deleted but doesn't free the slot in the 20-entry array. Slots get wasted over time."
  - "Context injector cache is a module-level singleton, not per-chat. Error responses get cached for 5 minutes even after API recovers."
  - "Phase 2 SBTM is critical — it found patterns that static code analysis (Phase 1) completely missed. Never skip it."
decisions:
  - "Running Bulletproof Test v2.1 with all 7 phases enforced, no shortcuts"
  - "Incremental mode reused existing 1196 tests as baseline"
stories_touched: []
agents_involved:
  - analyst
  - qa
  - dev
  - memory-keeper

