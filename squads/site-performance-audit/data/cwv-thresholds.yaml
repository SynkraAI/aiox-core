# Core Web Vitals Thresholds Reference
# Source: web.dev/vitals (Google Chrome team)
# Updated: 2026-03

metrics:
  lcp:
    name: "Largest Contentful Paint"
    description: "Measures loading performance — when the largest content element becomes visible"
    thresholds:
      good: 2500          # <= 2.5s
      needs_improvement: 4000  # 2.5s - 4.0s
      poor: 4001          # > 4.0s
    unit: milliseconds
    reporting: p75
    source: [lab, field]
    common_elements: ["Hero image", "H1 text block", "Video poster", "Background image", "SVG"]
    common_causes:
      - cause: "Slow server response (TTFB)"
        check: "TTFB > 800ms"
      - cause: "Render-blocking resources"
        check: "CSS/JS in <head> without defer/async"
      - cause: "Slow resource load time"
        check: "LCP image > 200KB or not preloaded"
      - cause: "Client-side rendering"
        check: "LCP element generated by JavaScript"

  cls:
    name: "Cumulative Layout Shift"
    description: "Measures visual stability — how much the page layout shifts unexpectedly"
    thresholds:
      good: 0.1
      needs_improvement: 0.25
      poor: 0.26
    unit: score
    reporting: p75
    source: [lab, field]
    common_causes:
      - cause: "Images without dimensions"
        check: "img tags missing width/height"
      - cause: "Ads/embeds without reserved space"
        check: "Dynamic ad injection without container size"
      - cause: "Font loading (FOIT/FOUT)"
        check: "Web fonts without font-display:swap"
      - cause: "Dynamic content injection"
        check: "Content added above existing elements"

  inp:
    name: "Interaction to Next Paint"
    description: "Measures responsiveness — latency of user interactions throughout page lifecycle"
    thresholds:
      good: 200           # <= 200ms
      needs_improvement: 500  # 200-500ms
      poor: 501            # > 500ms
    unit: milliseconds
    reporting: p75
    source: [field]        # INP is field-only; TBT is lab proxy
    lab_proxy: "Total Blocking Time (TBT)"
    note: "Replaced First Input Delay (FID) in March 2024"
    common_causes:
      - cause: "Long JavaScript tasks"
        check: "Tasks > 50ms on main thread"
      - cause: "Excessive DOM size"
        check: "DOM elements > 1500"
      - cause: "Synchronous operations"
        check: "Sync XHR or heavy computation in event handlers"
      - cause: "Heavy third-party scripts"
        check: "3rd-party JS main thread blocking time"

  # Supporting metrics (not CWV but important)
  ttfb:
    name: "Time to First Byte"
    description: "Server response time"
    thresholds:
      good: 800
      needs_improvement: 1800
      poor: 1801
    unit: milliseconds
    source: [lab, field]

  fcp:
    name: "First Contentful Paint"
    description: "When the first content element appears"
    thresholds:
      good: 1800
      needs_improvement: 3000
      poor: 3001
    unit: milliseconds
    source: [lab, field]

