# Performance-Business correlation data
business_impact:
  source: "Tammy Everts — Time Is Money (O'Reilly) + industry studies"
  correlations:
    - "53% of mobile users abandon pages taking > 3s to load (Google)"
    - "1s delay in page load → 7% reduction in conversions (Akamai)"
    - "Amazon: 100ms latency cost 1% in sales"
    - "Walmart: every 1s improvement → 2% conversion increase"
    - "BBC: lost 10% of users for every additional second of page load"
    - "Pinterest: 40% reduction in wait time → 15% increase in SEO traffic"
