    viral_coefficient:
      good: "1.0"
      viral: "1.5"
      mega_viral: "3.0+"

  algorithm_signals_2025:
    - signal: "Saves"
      weight: "10x"
      description: "Strongest signal"
    - signal: "Shares"
      weight: "8x"
      description: "Viral indicator"
    - signal: "Watch Time"
