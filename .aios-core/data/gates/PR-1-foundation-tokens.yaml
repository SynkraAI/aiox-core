  - "After scope creep removal, re-run lint — expect delta to drop to ~0 vs main."
  - "Consider also flipping `font-bold` → `font-semibold` on label-overline consumers (button.tsx, footer.tsx 3x, mesas/[modelo]/page.tsx) to match DESIGN.md's Raleway 600 spec. Non-blocking."
  - "Verify `data-3d-interact` attributes added in configurador-3d.tsx are not part of the meta-tracker analytics hookup; if they are, move them to the same separate PR."
  - "Visual regression: Vercel preview deploy + manual screenshot diff on hero, headings, configurador, footer. The token-only changes should be pixel-identical except for mandated Conclave N6 changes."
  - "Update FINAL-DECISIONS.md or the dev brief to be explicit that A/B-test/PriceHint atoms ship in PR 2 (hero rebuild PR), not PR 1 — ambiguity here may have led to the scope creep."

