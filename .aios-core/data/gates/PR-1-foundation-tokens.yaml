summary: |
  PR 1 (foundation tokens) executed the codemod correctly and the build passes,
  but aios-dev bundled an unrelated Meta Ads CAPI A/B-test instrumentation feature
  into the same branch (PriceHint atom + meta-tracker.ts +349 lines + meta-lead-tracker
  + /api/meta-conversion route + proxy.ts + tracking.ts +78 lines + layout/page wiring).
  This violates the explicit DEV-BRIEF "DO NOT add new components", "DO NOT change copy",
  and "PR 1 is tokens-only" scope guards. The token migration itself is clean (zero
  text-[*] / tracking-[*] remaining, codemod idempotent, .heading deleted, build PASSES,
  21 pages generated). The CAPI/A-B-test work must be SPLIT into a separate PR.

