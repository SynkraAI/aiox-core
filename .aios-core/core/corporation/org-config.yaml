# =====================================================
# HIERARCHY LEVELS
# =====================================================
levels:
  L5:
    name: "CEO"
    type: human
    description: "Human operator -- ultimate authority"
    max_agents: 1
  L4:
    name: "C-Suite"
    type: ai
    description: "Strategic leadership agents"
    max_agents: 10
  L3:
    name: "VP / Chief"
    type: ai
    description: "Department heads and senior leadership"
    max_agents: 20
  L2:
    name: "Senior"
    type: ai
    description: "Senior specialists and domain experts"
    max_agents: 50
  L1:
    name: "Operator"
    type: ai
    description: "Execution agents and specialists"
    max_agents: 80
  L0:
    name: "Tool"
    type: tool
    description: "Internal tools and utility agents"
    max_agents: null

