# =============================================================================
# AIOX Corporation -- Tool Permission Matrix
# =============================================================================
# Maps agent hierarchy levels to external tool access rights.
# Works in conjunction with tool-integrations.yaml and permissions.yaml.
#
# Version: 1.0.0
# Updated: 2026-03-24
# =============================================================================

version: "1.0.0"
updated_at: "2026-03-24T00:00:00Z"

# =============================================================================
# ACCESS LEVEL DEFINITIONS
# =============================================================================
access_levels:

  L0:
    name: "Tool"
    tool_access: none
    description: "No external tool access. Internal utility agents only."
    capabilities: []

  L1:
    name: "Operator"
    tool_access: read_only
    description: "Read-only access to tools assigned to their department."
    capabilities:
      - read-data
      - list-resources
      - view-dashboards
      - query-metrics
      - search
    restrictions:
      - no-write-operations
      - no-delete-operations
      - no-configuration-changes
      - no-payment-operations
      - no-deployment-operations

  L2:
    name: "Senior"
    tool_access: read_write
    description: "Read and write access to department-assigned tools."
    capabilities:
      - read-data
      - write-data
      - create-resources
      - update-resources
      - list-resources
      - view-dashboards
      - query-metrics
      - search
      - run-scans
      - generate-reports
    restrictions:
      - no-delete-operations-on-production
      - no-payment-operations
      - no-infrastructure-changes
      - no-access-to-other-departments

  L3:
    name: "VP / Chief"
    tool_access: full_department_plus_cross_read
    description: "Full access to department tools. Read-only cross-department."
    capabilities:
      - read-data
      - write-data
      - create-resources
      - update-resources
      - delete-resources
      - configure-tools
      - manage-webhooks
      - list-resources
      - view-dashboards
      - query-metrics
      - search
      - run-scans
      - generate-reports
      - cross-department-read
    restrictions:
      - no-payment-execution
      - no-production-deployment-without-approval
      - cross-department-write-requires-approval

  L4:
    name: "C-Suite"
    tool_access: full_all
    description: "Full access to all tools across all departments."
    capabilities:
      - read-data
      - write-data
      - create-resources
      - update-resources
      - delete-resources
      - configure-tools
      - manage-webhooks
      - manage-integrations
      - approve-sensitive-operations
      - cross-department-full-access
      - budget-approval
      - list-resources
      - view-dashboards
      - query-metrics
      - search
      - run-scans
      - generate-reports
    restrictions:
      - payment-execution-requires-dual-approval
      - production-deployment-requires-qa-gate

  L5:
    name: "CEO"
    tool_access: unrestricted
    description: "Unrestricted access. Human operator with full override authority."
    capabilities:
      - all
    restrictions: []

