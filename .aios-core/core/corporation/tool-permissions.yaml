# =============================================================================
# SENSITIVE OPERATIONS -- APPROVAL REQUIREMENTS
# =============================================================================
sensitive_operations:

  payment_processing:
    description: "Any operation that initiates or modifies a financial transaction"
    affected_tools: [stripe-api]
    operations:
      - create-charge
      - create-refund
      - modify-subscription
      - create-payout
      - update-pricing
    min_level: L3
    approval_required: true
    approval_chain:
      - role: department_head
        required: true
      - role: cfo
        required: true
        for_amount_above: 1000
      - role: ceo
        required: true
        for_amount_above: 10000
    audit_log: mandatory
    cooldown_period: "5 minutes"

  production_deployment:
    description: "Deploying code or configuration changes to production"
    affected_tools: [github-api, docker-api]
    operations:
      - merge-to-main
      - deploy-production
      - update-production-config
      - scale-production-services
    min_level: L2
    approval_required: true
    approval_chain:
      - role: qa
        required: true
        condition: "all tests pass"
      - role: department_head
        required: true
      - role: cto
        required: true
        for_critical_services: true
    prerequisite_gates:
      - qa-gate-passed
      - security-scan-clean
      - code-review-approved
    audit_log: mandatory

  data_deletion:
    description: "Permanent deletion of data from any system"
    affected_tools:
      - hubspot-crm
      - stripe-api
      - strapi-cms
      - metabase-api
      - fhir-server
    operations:
      - delete-customer-data
      - purge-records
      - drop-database
      - remove-backups
    min_level: L3
    approval_required: true
    approval_chain:
      - role: department_head
        required: true
      - role: cto
        required: true
      - role: ceo
        required: true
        for_bulk_deletion: true
    safeguards:
      - backup-before-delete
      - 24h-soft-delete-period
      - confirmation-prompt
    audit_log: mandatory

  api_key_management:
    description: "Creating, rotating, or revoking API keys and tokens"
    affected_tools: [all]
    operations:
      - create-api-key
      - rotate-api-key
      - revoke-api-key
      - update-oauth-credentials
    min_level: L3
    approval_required: true
    approval_chain:
      - role: devops
        required: true
      - role: ciso
        required: true
    audit_log: mandatory

  infrastructure_changes:
    description: "Modifying infrastructure configuration or scaling"
    affected_tools: [docker-api, grafana-api, prometheus-api]
    operations:
      - modify-infrastructure
      - scale-services
      - change-network-config
      - update-security-groups
    min_level: L3
    approval_required: true
    approval_chain:
      - role: devops
        required: true
      - role: cto
        required: true
    audit_log: mandatory

  health_data_access:
    description: "Accessing or modifying protected health information (PHI)"
    affected_tools: [infermedica-api, fhir-server]
    operations:
      - read-patient-data
      - write-patient-data
      - export-health-records
      - modify-clinical-data
    min_level: L2
    approval_required: true
    approval_chain:
      - role: department_head
        required: true
      - role: compliance_officer
        required: true
    compliance:
      - hipaa
      - lgpd
      - gdpr
    audit_log: mandatory
    data_encryption: required

  bulk_communication:
    description: "Sending messages to large groups or public channels"
    affected_tools: [discord-api, slack-api, ghost-api, buffer-api]
    operations:
      - send-mass-message
      - publish-announcement
      - send-newsletter
      - broadcast-notification
    min_level: L2
    approval_required: true
    approval_chain:
      - role: department_head
        required: true
      - role: cmo
        required: true
        for_external_communication: true
    audit_log: mandatory

# =============================================================================
# CROSS-DEPARTMENT TOOL ACCESS
# =============================================================================
cross_department_access:
  description: "Rules for accessing tools outside an agent's primary department"

  rules:
    - level: L0
      cross_access: none

    - level: L1
      cross_access: none

    - level: L2
      cross_access: none

    - level: L3
      cross_access: read_only
      requires_approval: false
      scope: "Any tool in tool-integrations.yaml"
      restrictions:
        - no-write-operations
        - no-configuration-changes
        - audit-log-required

    - level: L4
      cross_access: full
      requires_approval: false
      scope: "All tools"
      restrictions:
        - sensitive-operations-still-require-approval

    - level: L5
      cross_access: unrestricted
      requires_approval: false
      scope: "All tools, all operations"
      restrictions: []

# =============================================================================
# AUDIT & COMPLIANCE
# =============================================================================
audit:
  log_retention: "90 days"
  log_format: "json"
  log_location: ".aiox-core/logs/tool-access/"

  mandatory_logging_for:
    - all-write-operations
    - all-delete-operations
    - all-sensitive-operations
    - all-cross-department-access
    - all-L4-and-L5-operations

  alert_triggers:
    - unauthorized-access-attempt
    - sensitive-operation-without-approval
    - rate-limit-exceeded
    - unusual-access-pattern
    - api-key-usage-anomaly

  review_schedule:
    frequency: weekly
    reviewer: devops
    escalation: cto
