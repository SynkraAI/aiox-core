# =============================================================================
# AIOX Corporation -- External Tool Integrations
# =============================================================================
# Defines all external tools that Corporation agents can use, organized by
# category. Each tool specifies authentication, capabilities, consumers,
# and operational limits.
#
# Version: 1.0.0
# Updated: 2026-03-24
# =============================================================================

version: "1.0.0"
updated_at: "2026-03-24T00:00:00Z"

# =============================================================================
# ENGINEERING TOOLS
# =============================================================================
engineering:

  github-api:
    name: "GitHub REST/GraphQL API"
    type: api
    description: "Source control, pull requests, issues, code review, Actions CI/CD"
    auth_method: token
    auth_env_var: GITHUB_TOKEN
    base_url: "https://api.github.com"
    capabilities:
      - pull-request-management
      - issue-tracking
      - code-review
      - actions-workflow-dispatch
      - repository-management
      - release-management
      - webhook-management
    departments: [engineering, product]
    agents: [devops, dev, qa, architect, pm, po]
    free_tier:
      rate_limit: "5000 requests/hour (authenticated)"
      notes: "Unlimited public repos, 2000 Actions min/month free"
    priority: critical

  semgrep-cli:
    name: "Semgrep CLI"
    type: cli
    description: "Static analysis, security scanning, custom rule authoring"
    auth_method: none
    command: "semgrep"
    install: "pip install semgrep"
    capabilities:
      - static-analysis
      - security-vulnerability-detection
      - custom-rule-engine
      - autofix-suggestions
      - sarif-output
    departments: [engineering, security]
    agents: [dev, qa, architect]
    free_tier:
      rate_limit: "Unlimited local scans"
      notes: "Open-source CLI is free; Semgrep Cloud free for up to 10 devs"
    priority: high

  sonarqube-api:
    name: "SonarQube API"
    type: api
    description: "Code quality metrics, coverage tracking, tech debt measurement"
    auth_method: token
    auth_env_var: SONARQUBE_TOKEN
    base_url: "https://sonarcloud.io/api"
    capabilities:
      - code-quality-analysis
      - coverage-tracking
      - tech-debt-estimation
      - code-smell-detection
      - security-hotspot-review
      - quality-gate-enforcement
    departments: [engineering]
    agents: [qa, dev, architect]
    free_tier:
      rate_limit: "Unlimited for public projects"
      notes: "SonarCloud free for open-source; Community Edition self-hosted free"
    priority: high

  coderabbit-ai:
    name: "CodeRabbit AI"
    type: api
    description: "AI-powered automated code review on pull requests"
    auth_method: oauth
    auth_env_var: CODERABBIT_API_KEY
    base_url: "https://api.coderabbit.ai"
    capabilities:
      - ai-code-review
      - pr-summary-generation
      - incremental-review
      - custom-review-instructions
    departments: [engineering]
    agents: [qa, dev, architect]
    free_tier:
      rate_limit: "Unlimited for open-source"
      notes: "Free for public repos; Pro plan for private repos"
    priority: medium

