# Corporation Scheduler -- Default Schedule Definitions
#
# Each schedule defines a recurring, one-time, or event-driven task.
#
# Types:
#   cron  -- recurring via cron expression (min hour dom month dow)
#   once  -- one-time execution at a specific datetime
#   event -- reactive, triggered by named events
#
# Cron fields: minute hour day-of-month month day-of-week
#   Supports: *, numbers, lists (1,3,5), ranges (1-5), steps (*/5)
#   Day-of-week: 0=Sunday, 1=Monday, ... 6=Saturday
#
# @story CORP-7
# @version 1.0.0

schedules:
  - name: daily-standup-report
    type: cron
    cron: "0 9 * * 1-5"
    task:
      type: standup
      description: Generate daily standup report
      department: operations
      priority: high
    level: L2
    department: operations
    enabled: true

  - name: weekly-security-scan
    type: cron
    cron: "0 10 * * 1"
    task:
      type: security_audit
      description: Weekly security scan
      department: security
      priority: medium
    level: L2
    department: security
    enabled: true

  - name: sprint-review
    type: cron
    cron: "0 16 * * 5"
    task:
      type: sprint_review
      description: Sprint review and retrospective
      department: operations
      priority: high
    level: L3
    department: operations
    enabled: true

  - name: dependency-check
    type: cron
    cron: "0 3 * * *"
    task:
      type: dependency_audit
      description: Check dependencies for updates and vulnerabilities
      department: engineering
      priority: low
    level: L2
    department: engineering
    enabled: true

  - name: code-quality-audit
    type: cron
    cron: "0 14 * * 5"
    task:
      type: qa
      description: Automated code quality audit
      department: engineering
      priority: medium
    level: L2
    department: engineering
    enabled: true

  - name: pr-auto-review
    type: event
    event: new_pr
    task:
      type: review
      description: Automatic PR review
      department: engineering
      priority: medium
    level: L2
    department: engineering
    enabled: true

  - name: issue-triage
    type: event
    event: new_issue
    task:
      type: standup
      description: Triage incoming issue
      department: operations
      priority: medium
    level: L2
    department: operations
    enabled: true

