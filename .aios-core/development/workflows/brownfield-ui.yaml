workflow:
  id: brownfield-ui
  name: Brownfield UI/Frontend Enhancement
  description: >-
    Linear agent workflow for enhancing existing frontend applications with new features,
    modernization, or design improvements. Each agent appears once in a strictly sequential pipeline.
  type: brownfield
  version: "2.0"
  project_types:
    - ui-modernization
    - framework-migration
    - design-refresh
    - frontend-enhancement

  metadata:
    elicit: true
    confirmation_required: true

  phases:
    - phase_1: Discovery
    - phase_2: Planning
    - phase_3: Validation
    - phase_4: Execution
    - phase_5: Retrospective

  sequence:
    # ─── Phase 1: Discovery ───────────────────────────────────────────────
    - phase: 1
      name: Discovery
      description: "Analyze existing UI architecture and identify improvement areas"
      gate:
        condition: "Architecture analysis document exists with component inventory and improvement recommendations"
        on_fail: "HALT — architect must complete analysis before planning can begin"

    - id: architect-ui-analysis
      step: ui_analysis
      agent: architect
      action: analyze existing project and use task document-project
      creates: multiple documents per the document-project template
      artifacts:
        - existing-ui-analysis.md
        - component-inventory.md
        - improvement-recommendations.md
      duration_estimate: "30-60 min"
      notes: "Review existing frontend application, user feedback, analytics data. Identify improvement areas, component patterns, and technical debt. This is the ONLY architect step in the workflow."

    # ─── Phase 2: Planning ────────────────────────────────────────────────
    - phase: 2
      name: Planning
      description: "Create PRD and frontend specification based on architecture analysis"
      gate:
        condition: "prd.md and front-end-spec.md exist with complete acceptance criteria and component specs"
        on_fail: "HALT — both documents must be finalized before validation"

    - id: pm-create-prd
      agent: pm
      creates: prd.md
      uses: brownfield-prd-tmpl
      artifacts:
        - prd.md
      duration_estimate: "30-60 min"
      requires: existing-ui-analysis.md
      notes: "Creates comprehensive PRD focused on UI enhancement with existing system analysis. SAVE OUTPUT: Copy final prd.md to your project's docs/ folder."

    - id: ux-create-frontend-spec
      agent: ux-design-expert
      creates: front-end-spec.md
      uses: front-end-spec-tmpl
      artifacts:
        - front-end-spec.md
        - existing-pattern-audit.md
      duration_estimate: "30-45 min"
      requires: prd.md
      notes: "Creates UI/UX specification AND audits existing design patterns for reuse. Integrates with existing patterns identified by architect. SAVE OUTPUT: Copy final front-end-spec.md to your project's docs/ folder."

    # ─── Phase 3: Validation ──────────────────────────────────────────────
    - phase: 3
      name: Validation
      description: "PO validates all artifacts, shards into development-ready stories"
      gate:
        condition: "All artifacts pass PO master checklist AND sharded docs created"
        on_fail: "HALT — PO must resolve all issues before execution begins"

    - id: po-validate-artifacts
      agent: po
      validates: all_artifacts
      uses: po-master-checklist
      artifacts:
        - validation-report.md
      duration_estimate: "15-30 min"
      notes: "Validates all documents for UI integration safety and design consistency. Delegates fixes to relevant agent if issues found, then re-validates."

    - id: po-shard-documents
      agent: po
      action: shard_documents
      creates: sharded_docs
      artifacts:
        - docs/prd/ (sharded content)
        - docs/architecture/ (sharded content)
      duration_estimate: "15-30 min"
      requires:
        - prd.md
        - front-end-spec.md
      notes: |
        Shard documents for IDE development:
        - Option A: Use PO agent to shard: @po then ask to shard docs/prd.md
        - Option B: Manual: Drag shard-doc task + docs/prd.md into chat
        - Creates docs/prd/ and docs/architecture/ folders with sharded content

    # ─── Phase 4: Execution ───────────────────────────────────────────────
    - phase: 4
      name: Execution
      description: "Iterative story implementation with QA review"
      gate:
        condition: "All stories implemented, QA reviewed, zero critical issues open"
        on_fail: "Continue story cycle until all stories complete"

    - id: sm-create-story
      agent: sm
      action: create_story
      creates: story.md
      artifacts:
        - story.md
      duration_estimate: "15-30 min"
      requires: sharded_docs
      repeats: for_each_epic
      notes: |
        Story creation cycle:
        - SM Agent (New Chat): @sm -> *create
        - Creates next story from sharded docs
        - Story starts in "Draft" status

    - id: dev-implement-story
      agent: dev
      action: implement_story
      creates: implementation_files
      artifacts:
        - implementation source files
        - updated story file list
      duration_estimate: "1-4 hours"
      requires: story.md
      notes: |
        Dev Agent (New Chat): @dev
        - Implements approved story
        - Updates File List with all changes
        - Marks story as "Review" when complete

    - id: qa-review-implementation
      agent: qa
      action: review_implementation
      updates: implementation_files
      artifacts:
        - qa-review-checklist.md
      duration_estimate: "20-40 min"
      requires: implementation_files
      notes: |
        QA Agent (New Chat): @qa -> review-story
        - Senior dev review with refactoring ability
        - Fixes small issues directly
        - Leaves checklist for remaining items
        - Updates story status (Review -> Done or stays Review)

    - meta: repeat
      target_steps: [sm-create-story, dev-implement-story, qa-review-implementation]
      condition: stories_remaining
      notes: |
        Repeat story cycle (SM -> Dev -> QA) for all epic stories
        Continue until all stories in PRD are complete

    # ─── Phase 5: Retrospective ──────────────────────────────────────────
    - phase: 5
      name: Retrospective
      description: "Sprint retrospective after epic completion"
      gate:
        condition: "Retrospective document created with learnings and improvement actions"
        on_fail: "Document learnings before closing the epic"

    - id: po-epic-retrospective
      agent: po
      action: epic_retrospective
      creates: epic-retrospective.md
      artifacts:
        - epic-retrospective.md
      duration_estimate: "15-30 min"
      notes: |
        After epic completion:
        - Validate epic was completed correctly
        - Document learnings and improvements
        - Capture metrics for future estimation

    - meta: end
      action: project_complete
      notes: |
        All stories implemented and reviewed!
        Project development phase complete.

        Reference: .aios-core/data/aios-kb.md#IDE Development Workflow

  flow_diagram: |
    ```mermaid
    graph TD
        A[Start: UI Enhancement] --> B[Phase 1: Discovery]
        B --> B1[architect: analyze existing UI]
        B1 --> C[Phase 2: Planning]
        C --> C1[pm: prd.md]
        C1 --> C2[ux-design-expert: front-end-spec.md + pattern audit]
        C2 --> D[Phase 3: Validation]
        D --> D1[po: validate with po-master-checklist]
        D1 --> D2[po: shard documents]
        D2 --> E[Phase 4: Execution]
        E --> E1[sm: create story]
        E1 --> E2[dev: implement story]
        E2 --> E3[qa: review implementation]
        E3 --> F{More stories?}
        F -->|Yes| E1
        F -->|No| G[Phase 5: Retrospective]
        G --> G1[po: epic retrospective]
        G1 --> H[Project Complete]

        style H fill:#90EE90
        style B fill:#E6E6FA
        style C fill:#FFE4B5
        style D fill:#ADD8E6
        style E fill:#ADD8E6
        style G fill:#F0E68C
    ```

  decision_guidance:
    when_to_use:
      - UI enhancement requires coordinated stories
      - Design system changes needed
      - New component patterns required
      - User research and testing needed
      - Multiple team members will work on related changes
    when_not_to_use:
      - New frontend from scratch (use greenfield-ui)
      - Backend or service enhancement (use brownfield-service)
      - Full-stack enhancement (use brownfield-fullstack)
      - Technical debt assessment (use brownfield-discovery)

  handoff_prompts:
    architect_to_pm: "UI analysis complete. Create comprehensive PRD with UI integration strategy."
    pm_to_ux: "PRD ready. Save it as docs/prd.md, then create the UI/UX specification and audit existing patterns."
    ux_to_po: "Front-end spec and pattern audit complete. Save as docs/front-end-spec.md. Please validate all artifacts."
    po_to_sm: "All artifacts validated and sharded. Begin story creation from sharded docs."
    complete: "All planning artifacts validated and saved in docs/ folder. Move to IDE environment to begin development."
