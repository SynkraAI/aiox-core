workflow:
  id: greenfield-ui
  name: Greenfield UI/Frontend Development
  description: >-
    Linear agent workflow for building frontend applications from concept to development.
    Deterministic pipeline — each agent appears once, no optional or conditional steps.
  type: greenfield
  version: "2.0"
  project_types:
    - spa
    - mobile-app
    - micro-frontend
    - static-site
    - ui-prototype
    - simple-interface

  metadata:
    elicit: true
    confirmation_required: true

  phases:
    - phase_1: Discovery
    - phase_2: Planning
    - phase_3: Validation
    - phase_4: Execution
    - phase_5: Retrospective

  sequence:
    # ─── Phase 1: Discovery ───────────────────────────────────────────────
    - phase: 1
      name: Discovery
      description: "Research and create project brief"
      gate:
        condition: "project-brief.md exists with market research, target audience, and scope definition"
        on_fail: "HALT — analyst must complete project brief before planning"

    - id: analyst-project-brief
      agent: analyst
      creates: project-brief.md
      artifacts:
        - project-brief.md
        - market-research-summary.md
      duration_estimate: "30-60 min"
      notes: "Conduct research (brainstorming, market analysis) and produce project brief. SAVE OUTPUT: Copy final project-brief.md to your project's docs/ folder."

    # ─── Phase 2: Planning ────────────────────────────────────────────────
    - phase: 2
      name: Planning
      description: "Create PRD, frontend spec with wireframes, and frontend architecture"
      gate:
        condition: "prd.md, front-end-spec.md, and front-end-architecture.md all exist with complete specs"
        on_fail: "HALT — all three planning documents must be finalized before validation"

    - id: pm-create-prd
      agent: pm
      creates: prd.md
      artifacts:
        - prd.md
      requires: project-brief.md
      duration_estimate: "30-60 min"
      notes: "Creates PRD from project brief using prd-tmpl, focused on UI/frontend requirements. SAVE OUTPUT: Copy final prd.md to your project's docs/ folder."

    - id: ux-create-frontend-spec
      agent: ux-design-expert
      creates: front-end-spec.md
      uses: front-end-spec-tmpl
      artifacts:
        - front-end-spec.md
        - wireframes.md
        - v0-prompt.md (AI UI generation prompt)
      requires: prd.md
      duration_estimate: "30-45 min"
      notes: "Creates UI/UX specification with wireframes. Also generates AI UI prompt (v0/Lovable) for rapid prototyping. SAVE OUTPUT: Copy final front-end-spec.md to your project's docs/ folder."

    - id: architect-create-architecture
      agent: architect
      creates: front-end-architecture.md
      uses: front-end-architecture-tmpl
      artifacts:
        - front-end-architecture.md
        - component-tree.md
      requires: front-end-spec.md
      duration_estimate: "30-60 min"
      notes: "Creates frontend architecture with component hierarchy, state management, and tech stack decisions. If AI-generated UI exists, incorporates its structure. SAVE OUTPUT: Copy final front-end-architecture.md to your project's docs/ folder."

    # ─── Phase 3: Validation ──────────────────────────────────────────────
    - phase: 3
      name: Validation
      description: "PO validates all artifacts, shards into development-ready stories"
      gate:
        condition: "All artifacts pass PO master checklist AND sharded docs created"
        on_fail: "HALT — PO must resolve all issues before execution begins"

    - id: po-validate-artifacts
      agent: po
      validates: all_artifacts
      uses: po-master-checklist
      artifacts:
        - validation-report.md
      duration_estimate: "15-30 min"
      notes: "Validates all documents for consistency and completeness. Delegates fixes to relevant agent if issues found, then re-validates."

    - id: po-shard-documents
      agent: po
      action: shard_documents
      creates: sharded_docs
      artifacts:
        - docs/prd/ (sharded content)
        - docs/architecture/ (sharded content)
      requires:
        - prd.md
        - front-end-spec.md
        - front-end-architecture.md
      duration_estimate: "15-30 min"
      notes: |
        Shard documents for IDE development:
        - Option A: Use PO agent to shard: @po then ask to shard docs/prd.md
        - Option B: Manual: Drag shard-doc task + docs/prd.md into chat
        - Creates docs/prd/ and docs/architecture/ folders with sharded content

    # ─── Phase 4: Execution ───────────────────────────────────────────────
    - phase: 4
      name: Execution
      description: "Iterative story implementation with QA review"
      gate:
        condition: "All stories implemented, QA reviewed, zero critical issues open"
        on_fail: "Continue story cycle until all stories complete"

    - id: sm-create-story
      agent: sm
      action: create_story
      creates: story.md
      artifacts:
        - story.md
      duration_estimate: "15-30 min"
      requires: sharded_docs
      repeats: for_each_epic
      notes: |
        Story creation cycle:
        - SM Agent (New Chat): @sm -> *create
        - Creates next story from sharded docs
        - Story starts in "Draft" status

    - id: dev-implement-story
      agent: dev
      action: implement_story
      creates: implementation_files
      artifacts:
        - implementation source files
        - updated story file list
      duration_estimate: "1-4 hours"
      requires: story.md
      notes: |
        Dev Agent (New Chat): @dev
        - Implements approved story
        - Updates File List with all changes
        - Marks story as "Review" when complete

    - id: qa-review-implementation
      agent: qa
      action: review_implementation
      updates: implementation_files
      artifacts:
        - qa-review-checklist.md
      duration_estimate: "20-40 min"
      requires: implementation_files
      notes: |
        QA Agent (New Chat): @qa -> review-story
        - Senior dev review with refactoring ability
        - Fixes small issues directly
        - Leaves checklist for remaining items
        - Updates story status (Review -> Done or stays Review)

    - meta: repeat
      target_steps: [sm-create-story, dev-implement-story, qa-review-implementation]
      condition: stories_remaining
      notes: |
        Repeat story cycle (SM -> Dev -> QA) for all epic stories
        Continue until all stories in PRD are complete

    # ─── Phase 5: Retrospective ──────────────────────────────────────────
    - phase: 5
      name: Retrospective
      description: "Sprint retrospective after epic completion"
      gate:
        condition: "Retrospective document created with learnings and improvement actions"
        on_fail: "Document learnings before closing the epic"

    - id: po-epic-retrospective
      agent: po
      action: epic_retrospective
      creates: epic-retrospective.md
      artifacts:
        - epic-retrospective.md
      duration_estimate: "15-30 min"
      notes: |
        After epic completion:
        - Validate epic was completed correctly
        - Document learnings and improvements
        - Capture metrics for future estimation

    - meta: end
      action: project_complete
      notes: |
        All stories implemented and reviewed!
        Project development phase complete.

        Reference: .aios-core/data/aios-kb.md#IDE Development Workflow

  flow_diagram: |
    ```mermaid
    graph TD
        A[Start: UI Development] --> B[Phase 1: Discovery]
        B --> B1[analyst: project-brief.md]
        B1 --> C[Phase 2: Planning]
        C --> C1[pm: prd.md]
        C1 --> C2[ux-design-expert: front-end-spec.md + wireframes]
        C2 --> C3[architect: front-end-architecture.md]
        C3 --> D[Phase 3: Validation]
        D --> D1[po: validate all artifacts]
        D1 --> D2[po: shard documents]
        D2 --> E[Phase 4: Execution]
        E --> E1[sm: create story]
        E1 --> E2[dev: implement story]
        E2 --> E3[qa: review implementation]
        E3 --> F{More stories?}
        F -->|Yes| E1
        F -->|No| G[Phase 5: Retrospective]
        G --> G1[po: epic retrospective]
        G1 --> H[Project Complete]

        style H fill:#90EE90
        style B fill:#E6E6FA
        style C fill:#FFE4B5
        style D fill:#ADD8E6
        style E fill:#ADD8E6
        style G fill:#F0E68C
    ```

  decision_guidance:
    when_to_use:
      - Building production frontend applications
      - Multiple views/pages with complex interactions
      - Need comprehensive UI/UX design and testing
      - Multiple team members will be involved
      - Long-term maintenance expected
      - Customer-facing applications
    when_not_to_use:
      - Full-stack application with backend needs (use greenfield-fullstack)
      - API-only service without frontend (use greenfield-service)
      - Enhancing existing frontend (use brownfield-ui)
      - Technical debt assessment on existing project (use brownfield-discovery)

  handoff_prompts:
    analyst_to_pm: "Project brief is complete. Save it as docs/project-brief.md in your project, then create the PRD."
    pm_to_ux: "PRD is ready. Save it as docs/prd.md in your project, then create the UI/UX specification with wireframes."
    ux_to_architect: "UI/UX spec complete. Save it as docs/front-end-spec.md in your project, then create the frontend architecture."
    architect_to_po: "Frontend architecture complete. Save it as docs/front-end-architecture.md. Please validate all artifacts."
    po_to_sm: "All artifacts validated and sharded. Begin story creation from sharded docs."
    complete: "All planning artifacts validated and saved in docs/ folder. Move to IDE environment to begin development."
