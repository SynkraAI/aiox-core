workflow:
  id: design-system-build-quality
  name: Design System Build Quality Pipeline
  version: "2.0"
  description: >-
    Pipeline pos-migracao para Design System. Encadeia sequencialmente as etapas de
    build, documentacao, auditoria de acessibilidade e calculo de ROI para garantir
    qualidade e mensurar valor entregue.
  type: brownfield
  project_types:
    - design-system
    - component-library
    - pattern-library
    - ui-migration

  metadata:
    elicit: true
    confirmation_required: true

  execution_modes:
    - mode: yolo
      description: Execucao autonoma com minima interacao
      prompts: 0-1
    - mode: interactive
      description: Checkpoints de decisao e feedback educacional
      prompts: 5-10
      default: true
    - mode: preflight
      description: Planejamento completo antes da execucao - analise upfront de todos os componentes e dependencias
      prompts: "10-15"

  phases:
    - phase_1: Build & Compile
    - phase_2: Documentation
    - phase_3: Quality Assurance
    - phase_4: ROI Analysis

  sequence:
    - step: build_atomic_components
      id: build
      phase: 1
      agent: ux-design-expert
      action: Build de componentes atomicos
      artifacts:
        - build_report
        - compiled_tokens
        - component_bundle
      gate:
        condition: "TypeScript 0 errors AND all components render AND all tokens compiled"
        on_fail: "HALT and fix build errors before proceeding to documentation"
      notes: |
        Executa build dos componentes do Design System:
        - Compila tokens de design (cores, tipografia, espacamentos)
        - Gera componentes atomicos (buttons, inputs, cards, etc.)
        - Valida estrutura de arquivos e nomenclatura
        - Verifica dependencias e imports

        Criterios de sucesso:
        - [ ] Build completo sem erros
        - [ ] Todos os tokens compilados
        - [ ] Componentes exportados corretamente
      outputs:
        - build_report
        - compiled_tokens
        - component_bundle

    - step: generate_documentation
      id: document
      phase: 2
      agent: ux-design-expert
      action: Gerar documentacao do Pattern Library
      requires: build
      artifacts:
        - pattern_library_docs
        - component_api_reference
        - style_guide
      gate:
        condition: "All components documented with props, variants, and working code examples"
        on_fail: "HALT and complete missing documentation before accessibility audit"
      notes: |
        Gera documentacao completa do Pattern Library:
        - Documenta cada componente com props e variantes
        - Cria exemplos de uso e code snippets
        - Gera guia de estilo visual
        - Atualiza changelog de componentes

        Criterios de sucesso:
        - [ ] Todos os componentes documentados
        - [ ] Exemplos de codigo funcionais
        - [ ] Guia de estilo atualizado
      outputs:
        - pattern_library_docs
        - component_api_reference
        - style_guide

    - step: accessibility_audit
      id: a11y-check
      phase: 3
      agent: ux-design-expert
      action: Auditoria de acessibilidade (WCAG AA)
      requires: document
      artifacts:
        - a11y_audit_report
        - violations_list
        - remediation_plan
      gate:
        condition: "Zero critical WCAG AA violations AND color contrast ratios meet 4.5:1 (text) / 3:1 (UI)"
        on_fail: "HALT — remediate critical a11y violations before ROI calculation"
      notes: |
        Executa auditoria de acessibilidade WCAG 2.1 AA:
        - Verifica contraste de cores (4.5:1 texto, 3:1 UI)
        - Valida navegacao por teclado
        - Checa atributos ARIA e roles
        - Testa com screen readers
        - Verifica focus states e indicadores visuais

        Criterios de sucesso:
        - [ ] Contraste de cores aprovado
        - [ ] Navegacao por teclado funcional
        - [ ] ARIA labels corretos
        - [ ] Zero violacoes criticas WCAG AA
      outputs:
        - a11y_audit_report
        - violations_list
        - remediation_plan

    - step: calculate_roi
      id: calculate-roi
      phase: 4
      agent: ux-design-expert
      action: Calculo de ROI e savings
      requires: a11y-check
      artifacts:
        - roi_report
        - savings_metrics
        - adoption_dashboard
      gate:
        condition: "ROI report complete with all 4 metrics calculated (hours saved, reuse %, feature time, bug reduction)"
        on_fail: "HALT — complete all ROI metrics before finalizing pipeline"
      notes: |
        Calcula retorno sobre investimento do Design System:
        - Tempo economizado em desenvolvimento
        - Reducao de inconsistencias visuais
        - Velocidade de entrega de features
        - Custo de manutencao reduzido
        - Metricas de reuso de componentes

        Metricas a calcular:
        - [ ] Horas dev economizadas/mes
        - [ ] % de reuso de componentes
        - [ ] Tempo medio para nova feature
        - [ ] Reducao de bugs visuais
      outputs:
        - roi_report
        - savings_metrics
        - adoption_dashboard

    - workflow_end:
      action: pipeline_complete
      notes: |
        Pipeline de qualidade completo!

        Artefatos gerados:
        - Build report e bundle de componentes
        - Documentacao do Pattern Library
        - Relatorio de acessibilidade WCAG AA
        - Dashboard de ROI e metricas

        Proximos passos sugeridos:
        - Revisar violacoes de a11y identificadas
        - Publicar nova versao do Design System
        - Compartilhar metricas de ROI com stakeholders

  flow_diagram: |
    ```mermaid
    graph TD
        A[Start: Design System Quality Pipeline] --> B[ux-design-expert: Build componentes atomicos]
        B --> C{Build OK?}
        C -->|Sim| D[ux-design-expert: Gerar documentacao Pattern Library]
        C -->|Nao| E[Corrigir erros de build]
        E --> B

        D --> F{Docs completas?}
        F -->|Sim| G[ux-design-expert: Auditoria a11y WCAG AA]
        F -->|Nao| H[Completar documentacao]
        H --> D

        G --> I{a11y aprovado?}
        I -->|Sim| J[ux-design-expert: Calcular ROI e savings]
        I -->|Nao| K[Remediar violacoes]
        K --> G

        J --> L[Pipeline Completo]

        style L fill:#90EE90
        style B fill:#E6E6FA
        style D fill:#E6E6FA
        style G fill:#E6E6FA
        style J fill:#E6E6FA
        style E fill:#FFB6C1
        style H fill:#FFB6C1
        style K fill:#FFB6C1
    ```

  decision_guidance:
    when_to_use:
      - Apos migracao de Design System
      - Release de nova versao do Pattern Library
      - Auditoria periodica de qualidade
      - Validacao pre-producao de componentes
      - Geracao de metricas para stakeholders

  handoff_prompts:
    build_complete: |
      Build de componentes concluido com sucesso.
      Tokens compilados: {{token_count}}
      Componentes gerados: {{component_count}}
      Prosseguindo para documentacao...

    docs_complete: |
      Documentacao do Pattern Library gerada.
      Componentes documentados: {{documented_count}}
      Exemplos criados: {{example_count}}
      Iniciando auditoria de acessibilidade...

    a11y_complete: |
      Auditoria de acessibilidade WCAG AA concluida.
      Status: {{pass/fail}}
      Violacoes criticas: {{critical_count}}
      Violacoes menores: {{minor_count}}
      {{if pass}}: Prosseguindo para calculo de ROI.
      {{if fail}}: Revisar remediation_plan antes de continuar.

    pipeline_complete: |
      Pipeline de qualidade finalizado!

      Resumo:
      - Build: {{build_status}}
      - Documentacao: {{docs_status}}
      - Acessibilidade: {{a11y_status}}
      - ROI calculado: {{roi_value}}

      Artefatos disponiveis em outputs/design-system/

