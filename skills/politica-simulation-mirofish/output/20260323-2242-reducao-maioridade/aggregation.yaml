# Etapa 4: Vulnerabilidades
vulnerabilities:
  - argument: "Presidio adulto e escola do crime — jovem entra ruim e sai pior"
    segment_most_affected: "jovem-digital"
    opinion_change_rate: 20.0
    severity: "alta"
    counter_narrative_recommendation: >
      Apresentar modelo concreto de unidades prisionais separadas para jovens de 16-18 anos,
      com programa de ressocializacao obrigatorio e monitoramento pos-saida. Citar exemplos
      internacionais onde separacao etaria reduziu reincidencia. Transformar fraqueza em proposta:
      "nao vamos jogar ninguem em presidio adulto — vamos criar sistema proprio."

  - argument: "Crime organizado usa menor como escudo por causa da protecao legal"
    segment_most_affected: "rural-interior"
    opinion_change_rate: 20.0
    severity: "alta"
    counter_narrative_recommendation: >
      Para quem e contra a reducao: demonstrar que o recrutamento de menores pelo crime
      organizado nao e resolvido pela reducao da maioridade (o crime recrutaria menores de 14,
      depois de 12). Apresentar alternativa: penas mais duras para ADULTOS que recrutam menores,
      atacando a DEMANDA e nao a OFERTA.

  - argument: "ROI social e dados de reincidencia — sistema nao funciona, ampliar e escalar problema"
    segment_most_affected: "classe-ab-urbano-sudeste"
    opinion_change_rate: 20.0
    severity: "media"
    counter_narrative_recommendation: >
      Para quem e a favor: apresentar dados de custo por preso vs custo por aluno em escola
      integral. Mostrar que a conta nao fecha: cada preso custa R$2.400/mes enquanto escola
      integral custa R$800/mes. Argumento pragmatico que fala a lingua do empresario.

  - argument: "Prova social — maioria do grupo e a favor, isso influencia indecisos"
    segment_most_affected: "classe-c-urbano"
    opinion_change_rate: 15.0
    severity: "media"
    counter_narrative_recommendation: >
      Para quem e contra: evitar posicao defensiva ou academica. Usar linguagem popular e
      historias reais de jovens recuperados para competir no campo emocional. Pesquisas e dados
      nao vencem prova social — narrativas pessoais sim.

