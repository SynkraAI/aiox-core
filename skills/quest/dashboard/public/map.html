<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quest Map — World Overview</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;600;700&family=Cinzel:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <style>
    /* === THEME VARIABLES === */
    :root, [data-theme="pixel"] {
      --font-main: 'Press Start 2P', monospace;
      --font-size-hud: 11px;
      --font-size-title: 13px;
      --bg-body: #0a0a1a;
      --bg-hud: #16213e;
      --bg-panel: rgba(22,33,62,0.92);
      --bg-tooltip: #16213e;
      --text-primary: #eaeaea;
      --text-muted: #8892b0;
      --accent-primary: #f5c542;
      --accent-done: #4ecca3;
      --accent-current: #f5c542;
      --accent-danger: #e94560;
      --accent-pending: rgba(255,255,255,0.5);
      --border-hud: #e94560;
      --border-tooltip: #f5c542;
      --dot-border: rgba(255,255,255,0.7);
      --map-brightness: 0.55;
      --map-saturate: 0.8;
      --image-rendering: pixelated;
    }
    [data-theme="cyberpunk"] {
      --font-main: 'JetBrains Mono', monospace;
      --font-size-hud: 12px;
      --font-size-title: 14px;
      --bg-body: #0d0221;
      --bg-hud: #1a0a3e;
      --bg-panel: rgba(26,10,62,0.94);
      --bg-tooltip: #1a0a3e;
      --text-primary: #e0e0ff;
      --text-muted: #7b68ee;
      --accent-primary: #00ffff;
      --accent-done: #00ff88;
      --accent-current: #ff00ff;
      --accent-danger: #ff3366;
      --accent-pending: rgba(0,255,255,0.3);
      --border-hud: #ff00ff;
      --border-tooltip: #00ffff;
      --dot-border: rgba(0,255,255,0.6);
      --map-brightness: 0.4;
      --map-saturate: 0.6;
      --image-rendering: auto;
    }
    [data-theme="parchment"] {
      --font-main: 'Cinzel', serif;
      --font-size-hud: 13px;
      --font-size-title: 15px;
      --bg-body: #1a1408;
      --bg-hud: #2a1f0e;
      --bg-panel: rgba(42,31,14,0.94);
      --bg-tooltip: #2a1f0e;
      --text-primary: #e8d5b0;
      --text-muted: #a08860;
      --accent-primary: #d4a846;
      --accent-done: #7ab648;
      --accent-current: #d4a846;
      --accent-danger: #c45c3a;
      --accent-pending: rgba(232,213,176,0.35);
      --border-hud: #d4a846;
      --border-tooltip: #d4a846;
      --dot-border: rgba(212,168,70,0.6);
      --map-brightness: 0.6;
      --map-saturate: 0.65;
      --image-rendering: auto;
    }
    [data-theme="minimal"] {
      --font-main: 'Inter', sans-serif;
      --font-size-hud: 13px;
      --font-size-title: 15px;
      --bg-body: #09090b;
      --bg-hud: #18181b;
      --bg-panel: rgba(24,24,27,0.95);
      --bg-tooltip: #18181b;
      --text-primary: #fafafa;
      --text-muted: #71717a;
      --accent-primary: #a78bfa;
      --accent-done: #4ade80;
      --accent-current: #a78bfa;
      --accent-danger: #f87171;
      --accent-pending: rgba(250,250,250,0.2);
      --border-hud: #27272a;
      --border-tooltip: #a78bfa;
      --dot-border: rgba(250,250,250,0.3);
      --map-brightness: 0.45;
      --map-saturate: 0.3;
      --image-rendering: auto;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-body); color: var(--text-primary);
      font-family: var(--font-main);
      overflow: hidden; height: 100vh;
      display: flex; flex-direction: column;
      transition: background-color 0.3s, color 0.3s, font-family 0.3s;
    }

    /* HUD */
    .hud {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; background: var(--bg-hud);
      border-bottom: 3px solid var(--border-hud); z-index: 20; font-size: var(--font-size-hud);
      flex-shrink: 0; transition: all 0.3s;
    }
    .hud-l { display: flex; align-items: center; gap: 14px; }
    .hud-r { display: flex; align-items: center; gap: 14px; }
    .h-title { font-size: var(--font-size-title); color: var(--accent-primary); }
    .h-lv { color: var(--accent-done); font-size: var(--font-size-hud); }
    .h-xp { color: var(--text-muted); font-size: calc(var(--font-size-hud) - 1px); }
    .xp-w { width: 180px; height: 12px; background: var(--bg-body); border: 2px solid var(--text-muted); border-radius: 2px; overflow: hidden; }
    .xp-f { height: 100%; background: linear-gradient(90deg, var(--accent-done), var(--accent-primary)); transition: width 0.8s; }
    .h-back { color: var(--accent-danger); text-decoration: none; font-size: var(--font-size-hud); }
    .h-back:hover { color: var(--accent-primary); }
    select { background: var(--bg-hud); color: var(--text-primary); border: 1px solid var(--text-muted); font-family: inherit; font-size: var(--font-size-hud); padding: 4px 8px; border-radius: 3px; cursor: pointer; }
    select option { font-size: var(--font-size-hud); padding: 4px; }

    /* Toggle buttons (detail + theme) */
    .toggle-group { display: flex; gap: 0; }
    .toggle-btn {
      background: var(--bg-body); color: var(--text-muted); border: 1px solid var(--text-muted);
      font-family: inherit; font-size: 9px; padding: 4px 10px; cursor: pointer;
      transition: all 0.2s;
    }
    .toggle-btn:first-child { border-radius: 3px 0 0 3px; }
    .toggle-btn:last-child { border-radius: 0 3px 3px 0; }
    .toggle-btn:not(:first-child) { border-left: none; }
    .toggle-btn.active { background: var(--accent-danger); color: #fff; border-color: var(--accent-danger); }
    .toggle-btn:hover:not(.active) { background: var(--bg-hud); color: var(--text-primary); }
    .hud-sep { width: 1px; height: 20px; background: var(--text-muted); opacity: 0.3; }

    /* Map viewport */
    .viewport {
      flex: 1; position: relative; overflow-x: auto; overflow-y: hidden;
      cursor: grab;
      scrollbar-width: none;
    }
    .viewport::-webkit-scrollbar { display: none; }
    .viewport:active { cursor: grabbing; }

    /* Map container (scrollable) */
    .map-inner {
      position: relative;
      display: inline-block;
    }
    .map-inner img {
      display: block;
      image-rendering: var(--image-rendering);
      filter: brightness(var(--map-brightness)) saturate(var(--map-saturate));
      transition: filter 0.5s;
    }

    /* Canvas overlay for dots + hero — must exactly cover the image */
    .overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* Tooltip */
    .tip {
      display: none; position: fixed;
      background: var(--bg-tooltip); border: 2px solid var(--border-tooltip);
      padding: 12px 16px; font-size: 9px; line-height: 1.8;
      max-width: 420px; z-index: 30; pointer-events: none;
      border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.7);
      transition: background 0.3s, border-color 0.3s;
    }
    .tip.on { display: block; }
    .tip-t { color: var(--accent-primary); font-size: 11px; margin-bottom: 4px; }
    .tip-w { color: var(--accent-danger); font-size: 9px; margin-bottom: 2px; }
    .tip-c { color: var(--text-muted); font-size: 9px; white-space: pre-wrap; word-break: break-word; }
    .tip-p { color: var(--accent-done); font-size: 8px; margin-top: 3px; font-style: italic; }
    .tip-s { margin-top: 4px; }
    .tip-s.done { color: var(--accent-done); }
    .tip-s.pending { color: var(--text-muted); }
    .tip-s.skipped { color: var(--accent-danger); }

    /* Legend */
    .legend {
      position: fixed; bottom: 12px; right: 12px;
      background: var(--bg-panel); border: 2px solid var(--text-muted);
      padding: 10px 14px; font-size: 9px; line-height: 2.2;
      border-radius: 4px; z-index: 20; transition: all 0.3s;

    .ld { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    .ld.d { background: var(--accent-done); }
    .ld.c { background: var(--accent-current); animation: gl 1s infinite; }
    .ld.p { background: var(--accent-pending); }
    .ld.s { background: var(--accent-danger); opacity: 0.6; }
    @keyframes gl { 0%,100%{box-shadow:0 0 4px var(--accent-current)}50%{box-shadow:0 0 12px var(--accent-current)} }

    .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--accent-primary); z-index: 100; background: var(--bg-body); }
    .loading.off { display: none; }

    /* --- Mobile Responsive --- */
    @media (max-width: 768px) {
      .hud {
        flex-wrap: wrap;
        padding: 8px 12px;
        gap: 6px;

      .hud-l {
        width: 100%;
        justify-content: space-between;
      }
      .hud-r {

        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;

      .h-title { font-size: calc(var(--font-size-title) - 2px); }
      .xp-w { width: 100px; height: 8px; }
      .h-xp { font-size: calc(var(--font-size-hud) - 3px); }
      .h-lv { font-size: calc(var(--font-size-hud) - 1px); }
      .toggle-btn { font-size: 7px; padding: 3px 6px; }
      .hud-sep { display: none; }
      select { font-size: calc(var(--font-size-hud) - 2px); padding: 3px 6px; max-width: 120px; }
      .h-back { font-size: calc(var(--font-size-hud) - 2px); }
      .legend {
        bottom: 6px; right: 6px;
        padding: 6px 10px;
        font-size: 7px;
        line-height: 1.8;
      }
      .ld { width: 7px; height: 7px; margin-right: 4px; }
      .tip {
        max-width: 280px;
        padding: 8px 12px;
        font-size: 8px;
      }
      .tip-t { font-size: 9px; }
      .tip-w { font-size: 8px; }
      .tip-c { font-size: 8px; }
    }
    @media (max-width: 400px) {
      .hud-r .toggle-group:first-child { display: none; }
      .xp-w { width: 60px; }
      #h-prog { font-size: 8px; }
      .legend { display: none; }
    }
  </style>
</head>

// Polyfill for roundRect (Safari < 16, older browsers)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
  };
}

function removeWhite(img) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth; c.height = img.naturalHeight;
  const x = c.getContext('2d');
  x.drawImage(img, 0, 0);
  const d = x.getImageData(0, 0, c.width, c.height);
  for (let i = 0; i < d.data.length; i += 4) {
    if (d.data[i] > 235 && d.data[i+1] > 235 && d.data[i+2] > 235) d.data[i+3] = 0;
  }
  x.putImageData(d, 0, 0);
  const r = new Image();
  r.src = c.toDataURL();
  return r;
}

// Theme colors (read from CSS variables)
function getThemeColors() {
  const s = getComputedStyle(document.documentElement);
  return {
    done: s.getPropertyValue('--accent-done').trim(),
    current: s.getPropertyValue('--accent-current').trim(),
    danger: s.getPropertyValue('--accent-danger').trim(),
    pending: s.getPropertyValue('--accent-pending').trim(),

    muted: s.getPropertyValue('--text-muted').trim(),
    dotBorder: s.getPropertyValue('--dot-border').trim(),
    bgPanel: s.getPropertyValue('--bg-panel').trim(),
  };
}

function applyTheme(theme) {
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('quest-map-theme', theme);
}

// Restore saved theme
const savedTheme = localStorage.getItem('quest-map-theme');
if (savedTheme) {

// --------------------------------------------------------------------------
// DATA
// --------------------------------------------------------------------------
async function loadData() {
  const res = await fetch('/api/projects');
  const json = await res.json();
  const projects = json.projects || [];
  if (!projects.length) throw new Error('No projects');

  const params = new URLSearchParams(location.search);
  const pn = params.get('project');
  const proj = pn ? (projects.find(p => p.name === pn) || projects[0]) : projects[0];
  const parsed = jsyaml.load(proj.data) || {};

  let items = {};
  if (parsed.items && !parsed.phases) {
    for (const [id, v] of Object.entries(parsed.items))
      items[id] = { status: v.status || 'pending', label: `Item ${id}`, ...v };
  } else if (parsed.phases) {
    for (const [, phase] of Object.entries(parsed.phases))
      for (const [id, v] of Object.entries(phase.items || {}))
        items[id] = { status: v.status || 'pending', label: v.label || id, ...v };
  }

  questItems = items;
  questStats = parsed.stats || {};
  questName = proj.name;
  packData = proj.pack_data || null;

  // Build pack item index for enrichment: { "0.1": { command, who, tip, label, xp } }
  const packItems = {};
  phaseNames = {};
  if (packData && packData.phases) {
    for (const [pIdx, phase] of Object.entries(packData.phases)) {
      const pi = parseInt(pIdx, 10);
      phaseNames[pi] = phase.name || `Phase ${pi}`;
      for (const item of (phase.items || [])) {
        if (item.id) {
          packItems[item.id] = item;
        }
      }
    }
  }
  // Fallback: extract phase names from quest-log if pack not available
  if (!Object.keys(phaseNames).length && parsed.phases) {
    for (const [key, phase] of Object.entries(parsed.phases)) {
      const pIdx = parseInt(key, 10);
      phaseNames[pIdx] = phase.name || phase.label || `Phase ${pIdx}`;
    }
  }

  // Enrich quest items with pack data (command, who, tip, xp)
  for (const [id, item] of Object.entries(questItems)) {
    const packItem = packItems[id];
    if (packItem) {
      if (!item.command && packItem.command) item.command = packItem.command;
      if (!item.who && packItem.who) item.who = packItem.who;
      if (!item.tip && packItem.tip) item.tip = packItem.tip;
      if (!item.label || item.label === id) item.label = packItem.label || item.label;
      if (!item.xp && packItem.xp) item.xp = packItem.xp;
    }
  }

  const sel = document.getElementById('h-sel');
  sel.innerHTML = projects.map(p =>
    `<option value="${p.name}" ${p.name === proj.name ? 'selected' : ''}>${p.name}</option>`
  ).join('');
  sel.onchange = () => { location.search = `?project=${encodeURIComponent(sel.value)}`; };
}

// --------------------------------------------------------------------------
// MERGE positions with quest data
// --------------------------------------------------------------------------
function mergeNodes() {
  renderNodes = [];

  // Get sorted item IDs grouped by phase (exclude sub-items — 3+ dot parts)
  const byPhase = {};
  for (const [id, item] of Object.entries(questItems)) {
    const parts = id.split('.');
    if (parts.length >= 3) continue; // sub-item, skip — handled separately
    const pn = parseInt(parts[0], 10);
    if (!byPhase[pn]) byPhase[pn] = [];
    byPhase[pn].push({ id, ...item });
  }

  // Sort each phase's items by sub-id
  for (const items of Object.values(byPhase)) {
    items.sort((a, b) => {
      const ai = parseFloat(a.id), bi = parseFloat(b.id);
      return ai - bi;
    });
  }

  // Collect sub-items: items with 3+ dot-parts (e.g., "4.2.M8")
  const subItemsByParent = {};
  for (const [id, item] of Object.entries(questItems)) {
    const parts = id.split('.');
    if (parts.length >= 3) {
      const parentId = parts[0] + '.' + parts[1];
      if (!subItemsByParent[parentId]) subItemsByParent[parentId] = [];
      subItemsByParent[parentId].push({ id, ...item });
    }
  }

  // Map each item to a position
  for (const pos of NODE_POSITIONS) {
    const phaseItems = byPhase[pos.phase];
    if (!phaseItems || pos.idx >= phaseItems.length) {
      // Extra position with no item — show as empty/locked
      renderNodes.push({ ...pos, id: null, status: 'locked', label: '', command: '' });
      continue;
    }
    const item = phaseItems[pos.idx];
    renderNodes.push({
      ...pos,
      id: item.id,
      status: item.status,
      label: item.label,
      command: item.command || '',
      who: item.who || '',
      tip: item.tip || '',
      xp: item.xp || 0,
      required: item.required !== false,
      subItems: subItemsByParent[item.id] || [],
    });
  }
}

// --------------------------------------------------------------------------
// RENDER
// --------------------------------------------------------------------------
function fitMap() {
  const vpH = vp.clientHeight;
  scale = vpH / MAP_H;
  const renderW = Math.round(MAP_W * scale);
  const renderH = vpH;

  mapImg.style.width = renderW + 'px';
  mapImg.style.height = renderH + 'px';

  canvas.width = renderW;
  canvas.height = renderH;
}

function renderOverlay() {
  fitMap();
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const dotR = Math.max(12, 22 * scale);
  let currentNode = null;
  const tc = getThemeColors();

  // Find first pending = current
  const firstPending = renderNodes.find(n => n.status === 'pending');
  const firstPendingIdx = firstPending ? renderNodes.indexOf(firstPending) : renderNodes.length;

  // ---------- PATH LINES between consecutive nodes ----------
  for (let i = 0; i < renderNodes.length - 1; i++) {
    const a = renderNodes[i];
    const b = renderNodes[i + 1];

    // Skip connections across phases (last node of phase → first of next)
    // We still draw them, but could skip if desired

    const ax = (a.x / 100) * w, ay = (a.y / 100) * h;
    const bx = (b.x / 100) * w, by = (b.y / 100) * h;

    ctx.save();

    if (i < firstPendingIdx - 1) {
      // Both done — completed path
      ctx.strokeStyle = tc.done;
      ctx.globalAlpha = 0.7;
      ctx.lineWidth = Math.max(2, 3 * scale);
      ctx.setLineDash([Math.max(6, 10 * scale), Math.max(4, 6 * scale)]);
    } else if (i === firstPendingIdx - 1) {
      // Transition edge (last done → current) — animated dash
      ctx.strokeStyle = tc.current;
      ctx.globalAlpha = 0.8;
      ctx.lineWidth = Math.max(2, 3.5 * scale);
      ctx.setLineDash([Math.max(6, 10 * scale), Math.max(4, 6 * scale)]);
      ctx.lineDashOffset = -frame * 0.8; // animation
    } else {
      // Future path — dim
      ctx.strokeStyle = tc.pending;
      ctx.globalAlpha = 1;
      ctx.lineWidth = Math.max(1.5, 2 * scale);
      ctx.setLineDash([Math.max(4, 6 * scale), Math.max(6, 10 * scale)]);
    }

    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.stroke();
    ctx.restore();
  }
  // ---------- END PATH LINES ----------

  for (const node of renderNodes) {
    const px = (node.x / 100) * w;
    const py = (node.y / 100) * h;
    const isCur = node === firstPending;
    if (isCur) currentNode = { ...node, px, py };

    const r = (hovered === node) ? dotR + 3 : dotR;

    // Positions without items show as empty slots (dimmed dots)
    const isEmptySlot = node.status === 'locked' && !node.id;

    // Glow for current (skip for empty slots)
    if (isCur && !isEmptySlot) {
      const gs = r + 6 + Math.sin(frame * 0.08) * 4;
      ctx.beginPath();
      ctx.arc(px, py, gs, 0, Math.PI * 2);
      ctx.fillStyle = tc.current.startsWith('#')
        ? tc.current + Math.round((0.15 + Math.sin(frame * 0.08) * 0.08) * 255).toString(16).padStart(2, '0')
        : `rgba(245,197,66,${0.15 + Math.sin(frame * 0.08) * 0.08})`;
      ctx.fill();
    }

    // Shadow (dimmed for empty slots)
    ctx.beginPath();
    ctx.arc(px + 1, py + 1, r, 0, Math.PI * 2);
    ctx.fillStyle = isEmptySlot ? 'rgba(0,0,0,0.15)' : 'rgba(0,0,0,0.4)';
    ctx.fill();

    // Main dot
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);

    let col;
    switch (node.status) {
      case 'done': col = tc.done; break;
      case 'skipped': col = tc.danger; break;
      case 'unused': col = tc.muted; break;
      case 'locked': col = tc.muted; break;
      case 'pending': col = isCur ? tc.current : tc.pending; break;
      default: col = tc.pending;
    }
    if (isEmptySlot) ctx.globalAlpha = 0.25;
    ctx.fillStyle = col;
    ctx.fill();

    // Border
    ctx.strokeStyle = hovered === node ? '#fff' : tc.dotBorder;
    ctx.lineWidth = hovered === node ? 3 : 2.5;
    if (node.status === 'unused' || isEmptySlot) {
      ctx.setLineDash([4, 4]);
      if (!isEmptySlot) ctx.globalAlpha = 0.4;
    }
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;

    // Icon
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `bold ${Math.max(10, r * 0.8)}px "Press Start 2P"`;
    if (isEmptySlot) { /* no icon for empty slots */ }
    else if (node.status === 'done') ctx.fillText('✓', px, py);
    else if (node.status === 'skipped') ctx.fillText('—', px, py);
    else if (node.status === 'unused') ctx.fillText('·', px, py);
    else if (isCur) ctx.fillText('!', px + 0.5, py);

    // Sub-items badge
    if (node.subItems && node.subItems.length > 0) {
      const subDone = node.subItems.filter(s => s.status === 'done').length;
      const subTotal = node.subItems.length;
      const badgeText = `${subDone}/${subTotal}`;
      const badgeFs = Math.max(7, 9 * scale);
      ctx.font = `bold ${badgeFs}px "Press Start 2P"`;
      const badgeW = ctx.measureText(badgeText).width + 6;
      const badgeH = badgeFs + 4;
      const bx = px + r * 0.7;
      const by = py - r * 0.7;
      ctx.fillStyle = subDone === subTotal ? tc.done : tc.current;
      ctx.beginPath();
      ctx.roundRect(bx - badgeW / 2, by - badgeH / 2, badgeW, badgeH, 3);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(badgeText, bx, by);
    }

    // ---------- DETAIL LABELS ----------
    if (detailLevel !== 'clean' && node.id) {
      const labelFs = Math.max(8, 11 * scale);
      const cmdFs = Math.max(7, 9 * scale);
      const labelY = py + r + labelFs + 4;

      // Background pill for readability
      const drawLabel = (text, x, y, fontSize, color, maxW) => {
        ctx.font = `${fontSize}px "Press Start 2P"`;
        const measured = ctx.measureText(text);
        const tw = Math.min(measured.width, maxW || 999);
        const truncated = tw < measured.width;
        let displayText = text;
        if (truncated) {
          while (ctx.measureText(displayText + '...').width > maxW && displayText.length > 3) {
            displayText = displayText.slice(0, -1);
          }
          displayText += '...';
        }
        const pw = ctx.measureText(displayText).width + 8;
        const ph = fontSize + 6;
        ctx.fillStyle = 'rgba(10,10,26,0.85)';
        ctx.beginPath();
        ctx.roundRect(x - pw / 2, y - ph / 2, pw, ph, 3);
        ctx.fill();
        ctx.fillStyle = color;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(displayText, x, y);
      };

      // Item ID + short label (Medium + Full)
      const idLabel = `${node.id}`;
      const shortLabel = node.label.length > 20 ? node.label.slice(0, 18) + '..' : node.label;
      const labelColor = node.status === 'done' ? tc.done : isCur ? tc.current : tc.muted;
      drawLabel(`${idLabel} ${shortLabel}`, px, labelY, labelFs, labelColor, 280 * scale);

      // Extra info (Full only) — who + XP on canvas, full command in tooltip
      if (detailLevel === 'full' && (node.who || node.xp)) {
        const extraY = labelY + labelFs + 8;
        const metaText = [node.who, node.xp ? `+${node.xp} XP` : ''].filter(Boolean).join('  ·  ');
        drawLabel(metaText, px, extraY, cmdFs, tc.danger, 280 * scale);
      }
    }

    // ---------- PHASE START MARKER ----------
    if (detailLevel !== 'clean' && node.idx === 0 && node.id) {
      const pName = phaseNames[node.phase] || `World ${node.phase}`;
      const markerFs = Math.max(9, 12 * scale);
      const markerY = py - r - markerFs - 12;

      // Phase banner
      ctx.font = `bold ${markerFs}px "Press Start 2P"`;
      const bannerText = `W${node.phase}: ${pName}`;
      const bw = ctx.measureText(bannerText).width + 16;
      const bh = markerFs + 10;

      ctx.fillStyle = 'rgba(22,33,62,0.9)';
      ctx.beginPath();
      ctx.roundRect(px - bw / 2, markerY - bh / 2, bw, bh, 4);
      ctx.fill();
      ctx.strokeStyle = tc.danger;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.fillStyle = tc.primary;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(bannerText, px, markerY);
    }
  }

  // Hero at current node — draw ABOVE it with an arrow indicator too
  if (currentNode) {
    const hx = currentNode.px;
    const hy = currentNode.py - dotR * 6;

    drawHeroAt(hx, hy);

    // Arrow pointing down to current node
    ctx.fillStyle = tc.current;
    ctx.beginPath();
    ctx.moveTo(hx - 6, currentNode.py - dotR * 1.8);
    ctx.lineTo(hx + 6, currentNode.py - dotR * 1.8);
    ctx.lineTo(hx, currentNode.py - dotR * 1.2);
    ctx.closePath();
    ctx.fill();
  }

  frame++;
  requestAnimationFrame(renderOverlay);
}

function drawHeroAt(x, y) {
  const heroH = Math.max(180, 240 * scale);
  const heroFrame = Math.floor(frame / 25) % 2;
  const bob = Math.sin(frame * 0.1) * 2 * scale;
  const slotW = 1344 / 4;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(x, y + heroH / 2 + 4 * scale, 10 * scale, 3 * scale, 0, 0, Math.PI * 2);
  ctx.fill();

  const src = heroClean || heroImg;
  if (src && src.complete && src.naturalWidth > 0) {
    const drawH = heroH;
    const drawW = drawH * (slotW / 768);
    ctx.drawImage(src, heroFrame * slotW, 0, slotW, 768, x - drawW / 2, y - drawH / 2 + bob, drawW, drawH);
  }
}

// --------------------------------------------------------------------------
// HUD
// --------------------------------------------------------------------------
function updateHUD() {
  document.getElementById('h-title').textContent = `QUEST MAP — ${questName}`;
  let done = 0, total = 0, xp = 0;
  if (questStats.total_xp !== undefined) {
    xp = questStats.total_xp; done = questStats.items_done || 0; total = questStats.items_total || 0;
  } else {
    for (const v of Object.values(questItems)) {
      total++;
      if (v.status === 'done') { done++; xp += (v.xp || 10); }
    }
  }
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('h-prog').textContent = `${done}/${total} (${pct}%)`;
  document.getElementById('h-xp').textContent = `${xp} XP`;
  document.getElementById('h-xp-bar').style.width = `${Math.min(100, pct)}%`;
  const lv = questStats.level || (xp < 200 ? 1 : xp < 450 ? 2 : xp < 700 ? 3 : xp < 1000 ? 4 : 5);
  document.getElementById('h-lv').textContent = `Lv.${lv}${questStats.level_name ? ' ' + questStats.level_name : ''}`;
}

// --------------------------------------------------------------------------
// INPUT — pan the map horizontally
// --------------------------------------------------------------------------
function setupInput() {
  // Drag to scroll
  vp.addEventListener('mousedown', e => {
    dragging = true;
    dragS = { x: e.clientX, scrollX: vp.scrollLeft };
  });

  window.addEventListener('mousemove', e => {
    if (dragging) {
      vp.scrollLeft = dragS.scrollX - (e.clientX - dragS.x);
    }

    // Hover detection
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const w = canvas.width, h = canvas.height;

    hovered = null;
    for (const node of renderNodes) {
      if (!node.id) continue;
      const px = (node.x / 100) * w;
      const py = (node.y / 100) * h;
      if (Math.hypot(mx - px, my - py) < 18 * scale) {
        hovered = node;
        break;
      }
    }

    if (hovered && !dragging) {
      // Title: ID + full label
      document.getElementById('tip-t').textContent = `${hovered.id} — ${hovered.label}`;

      // Who + XP
      const whoEl = document.getElementById('tip-w');
      const whoText = [hovered.who, hovered.xp ? `+${hovered.xp} XP` : ''].filter(Boolean).join('  ·  ');
      whoEl.textContent = whoText;
      whoEl.style.display = whoText ? '' : 'none';

      // Full command (no truncation)
      const cmdEl = document.getElementById('tip-c');
      cmdEl.textContent = hovered.command || '';
      cmdEl.style.display = hovered.command ? '' : 'none';

      // Tip/hint
      const tipP = document.getElementById('tip-p');
      tipP.textContent = hovered.tip ? `💡 ${hovered.tip}` : '';
      tipP.style.display = hovered.tip ? '' : 'none';

      // Status
      const se = document.getElementById('tip-s');
      const m = { done: ['COMPLETO ✓','done'], pending: ['PENDENTE','pending'], skipped: ['PULADO','skipped'] };
      const [t, c] = m[hovered.status] || ['—','pending'];
      se.textContent = t; se.className = `tip-s ${c}`;

      tipEl.style.left = (e.clientX + 16) + 'px';
      tipEl.style.top = (e.clientY - 10) + 'px';
      tipEl.classList.add('on');
    } else {
      tipEl.classList.remove('on');
    }
  });

  window.addEventListener('mouseup', () => { dragging = false; });

  // Touch events for mobile
  vp.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      dragging = true;
      dragS = { x: e.touches[0].clientX, scrollX: vp.scrollLeft };
    }
  }, { passive: true });

  vp.addEventListener('touchmove', e => {
    if (dragging && e.touches.length === 1) {
      vp.scrollLeft = dragS.scrollX - (e.touches[0].clientX - dragS.x);
    }
  }, { passive: true });

  vp.addEventListener('touchend', () => { dragging = false; });

  // Tap to show tooltip on mobile
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const w = canvas.width, h = canvas.height;

    let tapped = null;
    for (const node of renderNodes) {
      if (!node.id) continue;
      const px = (node.x / 100) * w;
      const py = (node.y / 100) * h;
      if (Math.hypot(mx - px, my - py) < 22 * scale) {
        tapped = node;
        break;
      }
    }

    if (tapped) {
      document.getElementById('tip-t').textContent = `${tapped.id} — ${tapped.label}`;
      const whoText = [tapped.who, tapped.xp ? `+${tapped.xp} XP` : ''].filter(Boolean).join('  ·  ');
      document.getElementById('tip-w').textContent = whoText;
      document.getElementById('tip-w').style.display = whoText ? '' : 'none';
      document.getElementById('tip-c').textContent = tapped.command || '';
      document.getElementById('tip-c').style.display = tapped.command ? '' : 'none';
      const tipP = document.getElementById('tip-p');
      tipP.textContent = tapped.tip ? `💡 ${tapped.tip}` : '';
      tipP.style.display = tapped.tip ? '' : 'none';
      const se = document.getElementById('tip-s');
      const m = { done: ['COMPLETO ✓','done'], pending: ['PENDENTE','pending'], skipped: ['PULADO','skipped'] };
      const [t, c] = m[tapped.status] || ['—','pending'];
      se.textContent = t; se.className = `tip-s ${c}`;
      tipEl.style.left = Math.min(e.clientX + 10, window.innerWidth - 290) + 'px';
      tipEl.style.top = Math.min(e.clientY - 10, window.innerHeight - 150) + 'px';
      tipEl.classList.add('on');
      setTimeout(() => tipEl.classList.remove('on'), 4000);
    } else {
      tipEl.classList.remove('on');
    }
  });

  // Center on current node
  const curNode = renderNodes.find(n => n.status === 'pending');
  if (curNode) {
    const px = (curNode.x / 100) * MAP_W * scale;
    vp.scrollLeft = Math.max(0, px - vp.clientWidth / 2);
  }

  window.addEventListener('resize', fitMap);

  // Detail level toggle
  for (const btn of document.querySelectorAll('#detail-toggle .toggle-btn')) {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#detail-toggle .toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      detailLevel = btn.dataset.level;
    });
  }

  // Theme toggle
  for (const btn of document.querySelectorAll('#theme-toggle .toggle-btn')) {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#theme-toggle .toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyTheme(btn.dataset.theme);
    });
  }
}

// --------------------------------------------------------------------------
// WEBSOCKET
// --------------------------------------------------------------------------
function setupWS() {
  const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}`);
  ws.onmessage = async () => {
    try { await loadData(); mergeNodes(); updateHUD(); } catch(e) { console.error(e); }
  };
  ws.onclose = () => setTimeout(setupWS, 3000);
}

// --------------------------------------------------------------------------
// INIT
// --------------------------------------------------------------------------
async function init() {
  try {
    // Wait for map image
    await new Promise(resolve => {
      if (mapImg.complete) resolve();
      else mapImg.onload = resolve;
    });

    // Process hero sprite
    if (heroImg.complete) {
      heroClean = removeWhite(heroImg);
    } else {
      heroImg.onload = () => { heroClean = removeWhite(heroImg); };
    }

    await loadData();
    mergeNodes();
    updateHUD();
    fitMap();
    setupInput();
    setupWS();

    // Restore saved theme button state
    if (savedTheme) {
      document.querySelectorAll('#theme-toggle .toggle-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.theme === savedTheme);
      });
    }

    ldEl.classList.add('off');
    renderOverlay();
  } catch (err) {
    console.error(err);
    ldEl.textContent = 'Erro: ' + err.message;
  }
}

init();
</script>
