# Emerald Noir v2 — Luxury dark with emerald green + gold accents
# Source: stripe.com principles + finance premium aesthetic
# Ideal for: consulting, finance, premium services, high-ticket
# Theme: dark | Navy-dark base with emerald primary and gold accent
# Font: Plus Jakarta Sans (geometric, premium, modern)

name: Emerald Noir
version: 2
theme: dark
source: "stripe.com (principles) + finance premium"

typography:
  family:
    display: "Plus Jakarta Sans"
    body: "Plus Jakarta Sans"
    mono: "JetBrains Mono"
    fallback: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    cdn: "https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
  scale:
    h1: { size: 52px, weight: 700, line_height: 1.1, letter_spacing: "-0.02em" }
    h2: { size: 36px, weight: 600, line_height: 1.2, letter_spacing: "-0.01em" }
    h3: { size: 28px, weight: 600, line_height: 1.3 }
    h4: { size: 22px, weight: 500, line_height: 1.35 }
    body: { size: 16px, weight: 400, line_height: 1.7 }
    body_sm: { size: 14px, weight: 400, line_height: 1.6 }
    caption: { size: 13px, weight: 400, line_height: 1.5 }
    label: { size: 11px, weight: 600, line_height: 1.4, letter_spacing: "0.06em", text_transform: uppercase }

colors:
  primitives:
    emerald:
      50: "#ECFDF5"
      100: "#D1FAE5"
      200: "#A7F3D0"
      300: "#6EE7B7"
      400: "#34D399"
      500: "#10B981"
      600: "#059669"
      700: "#047857"
      800: "#065F46"
      900: "#064E3B"
      950: "#022C22"
    navy:
      50: "#F9FAFB"
      100: "#F3F4F6"
      200: "#E5E7EB"
      300: "#D1D5DB"
      400: "#9CA3AF"
      500: "#6B7280"
      600: "#4B5563"
      700: "#374151"
      800: "#1E2A38"
      900: "#151D28"
      950: "#0C1117"
  semantic:
    background: "#0C1117"
    surface: "#151D28"
    surface_elevated: "#1E2A38"
    border: "#1E2A38"
    border_hover: "#374151"
    text: "#F3F4F6"
    text_secondary: "#D1D5DB"
    text_muted: "#6B7280"
    primary: "#059669"
    primary_hover: "#34D399"
    accent: "#F59E0B"
    accent_hover: "#FBBF24"
    success: "#10B981"
    warning: "#F59E0B"
    error: "#EF4444"
    info: "#3B82F6"

spacing:
  scale: [4, 8, 12, 16, 20, 24, 32, 40, 48, 64, 80, 96]
  section_padding: 96px
  card_padding: 32px
  button_padding_x: 28px
  button_padding_y: 14px

radii:
  none: 0
  sm: 4px
  md: 8px
  lg: 12px
  xl: 16px
  full: 9999px
  default: 8px

shadows:
  none: "none"
  xs: "0 1px 2px rgba(12,17,23,0.4)"
  sm: "0 2px 8px rgba(12,17,23,0.4), 0 1px 2px rgba(12,17,23,0.3)"
  md: "0 4px 16px rgba(12,17,23,0.5), 0 2px 4px rgba(5,150,105,0.05)"
  lg: "0 8px 32px rgba(12,17,23,0.6), 0 4px 8px rgba(5,150,105,0.08)"
  xl: "0 16px 64px rgba(12,17,23,0.7), 0 8px 16px rgba(5,150,105,0.1)"

animation:
  duration:
    fast: 150ms
    normal: 240ms
    slow: 360ms
  easing: "cubic-bezier(0.25, 0.1, 0.25, 1)"
  hover_scale: 1.015

components:
  button:
    primary:
      bg: "#059669"
      text: "#FFFFFF"
      radius: 8px
      padding: "14px 28px"
      font_weight: 600
      font_size: 15px
    secondary:
      bg: "transparent"
      text: "#F3F4F6"
      border: "#1E2A38"
      radius: 8px
      padding: "14px 28px"
      font_weight: 500
    accent:
      bg: "#F59E0B"
      text: "#0C1117"
      radius: 8px
      padding: "14px 28px"
      font_weight: 600
  card:
    bg: "#151D28"
    border: "#1E2A38"
    radius: 12px
    padding: 32px
  input:
    bg: "#151D28"
    border: "#1E2A38"
    text: "#F3F4F6"
    placeholder: "#6B7280"
    radius: 8px
    padding: "12px 16px"

cover:
  gradient_primary: "rgba(5,150,105,0.12)"
  gradient_secondary: "rgba(245,158,11,0.05)"

anti_slop:
  - "Espaçamento GENEROSO — 96px entre seções (padrão Stripe)"
  - "Typography weight 300-400 no body — arejado, sofisticado"
  - "Gold accent SOMENTE em CTAs e destaques — max 3% da UI"
  - "Sombras com tint da cor primária (emerald) nos níveis md+"
  - "Hover scale quase imperceptível (1.015)"
  - "Plus Jakarta Sans obrigatória — NUNCA Inter"
  - "Navy-dark, não preto — profundidade com calor"
