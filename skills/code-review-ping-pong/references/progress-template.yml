# Progress Template — Cross-Stage Progress Tracker
#
# This file is AUTO-GENERATED by the agent at the end of every
# REVIEW, FIX, or AUDIT round when multi-stage mode is active.
# Do NOT edit manually — it is regenerated from stages.yml + round files.
#
# Location: .code-review-ping-pong/progress.yml
#
# Usage: node validate.cjs progress.yml

protocol: code-review-ping-pong
updated: "{YYYY-MM-DD}"

summary:
  total_stages: 0
  completed: 0
  active: 0
  pending: 0
  completion_pct: 0
  total_issues_found: 0
  total_issues_fixed: 0
  total_rounds: 0

stages:
  - id: 1
    slug: "{slug}"
    status: "{pending | active | complete}"
    final_score: null
    rounds: 0
    issues_found: 0
    issues_fixed: 0
    current_round: 0
    latest_score: null
    archived_at: null
    archive_path: null
